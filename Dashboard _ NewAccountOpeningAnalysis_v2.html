ss=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Xu hướng AUM/KH theo tháng — phân kênh<\/div>\n        <div class=\"cbox-sub\">Diễn biến chất lượng tài sản khách hàng mới theo thời gian cho từng kênh phát triển.<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"trend-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:280px\">\n      <svg id=\"trend-svg\" viewBox=\"0 0 600 280\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n  <div class=\"cbox col-6 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Xu hướng AUM/KH theo tháng — phân Hình thức quản lý<\/div>\n        <div class=\"cbox-sub\">Diễn biến AUM/KH trung bình theo thời gian, phân tách theo nhóm MG / CTV / NoID.<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"trend-mgmt-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:280px\">\n      <svg id=\"trend-mgmt-svg\" viewBox=\"0 0 600 280\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- ── Row 5: Phân khúc tài sản (bucket only) ── -->\n<div class=\"section-head\"><h2>Phân tích phân khúc tài sản<\/h2><span class=\"section-tag\">Segment<\/span><div class=\"section-line\"><\/div><\/div>\n<div class=\"charts-grid\">\n  <div class=\"cbox col-12 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Phân bổ quy mô nạp tiền lần đầu theo Kênh<\/div>\n        <div class=\"cbox-sub\">% KH theo nhóm tài sản nạp đầu (0 / &lt;10tr / 10-50tr / 50-200tr / &gt;200tr) — tỷ lệ % trên từng hàng = 100%.<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"bucket-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:280px\">\n      <svg id=\"bucket-svg\" viewBox=\"0 0 1100 280\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- ── Action Summary ── -->\n<div class=\"action-panel anim-in\">\n  <div class=\"section-head\" style=\"margin-bottom:8px;margin-top:0\">\n    <h2>Kết luận & Đề xuất hành động<\/h2>\n    <span class=\"section-tag\">Action Summary<\/span>\n    <div class=\"section-line\"><\/div>\n  <\/div>\n  <p style=\"font-size:12.5px;color:var(--text2);margin-bottom:4px\" id=\"action-summary-lead\">Dựa trên dữ liệu 01–05/2026, dưới đây là 6 đề xuất ưu tiên để tối ưu hiệu quả kênh phát triển khách hàng.<\/p>\n  <div class=\"action-grid\" id=\"action-grid\">\n    <div class=\"action-item\">\n      <div class=\"action-num\">1<\/div>\n      <div class=\"action-text\">\n        <strong>Ưu tiên đầu tư kênh Loop (E) – MG<\/strong>\n        <p>Kênh có AUM/KH cao nhất; nhân rộng chương trình MG, tăng ngân sách hoa hồng giới thiệu.<\/p>\n        <span class=\"action-priority priority-high\">🔴 Ưu tiên cao<\/span>\n      <\/div>\n    <\/div>\n    <div class=\"action-item\">\n      <div class=\"action-num\">2<\/div>\n      <div class=\"action-text\">\n        <strong>Cải thiện tỷ lệ Active kênh App (M) – NoID<\/strong>\n        <p>Nhóm NoID trên App có active rate thấp nhất; triển khai onboarding journey và push notification tự động.<\/p>\n        <span class=\"action-priority priority-high\">🔴 Ưu tiên cao<\/span>\n      <\/div>\n    <\/div>\n    <div class=\"action-item\">\n      <div class=\"action-num\">3<\/div>\n      <div class=\"action-text\">\n        <strong>Chuyển đổi CTV sang MG tại Bank (L)<\/strong>\n        <p>Tỷ trọng MG tại Bank (L) thấp; đào tạo và nâng cấp CTV tiềm năng để tăng chất lượng KH.<\/p>\n        <span class=\"action-priority priority-med\">🟡 Trung bình<\/span>\n      <\/div>\n    <\/div>\n    <div class=\"action-item\">\n      <div class=\"action-num\">4<\/div>\n      <div class=\"action-text\">\n        <strong>Tối ưu ROI kênh Web (O)<\/strong>\n        <p>Chi phí trung bình, doanh thu thấp so kỳ vọng; A/B test landing page và cải thiện conversion funnel.<\/p>\n        <span class=\"action-priority priority-med\">🟡 Trung bình<\/span>\n      <\/div>\n    <\/div>\n    <div class=\"action-item\">\n      <div class=\"action-num\">5<\/div>\n      <div class=\"action-text\">\n        <strong>Tăng tỷ lệ nạp tiền lần đầu<\/strong>\n        <p id=\"action-5-text\">Hơn 40% KH chưa nạp tiền sau khi đăng ký; thiết kế ưu đãi khuyến mãi nạp lần đầu trong 7 ngày.<\/p>\n        <span class=\"action-priority priority-med\">🟡 Trung bình<\/span>\n      <\/div>\n    <\/div>\n    <div class=\"action-item\">\n      <div class=\"action-num\">6<\/div>\n      <div class=\"action-text\">\n        <strong>Đặt KPI chất lượng bên cạnh KPI số lượng<\/strong>\n        <p>Bổ sung chỉ tiêu AUM/KH ≥ 15 triệu và Active Rate ≥ 65% vào dashboard theo dõi hàng tuần.<\/p>\n        <span class=\"action-priority priority-low\">🟢 Dài hạn<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n<\/div><!-- /page -->\n<div class=\"tip\" id=\"tip\"><\/div>\n\n<script>\n// ═══════════════════════════════════════════════\n//  DATA & CONFIG\n// ═══════════════════════════════════════════════\nconst CHANNELS   = [\"App (M)\",\"Web (O)\",\"Loop (E)\",\"Teller (F)\",\"Bank (L)\"];\nconst MGMTS      = [\"MG\",\"CTV\",\"NoID\"];\nconst REGIONS    = [\"Miền Bắc\",\"Miền Trung\",\"Miền Nam\"];\nconst MONTHS     = [\"2026-01\",\"2026-02\",\"2026-03\",\"2026-04\",\"2026-05\"];\nconst MONTH_LBL  = [\"T1\",\"T2\",\"T3\",\"T4\",\"T5\"];\n\nconst CH_COLOR = {\n  \"App (M)\":  \"#3fb950\",\n  \"Web (O)\":  \"#58a6ff\",\n  \"Loop (E)\": \"#bc8cff\",\n  \"Teller (F)\":\"#f0a800\",\n  \"Bank (L)\": \"#f85149\"\n};\nconst MG_COLOR = {\"MG\":\"#3fb950\",\"CTV\":\"#58a6ff\",\"NoID\":\"#8b949e\"};\n\n// Simulated operating costs per channel (VND million per 1000 customers)\nconst CH_COST_PER_1000 = {\n  \"App (M)\": 8,   // lowest — digital self-serve\n  \"Web (O)\": 12,\n  \"Loop (E)\": 50, // highest — referral incentive\n  \"Teller (F)\": 35,\n  \"Bank (L)\": 28\n};\n\n// Fee rate assumptions per mgmt type\nconst FEE_RATE = {\"MG\": 0.0035, \"CTV\": 0.0025, \"NoID\": 0.0015};\n\nlet rawData = [], filtered = [];\n\nfunction genData() {\n  const data = [];\n  const t0 = new Date(\"2026-01-01T00:00:00\").getTime();\n  const t1 = new Date(\"2026-05-31T23:59:59\").getTime();\n\n  for (let i = 1; i <= 5000; i++) {\n    const ts = t0 + Math.random() * (t1 - t0);\n    const d  = new Date(ts);\n    const dateStr  = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;\n    const monthStr = dateStr.substring(0,7);\n\n    let ch;\n    const rc = Math.random();\n    if      (rc < 0.44) ch = CHANNELS[0];\n    else if (rc < 0.68) ch = CHANNELS[1];\n    else if (rc < 0.81) ch = CHANNELS[2];\n    else if (rc < 0.91) ch = CHANNELS[3];\n    else                ch = CHANNELS[4];\n\n    let mg;\n    const rm = Math.random();\n    if (ch === \"Loop (E)\")   { mg = rm < 0.73 ? \"MG\" : \"CTV\"; }\n    else if (ch === \"Teller (F)\") { mg = rm < 0.58 ? \"MG\" : \"NoID\"; }\n    else if (ch === \"Bank (L)\")   { mg = rm < 0.45 ? \"MG\" : (rm < 0.7 ? \"CTV\" : \"NoID\"); }\n    else {\n      if (rm < 0.26) mg = \"MG\";\n      else if (rm < 0.50) mg = \"CTV\";\n      else mg = \"NoID\";\n    }\n\n    const region = REGIONS[Math.floor(Math.random() * 3)];\n\n    // AUM distribution: MG >> CTV >> NoID; loop/teller slightly higher\n    let deposit = 0;\n    if (Math.random() < (mg === \"MG\" ? 0.72 : mg === \"CTV\" ? 0.60 : 0.40)) {\n      const chMult = ch === \"Loop (E)\" ? 1.3 : ch === \"Teller (F)\" ? 1.15 : ch === \"Bank (L)\" ? 1.05 : 1.0;\n      if (mg === \"MG\")        deposit = Math.floor((18_000_000 + Math.random() * 200_000_000) * chMult);\n      else if (mg === \"CTV\")  deposit = Math.floor((4_000_000  + Math.random() * 70_000_000)  * chMult);\n      else                    deposit = Math.floor((500_000    + Math.random() * 18_000_000)  * chMult);\n    }\n\n    const active = deposit > 0 && Math.random() < (mg === \"MG\" ? 0.92 : mg === \"CTV\" ? 0.82 : 0.54);\n\n    // Estimated fee = deposit × rate × random utilisation\n    const fee = deposit > 0 ? deposit * FEE_RATE[mg] * (0.4 + Math.random() * 0.6) : 0;\n\n    data.push({ id:i, date:dateStr, month:monthStr, ch, mg, region, deposit, active, fee });\n  }\n  return data;\n}\n\n// ═══════════════════════════════════════════════\n//  FILTERS\n// ═══════════════════════════════════════════════\nfunction applyFilters() {\n  const s = document.getElementById(\"f-start\").value;\n  const e = document.getElementById(\"f-end\").value;\n  const fc = document.getElementById(\"f-channel\").value;\n  const fm = document.getElementById(\"f-mgmt\").value;\n\n  filtered = rawData.filter(d => {\n    if (s && d.date < s) return false;\n    if (e && d.date > e) return false;\n    if (fc !== \"all\" && d.ch !== fc) return false;\n    if (fm !== \"all\" && d.mg !== fm) return false;\n    return true;\n  });\n  renderAll();\n}\n\nfunction resetFilters() {\n  document.getElementById(\"f-start\").value   = \"2026-01-01\";\n  document.getElementById(\"f-end\").value     = \"2026-05-31\";\n  document.getElementById(\"f-channel\").value = \"all\";\n  document.getElementById(\"f-mgmt\").value    = \"all\";\n\n  applyFilters();\n}\n\n[\"f-start\",\"f-end\",\"f-channel\",\"f-mgmt\"].forEach(id =>\n  document.getElementById(id).addEventListener(\"change\", applyFilters)\n);\n\n// ═══════════════════════════════════════════════\n//  HELPERS\n// ═══════════════════════════════════════════════\nconst fmtN  = n => new Intl.NumberFormat('vi-VN').format(Math.round(n));\nconst fmtM  = n => {\n  if (!n) return \"0đ\";\n  if (n >= 1e9) return (n/1e9).toFixed(1) + \" tỷ\";\n  if (n >= 1e6) return (n/1e6).toFixed(1) + \" tr\";\n  return fmtN(n) + \"đ\";\n};\nconst fmtPct = (v,d=1) => v.toFixed(d) + \"%\";\nconst avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;\nconst pctOf = (a,b) => b ? a/b*100 : 0;\n\n// compute per-channel stats\nfunction chStats(data) {\n  return CHANNELS.map(ch => {\n    const sub = data.filter(d => d.ch === ch);\n    const n   = sub.length;\n    const depositors = sub.filter(d => d.deposit > 0);\n    const actives    = sub.filter(d => d.active);\n    const aumAvg     = n ? avg(sub.map(d => d.deposit)) : 0;\n    const aumActAvg  = depositors.length ? avg(depositors.map(d => d.deposit)) : 0;\n    const feeAvg     = n ? avg(sub.map(d => d.fee)) : 0;\n    const activePct  = pctOf(actives.length, n);\n    const depositPct = pctOf(depositors.length, n);\n    const totalAUM   = sub.reduce((a,d)=>a+d.deposit,0);\n    const totalFee   = sub.reduce((a,d)=>a+d.fee,0);\n    return { ch, n, aumAvg, aumActAvg, feeAvg, activePct, depositPct, totalAUM, totalFee };\n  });\n}\n\n// per-channel per-mgmt\nfunction chMgStats(data) {\n  const res = {};\n  CHANNELS.forEach(ch => { res[ch] = {}; MGMTS.forEach(mg => { res[ch][mg] = { n:0, sumAUM:0, sumFee:0, activeN:0 }; }); });\n  data.forEach(d => {\n    res[d.ch][d.mg].n++;\n    res[d.ch][d.mg].sumAUM  += d.deposit;\n    res[d.ch][d.mg].sumFee  += d.fee;\n    if (d.active) res[d.ch][d.mg].activeN++;\n  });\n  return res;\n}\n\n// ═══════════════════════════════════════════════\n//  RENDER ORCHESTRATOR\n// ═══════════════════════════════════════════════\nfunction renderAll() {\n  const stats = chStats(filtered);\n  const cms   = chMgStats(filtered);\n  renderInsightPanel(stats);\n  renderKPIs(stats);\n  renderScorecard(stats);\n  renderScatter(stats);\n  renderAUMBar(stats, cms);\n  renderFeeBar(stats, cms);\n  renderActiveCombined(stats, cms);\n  renderTrend();\n  renderTrendMgmt();\n  renderBuckets();\n}\n\n// ═══════════════════════════════════════════════\n//  KPI GRID\n// ═══════════════════════════════════════════════\nfunction renderKPIs(stats) {\n  const total = filtered.length;\n\n  // AUM/KH: weighted average across channels (consistent with stacked chart)\n  const totalAUM = stats.reduce((a,s)=>a+s.totalAUM,0);\n  const totalN   = stats.reduce((a,s)=>a+s.n,0);\n  const aumAvgAll = totalN ? totalAUM/totalN : 0;\n  const maxAUM = Math.max(...stats.map(s=>s.aumAvg));\n  const bestCH = stats.find(s=>s.aumAvg === maxAUM);\n\n  // Phí net/KH: weighted average across channels\n  const totalFee = stats.reduce((a,s)=>a+s.totalFee,0);\n  const feeAvgAll = totalN ? totalFee/totalN : 0;\n  const maxFee = Math.max(...stats.map(s=>s.feeAvg));\n  const bestFCH = stats.find(s=>s.feeAvg === maxFee);\n\n  const maxAct = Math.max(...stats.map(s=>s.activePct));\n  const bestACH = stats.find(s=>s.activePct === maxAct);\n\n  // Chi phí/KH: cost per customer by channel (VND per customer), weighted by n\n  const costPerKH = stats.map(s => ({\n    ch: s.ch,\n    n: s.n,\n    cost: (CH_COST_PER_1000[s.ch] || 0) * 1e6 / 1000\n  }));\n  // Weighted average cost per KH (by number of customers per channel)\n  const totalCostWeighted = costPerKH.reduce((a,c)=>a + c.cost*c.n, 0);\n  const avgCostPerKH = totalN > 0 ? totalCostWeighted / totalN : 0;\n  const maxCostCH = costPerKH.reduce((a,c)=>c.cost>a.cost?c:a, costPerKH[0]);\n  const minCostCH = costPerKH.reduce((a,c)=>c.cost<a.cost?c:a, costPerKH[0]);\n\n  // ROI net = Phí NET/KH / Chi phí/KH (toàn hệ thống)\n  const roiNet = avgCostPerKH > 0 ? (feeAvgAll / avgCostPerKH).toFixed(1) : \"—\";\n\n  const items = [\n    { icon:\"💰\", label:\"AUM/KH Trung bình\", val:fmtM(aumAvgAll), sub:\"Kênh cao nhất: \" + (bestCH?.ch || \"—\") + \" · \" + fmtM(maxAUM), color:\"#f0a800\", bg:\"rgba(240,168,0,0.1)\" },\n    { icon:\"📊\", label:\"Phí net/KH\", val:fmtM(feeAvgAll), sub:\"Kênh cao nhất: \" + (bestFCH?.ch || \"—\") + \" · \" + fmtM(maxFee), color:\"#3fb950\", bg:\"rgba(63,185,80,0.1)\" },\n    { icon:\"🏷️\", label:\"Chi phí/KH TB\", val:fmtN(Math.round(avgCostPerKH)) + \"đ\", sub:\"ROI net: \" + roiNet + \"× · Đắt nhất: \" + maxCostCH.ch + \" · Rẻ nhất: \" + minCostCH.ch, color:\"#bc8cff\", bg:\"rgba(188,140,255,0.1)\" },\n    { icon:\"⚡\", label:\"Tỷ lệ Active\", val:fmtPct(pctOf(filtered.filter(d=>d.active).length, total)), sub:\"Kênh dẫn đầu: \" + (bestACH?.ch || \"—\") + \" · \" + fmtPct(maxAct), color:\"#58a6ff\", bg:\"rgba(88,166,255,0.1)\" },\n    { icon:\"📥\", label:\"Tỷ lệ Nạp tiền\", val:fmtPct(pctOf(filtered.filter(d=>d.deposit>0).length, total)), sub:\"KH có AUM > 0\", color:\"#f85149\", bg:\"rgba(248,81,73,0.1)\" },\n  ];\n  const g = document.getElementById(\"kpi-grid\");\n  g.innerHTML = items.map(it => `\n    <div class=\"kpi-card\">\n      <div class=\"kpi-icon\" style=\"background:${it.bg};color:${it.color}\">${it.icon}<\/div>\n      <div class=\"kpi-label\">${it.label}<\/div>\n      <div class=\"kpi-value\" style=\"color:${it.color}\">${it.val}<\/div>\n      <div class=\"kpi-sub\">${it.sub}<\/div>\n    <\/div>\n  `).join(\"\");\n}\n\n// ═══════════════════════════════════════════════\n//  SCORECARD TABLE\n// ═══════════════════════════════════════════════\nfunction renderScorecard(stats) {\n  // Composite score (0-100)\n  const maxAUM = Math.max(...stats.map(s=>s.aumAvg), 1);\n  const maxFee = Math.max(...stats.map(s=>s.feeAvg), 1);\n  const maxAct = Math.max(...stats.map(s=>s.activePct), 1);\n\n  const withScore = stats.map(s => ({\n    ...s,\n    score: Math.round(\n      (s.aumAvg/maxAUM * 0.45 +\n       s.feeAvg/maxFee * 0.30 +\n       s.activePct/maxAct * 0.25) * 100\n    )\n  })).sort((a,b) => b.score - a.score);\n\n  const rankColors = [\"#CD7F32\",\"#CD7F32\",\"#CD7F32\",\"#C0C8D0\",\"#C0C8D0\"];\n  const maxAUMv = Math.max(...withScore.map(s=>s.aumAvg), 1);\n  const maxFeeV = Math.max(...withScore.map(s=>s.feeAvg), 1);\n\n  const rows = withScore.map((s, i) => {\n    const barW    = (s.aumAvg / maxAUMv * 72).toFixed(0);\n    const actClass   = s.activePct >= 60 ? \"badge-good\" : s.activePct >= 40 ? \"badge-warn\" : \"badge-bad\";\n    const chCost     = (CH_COST_PER_1000[s.ch] || 0) * 1e6 / 1000;  // VND/KH\n    const roi        = chCost > 0 ? s.feeAvg / chCost : 0;\n    const roiClass   = roi >= 3 ? \"badge-good\" : roi >= 1.5 ? \"badge-warn\" : \"badge-bad\";\n    return `<tr>\n      <td>\n        <div style=\"display:flex;align-items:center;gap:10px\">\n          <span class=\"sc-rank\" style=\"background:${rankColors[i]}18;color:${rankColors[i]};border:1.5px solid ${rankColors[i]}50;font-size:${i<3?'12':'11'}px\">${i+1}<\/span>\n          <span class=\"badge-ch\" style=\"background:${CH_COLOR[s.ch]}15;color:${CH_COLOR[s.ch]};border-color:${CH_COLOR[s.ch]}40\">${s.ch}<\/span>\n        <\/div>\n      <\/td>\n      <td>${fmtN(s.n)}<\/td>\n      <td>\n        ${fmtM(s.aumAvg)}\n        <span class=\"bar-inline\" style=\"width:${barW}px;background:${CH_COLOR[s.ch]}60\"><\/span>\n      <\/td>\n      <td>${fmtM(s.feeAvg)}<\/td>\n      <td><span class=\"${actClass}\">${fmtPct(s.activePct)}<\/span><\/td>\n      <td>${fmtN(Math.round(chCost))}đ<\/td>\n      <td><span class=\"${roiClass}\" style=\"font-size:11px;font-weight:800\">${roi.toFixed(1)}×<\/span><\/td>\n    <\/tr>`;\n  }).join(\"\");\n\n  document.getElementById(\"scorecard-wrap\").innerHTML = `\n    <table class=\"sc-table\">\n      <thead><tr>\n        <th style=\"text-align:left\">Kênh<\/th>\n        <th>Số KH<\/th>\n        <th>AUM/KH<\/th>\n        <th>Phí NET/KH<\/th>\n        <th>Active%<\/th>\n        <th>Chi phí/KH<\/th>\n        <th>ROI net<\/th>\n      <\/tr><\/thead>\n      <tbody>${rows}<\/tbody>\n    <\/table>`;\n}\n\n// ═══════════════════════════════════════════════\n//  AUM GROUPED BAR (by channel, grouped MG/CTV/NoID side-by-side)\n// ═══════════════════════════════════════════════\nfunction renderAUMBar(stats, cms) {\n  const svg = document.getElementById(\"aum-svg\");\n  const W = 580, H = 280;\n  const pL=72, pR=28, pT=28, pB=52;\n  const iW = W-pL-pR, iH = H-pT-pB;\n  const mgmts = MGMTS; // [\"MG\",\"CTV\",\"NoID\"]\n  const nCh = CHANNELS.length;\n  const nMg = mgmts.length;\n\n  // Sort channels by MG AUM desc (like the screenshot)\n  const sortedChs = [...CHANNELS].sort((a,b) => {\n    const va = cms[a][\"MG\"].n ? cms[a][\"MG\"].sumAUM/cms[a][\"MG\"].n : 0;\n    const vb = cms[b][\"MG\"].n ? cms[b][\"MG\"].sumAUM/cms[b][\"MG\"].n : 0;\n    return vb - va;\n  });\n\n  // Compute per-channel per-mgmt avg AUM\n  const vals = sortedChs.map(ch => mgmts.map(mg => {\n    const o = cms[ch][mg];\n    return o.n ? o.sumAUM / o.n : 0;\n  }));\n\n  // Max across all bars\n  const maxV = Math.max(...vals.flat(), 1);\n  const ticks = 5;\n\n  // Group width and individual bar width\n  const gW = iW / nCh;         // width per channel group\n  const gPad = gW * 0.10;      // padding on each side of group\n  const innerW = gW - gPad*2;\n  const bW = innerW / nMg - 3; // individual bar width\n  const bGap = 3;\n\n  let body = \"\";\n\n  // Grid lines + Y axis labels\n  for (let t=0;t<=ticks;t++) {\n    const yy = pT + iH - (t/ticks)*iH;\n    const vv = (maxV * t/ticks) / 1e6;\n    body += `<line x1=\"${pL}\" y1=\"${yy}\" x2=\"${W-pR}\" y2=\"${yy}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${pL-6}\" y=\"${yy+4}\" text-anchor=\"end\" fill=\"var(--text3)\" style=\"font-size:9px;font-weight:600\">${vv.toFixed(0)}M<\/text>`;\n  }\n\n  // Draw grouped bars\n  sortedChs.forEach((ch, ci) => {\n    const gx = pL + ci * gW + gPad;\n\n    mgmts.forEach((mg, mi) => {\n      const v = vals[ci][mi];\n      if (v < 1) return;\n      const bh = (v / maxV) * iH;\n      const bx = gx + mi * (bW + bGap);\n      const by = pT + iH - bh;\n      const col = MG_COLOR[mg];\n      const tip = `<b>${ch} — ${mg}<\/b><div class='tip-row'><span>AUM/KH TB<\/span><span>${fmtM(v)}<\/span><\/div><div class='tip-row'><span>Số KH<\/span><span>${fmtN(cms[ch][mg].n)}<\/span><\/div>`;\n\n      body += `<rect class=\"bar-rect\" x=\"${bx.toFixed(1)}\" y=\"${by.toFixed(1)}\" width=\"${bW.toFixed(1)}\" height=\"${bh.toFixed(1)}\" rx=\"3\" fill=\"${col}\" fill-opacity=\"0.85\" data-tip='${tip}'/>`;\n\n      // Value label on top of each bar\n      if (bh > 14) {\n        body += `<text x=\"${(bx+bW/2).toFixed(1)}\" y=\"${(by-5).toFixed(1)}\" text-anchor=\"middle\" fill=\"${col}\" style=\"font-size:8.5px;font-weight:800\">${fmtM(v)}<\/text>`;\n      }\n    });\n\n    // Channel x-label\n    body += `<text x=\"${(pL + ci*gW + gW/2).toFixed(1)}\" y=\"${pT+iH+18}\" text-anchor=\"middle\" fill=\"var(--text2)\" style=\"font-size:10.5px;font-weight:700\">${ch}<\/text>`;\n    // Color strip under label\n    body += `<rect x=\"${(pL+ci*gW+gW*0.1).toFixed(1)}\" y=\"${pT+iH+27}\" width=\"${(gW*0.8).toFixed(1)}\" height=\"3\" rx=\"1.5\" fill=\"${CH_COLOR[ch]}\" fill-opacity=\"0.55\"/>`;\n  });\n\n  // ── Average lines: MG (green) and CTV (blue) ──\n  const drawAvgLine = (mg, col, solidCol) => {\n    let sumAUM = 0, totalN = 0;\n    CHANNELS.forEach(ch => {\n      const o = cms[ch][mg];\n      sumAUM += o.sumAUM;\n      totalN += o.n;\n    });\n    if (!totalN) return;\n    const avgVal = sumAUM / totalN;\n    const avgY = pT + iH - (avgVal / maxV) * iH;\n\n    // Dashed line — muted\n    body += `<line x1=\"${pL}\" y1=\"${avgY.toFixed(1)}\" x2=\"${W-pR}\" y2=\"${avgY.toFixed(1)}\" stroke=\"${solidCol}\" stroke-width=\"1.5\" stroke-dasharray=\"6,3\" opacity=\"0.4\" stroke-linecap=\"round\"/>`;\n    // Left dot — muted\n    body += `<circle cx=\"${pL}\" cy=\"${avgY.toFixed(1)}\" r=\"3\" fill=\"${solidCol}\" opacity=\"0.45\"/>`;\n    // Right callout tag — slightly muted but readable\n    const avgStr = fmtM(avgVal);\n    const tagW = avgStr.length * 6.2 + 14;\n    const tagX = W - pR;\n    const tagY = avgY - 9;\n    body += `<rect x=\"${tagX.toFixed(1)}\" y=\"${tagY.toFixed(1)}\" width=\"${tagW.toFixed(1)}\" height=\"18\" rx=\"3\" fill=\"${solidCol}\" opacity=\"0.55\"/>`;\n    body += `<text x=\"${(tagX + tagW/2).toFixed(1)}\" y=\"${(avgY + 5).toFixed(1)}\" text-anchor=\"middle\" fill=\"#fff\" style=\"font-size:9px;font-weight:900;opacity:0.9\">${avgStr}<\/text>`;\n  };\n\n  drawAvgLine(\"MG\",  \"#3fb950\", \"#3fb950\"); // green muted\n  drawAvgLine(\"CTV\", \"#58a6ff\", \"#58a6ff\"); // blue muted\n\n  svg.innerHTML = body;\n\n  // Legend\n  document.getElementById(\"aum-legend\").innerHTML = mgmts.map(mg =>\n    `<div class=\"leg\"><span class=\"leg-dot\" style=\"background:${MG_COLOR[mg]}\"><\/span>${mg}<\/div>`\n  ).join(\"\");\n}\n\n// ═══════════════════════════════════════════════\n//  FEE BAR (horizontal)\n// ═══════════════════════════════════════════════\nfunction renderFeeBar(stats, cms) {\n  const svg = document.getElementById(\"fee-svg\");\n  const W=520, H=280;\n  const pL=100, pR=20, pT=20, pB=24;\n  const iW=W-pL-pR, iH=H-pT-pB;\n  const sorted = [...stats].sort((a,b)=>b.feeAvg-a.feeAvg);\n  const maxF = Math.max(...sorted.map(s=>s.feeAvg),1);\n  const rH = Math.floor(iH/sorted.length) - 5;\n\n  let body = \"\";\n  // ticks\n  for (let t=0;t<=4;t++) {\n    const xx = pL + (t/4)*iW;\n    body += `<line x1=\"${xx}\" y1=\"${pT}\" x2=\"${xx}\" y2=\"${pT+iH}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"3,3\"/>`;\n    body += `<text x=\"${xx}\" y=\"${pT+iH+14}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:9px\">${fmtM(maxF*t/4)}<\/text>`;\n  }\n\n  sorted.forEach((s,i) => {\n    const y  = pT + i*(rH+5);\n    const bw = (s.feeAvg/maxF)*iW;\n    const col = CH_COLOR[s.ch];\n    const tip = `<b>${s.ch}<\/b><div class='tip-row'><span>Phí/KH TB<\/span><span>${fmtM(s.feeAvg)}<\/span><\/div><div class='tip-row'><span>Tổng phí ước tính<\/span><span>${fmtM(s.totalFee)}<\/span><\/div>`;\n    body += `<rect x=\"${pL}\" y=\"${y}\" width=\"${iW}\" height=\"${rH}\" rx=\"4\" fill=\"var(--border)\" fill-opacity=\"0.3\"/>`;\n    body += `<rect class=\"bar-rect\" x=\"${pL}\" y=\"${y}\" width=\"${Math.max(bw,4).toFixed(1)}\" height=\"${rH}\" rx=\"4\" fill=\"${col}\" fill-opacity=\"0.8\" data-tip='${tip}'/>`;\n    body += `<text x=\"${pL-8}\" y=\"${(y+rH/2+4).toFixed(1)}\" text-anchor=\"end\" fill=\"${col}\" style=\"font-size:11px;font-weight:750\">${s.ch}<\/text>`;\n    if (bw > 40) body += `<text x=\"${pL+bw-8}\" y=\"${(y+rH/2+4).toFixed(1)}\" text-anchor=\"end\" fill=\"#000\" style=\"font-size:10px;font-weight:800\">${fmtM(s.feeAvg)}<\/text>`;\n    else body += `<text x=\"${pL+bw+6}\" y=\"${(y+rH/2+4).toFixed(1)}\" fill=\"${col}\" style=\"font-size:10px;font-weight:800\">${fmtM(s.feeAvg)}<\/text>`;\n  });\n\n  // ── Benchmark vertical line ──\n  const avgFee = sorted.reduce((a,s) => a+s.feeAvg, 0) / sorted.length;\n  const avgFeeX = pL + (avgFee / maxF) * iW;\n  // Subtle fill to the right of benchmark\n  body += `<rect x=\"${avgFeeX.toFixed(1)}\" y=\"${pT}\" width=\"${(iW-(avgFeeX-pL)).toFixed(1)}\" height=\"${iH}\" fill=\"rgba(240,168,0,0.03)\" pointer-events=\"none\"/>`;\n  // Dashed vertical line\n  body += `<line x1=\"${avgFeeX.toFixed(1)}\" y1=\"${pT}\" x2=\"${avgFeeX.toFixed(1)}\" y2=\"${pT+iH}\" stroke=\"#f0a800\" stroke-width=\"1.5\" stroke-dasharray=\"6,3\" opacity=\"0.75\" stroke-linecap=\"round\"/>`;\n  // Top: value badge (moved from bottom, was TB)\n  const fTagH=18;\n  const fValStr = fmtM(avgFee);\n  const fValW = fValStr.length*6+14, fValX = avgFeeX-fValW/2, fValY = pT-fTagH-2;\n  body += `<rect x=\"${fValX.toFixed(1)}\" y=\"${fValY.toFixed(1)}\" width=\"${fValW}\" height=\"${fTagH}\" rx=\"3\" fill=\"#f0a800\" opacity=\"0.95\"/>`;\n  body += `<text x=\"${avgFeeX.toFixed(1)}\" y=\"${(fValY+fTagH-4).toFixed(1)}\" text-anchor=\"middle\" fill=\"#000\" style=\"font-size:9px;font-weight:900\">${fValStr}<\/text>`;\n  // Bottom: small dot only (TB label removed)\n  body += `<circle cx=\"${avgFeeX.toFixed(1)}\" cy=\"${(pT+iH).toFixed(1)}\" r=\"3\" fill=\"#f0a800\" opacity=\"0.85\"/>`;\n\n  svg.innerHTML = body;\n  document.getElementById(\"fee-legend\").innerHTML = [\n    `<div class=\"leg\"><span style=\"font-size:10px;color:var(--text3)\">Sắp xếp giảm dần theo Phí/KH trung bình<\/span><\/div>`,\n    `<div class=\"leg\"><span style=\"display:inline-block;width:2px;height:12px;background:#f0a800;border-radius:1px;vertical-align:middle;margin-right:5px;opacity:0.8\"><\/span><span style=\"color:#f0a800;font-size:10px;font-weight:600\">TB chung<\/span><\/div>`\n  ].join(\"\");\n}\n\n// ═══════════════════════════════════════════════\n//  INSIGHT PANEL (summary + 5 insights)\n// ═══════════════════════════════════════════════\nfunction renderInsightPanel(stats) {\n  const sortedAUM    = [...stats].sort((a,b)=>b.aumAvg-a.aumAvg);\n  const best         = sortedAUM[0];\n  const worst        = sortedAUM[sortedAUM.length-1];\n  const sortedActive = [...stats].sort((a,b)=>b.activePct-a.activePct);\n  const bestActive   = sortedActive[0];\n  const worstActive  = sortedActive[sortedActive.length-1];\n  const avgActive    = stats.reduce((s,x)=>s+x.activePct,0)/stats.length;\n  const avgAUM       = stats.reduce((s,x)=>s+x.aumAvg,0)/stats.length;\n\n  const totalN          = filtered.length;\n  const depositedN      = filtered.filter(d=>d.deposit>0).length;\n  const inactiveDeposit = filtered.filter(d=>!d.active && d.deposit>0).length;\n  const oppPct          = pctOf(inactiveDeposit, totalN);\n\n  // Best ROI channel\n  const roiStats = stats.map(s => {\n    const cost = (CH_COST_PER_1000[s.ch]||0)*1e6/1000;\n    return { ch:s.ch, roi: cost>0 ? s.feeAvg/cost : 0, feeAvg:s.feeAvg, aumAvg:s.aumAvg };\n  }).sort((a,b)=>b.roi-a.roi);\n  const bestROI  = roiStats[0];\n  const worstROI = roiStats[roiStats.length-1];\n\n  // ── Summary paragraph ──\n  const summaryHTML =\n    `Trong giai đoạn <strong>01–05/2026<\/strong>, hệ thống ghi nhận <strong>${fmtN(totalN)} khách hàng<\/strong> mới đến từ 5 kênh phát triển. ` +\n    `Kênh <strong>${best.ch}<\/strong> dẫn đầu toàn hệ thống với AUM/KH trung bình đạt <strong>${fmtM(best.aumAvg)}<\/strong> — ` +\n    `gấp <strong>${(best.aumAvg/worst.aumAvg).toFixed(1)}×<\/strong> so với kênh thấp nhất là <strong>${worst.ch}<\/strong>. ` +\n    `Tỷ lệ Active bình quân toàn hệ thống đạt <strong>${fmtPct(avgActive)}<\/strong>, trong đó <strong>${worstActive.ch}<\/strong> ` +\n    `đang thấp hơn mức trung bình <strong>${(avgActive-worstActive.activePct).toFixed(1)} điểm %<\/strong>, cần can thiệp sớm. ` +\n    `Đáng chú ý, có <strong>${fmtPct(oppPct)} KH<\/strong> đã nạp tiền nhưng chưa kích hoạt giao dịch — ` +\n    `đây là nhóm tái kích hoạt tiềm năng có giá trị cao nhất. ` +\n    `Về hiệu quả chi phí, kênh <strong>${bestROI.ch}<\/strong> có ROI net tốt nhất (<strong>${bestROI.roi.toFixed(1)}×<\/strong>), ` +\n    `trong khi <strong>${worstROI.ch}<\/strong> cần tối ưu thêm để cải thiện tỷ suất sinh lời trên từng khách hàng.`;\n\n  document.getElementById(\"insight-summary-text\").innerHTML = summaryHTML;\n\n  // ── Insight 1: Kênh dẫn đầu ──\n  document.getElementById(\"ins-1-val\").innerHTML = `${best.ch} <span>#1<\/span>`;\n  document.getElementById(\"ins-1-desc\").textContent =\n    `AUM/KH cao nhất toàn hệ thống: ${fmtM(best.aumAvg)}, gấp ${(best.aumAvg/avgAUM).toFixed(1)}× mức trung bình (${fmtM(avgAUM)}). Ưu tiên nhân rộng mô hình MG tại kênh này.`;\n\n  // ── Insight 2: Kênh yếu — Active Rate ──\n  document.getElementById(\"ins-2-val\").innerHTML = `${worstActive.ch} <span style=\"color:var(--red)\">⚠<\/span>`;\n  document.getElementById(\"ins-2-desc\").textContent =\n    `Tỷ lệ Active thấp nhất: ${fmtPct(worstActive.activePct)} — thấp hơn ${(avgActive-worstActive.activePct).toFixed(1)}% so với TB hệ thống. Cần triển khai campaign kích hoạt và cải thiện onboarding journey.`;\n\n  // ── Insight 3: Cơ hội tái kích hoạt ──\n  document.getElementById(\"ins-3-val\").innerHTML = `${fmtPct(oppPct)} <span>KH<\/span>`;\n  document.getElementById(\"ins-3-desc\").textContent =\n    `${fmtN(inactiveDeposit)} KH đã nạp tiền nhưng chưa Active — nhóm tiềm năng tái kích hoạt cao nhất. Thiết lập quy trình retargeting trong 7–14 ngày sau nạp tiền.`;\n\n  // ── Insight 4: Chất lượng tài sản — phân khúc AUM ──\n  const mgVals = MGMTS.map(mg => {\n    let s=0, n=0;\n    filtered.filter(d=>d.mg===mg).forEach(d=>{s+=d.deposit;n++;});\n    return { mg, avg: n?s/n:0, n };\n  }).sort((a,b)=>b.avg-a.avg);\n  const topMg = mgVals[0], botMg = mgVals[mgVals.length-1];\n  document.getElementById(\"ins-4-val\").innerHTML = `${topMg.mg} <span>vs<\/span> ${botMg.mg}`;\n  document.getElementById(\"ins-4-desc\").textContent =\n    `Nhóm quản lý ${topMg.mg} có AUM/KH trung bình ${fmtM(topMg.avg)}, cao gấp ${botMg.avg>0?(topMg.avg/botMg.avg).toFixed(1):'∞'}× so với ${botMg.mg} (${fmtM(botMg.avg)}). Chuyển dịch danh mục sang MG là đòn bẩy tăng trưởng AUM lớn nhất.`;\n\n  // ── Insight 5: ROI & Chi phí ──\n  document.getElementById(\"ins-5-val\").innerHTML = `${bestROI.ch} <span>${bestROI.roi.toFixed(1)}×<\/span>`;\n  document.getElementById(\"ins-5-desc\").textContent =\n    `ROI net cao nhất: ${bestROI.ch} đạt ${bestROI.roi.toFixed(1)}× (phí NET / chi phí vận hành). ${worstROI.ch} có ROI thấp nhất (${worstROI.roi.toFixed(1)}×) — ưu tiên A/B test và tối ưu conversion funnel để cải thiện.`;\n}\n\n// ═══════════════════════════════════════════════\n//  ACTIVE RATE — COMBINED (channel + mgmt, side by side)\n// ═══════════════════════════════════════════════\nfunction renderActiveCombined(stats, cms) {\n  const svg = document.getElementById(\"active-combined-svg\");\n  const W=1100, H=300;\n  // Left panel: by channel\n  const L_pL=130, L_pR=60, L_pT=40, L_pB=36;\n  const L_W = 520;\n  const L_iW = L_W - L_pL - L_pR, L_iH = H - L_pT - L_pB;\n  // Right panel: by mgmt (offset by L_W + gap)\n  const gap = 60;\n  const R_off = L_W + gap;\n  const R_pL=80, R_pR=60, R_pT=40, R_pB=36;\n  const R_W = W - R_off;\n  const R_iW = R_W - R_pL - R_pR, R_iH = H - R_pT - R_pB;\n\n  const DOT_R = 9;\n\n  // Compute per-mgmt active rates\n  const mgStats = MGMTS.map(mg => {\n    let totalN=0, totalActive=0;\n    CHANNELS.forEach(ch => { totalN += cms[ch][mg].n; totalActive += cms[ch][mg].activeN; });\n    return { mg, v: totalN ? pctOf(totalActive, totalN) : 0, n: totalN };\n  });\n\n  const benchmarkCh = stats.reduce((s,x)=>s+x.activePct,0)/stats.length;\n  const benchmarkMg = mgStats.reduce((s,x)=>s+x.v,0)/mgStats.length;\n\n  let body = \"\";\n\n  // ── Panel titles\n  body += `<text x=\"${L_pL + L_iW/2}\" y=\"18\" text-anchor=\"middle\" fill=\"var(--text)\" style=\"font-size:12px;font-weight:800\">Theo Kênh phát triển<\/text>`;\n  body += `<text x=\"${R_off + R_pL + R_iW/2}\" y=\"18\" text-anchor=\"middle\" fill=\"var(--text)\" style=\"font-size:12px;font-weight:800\">Theo Hình thức quản lý<\/text>`;\n  body += `<line x1=\"${L_W + gap/2}\" y1=\"26\" x2=\"${L_W + gap/2}\" y2=\"${H-10}\" stroke=\"var(--border)\" stroke-width=\"1\" stroke-dasharray=\"5,4\" opacity=\"0.4\"/>`;\n\n  // ── LEFT: channels ──\n  const sortedCh = [...stats].sort((a,b)=>b.activePct-a.activePct);\n  const rowHCh = L_iH / sortedCh.length;\n\n  [0,25,50,75,100].forEach(v => {\n    const xx = L_pL + (v/100)*L_iW;\n    body += `<line x1=\"${xx}\" y1=\"${L_pT-6}\" x2=\"${xx}\" y2=\"${L_pT+L_iH+6}\" stroke=\"var(--border)\" stroke-width=\"${v===0?'1.2':'0.5'}\" stroke-dasharray=\"${v===0?'':'5,4'}\" opacity=\"0.65\"/>`;\n    body += `<text x=\"${xx}\" y=\"${L_pT+L_iH+18}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:9.5px;font-weight:600\">${v}%<\/text>`;\n  });\n  const bxCh = L_pL + (benchmarkCh/100)*L_iW;\n  body += `<line x1=\"${bxCh.toFixed(1)}\" y1=\"${L_pT-22}\" x2=\"${bxCh.toFixed(1)}\" y2=\"${L_pT+L_iH+6}\" stroke=\"var(--green)\" stroke-width=\"1.3\" stroke-dasharray=\"5,4\" opacity=\"0.5\"/>`;\n  body += `<text x=\"${bxCh.toFixed(1)}\" y=\"${L_pT+4}\" text-anchor=\"middle\" fill=\"var(--green)\" style=\"font-size:9px;font-weight:700;opacity:0.85\">TB ${benchmarkCh.toFixed(1)}%<\/text>`;\n\n  sortedCh.forEach((s,ci) => {\n    const rowY = (L_pT + (ci+0.5)*rowHCh).toFixed(1);\n    const dotX = (L_pL + (s.activePct/100)*L_iW).toFixed(1);\n    const col = CH_COLOR[s.ch];\n    const above = s.activePct >= benchmarkCh;\n    if (ci>0) body += `<line x1=\"${L_pL}\" y1=\"${(L_pT+ci*rowHCh).toFixed(1)}\" x2=\"${L_W-L_pR}\" y2=\"${(L_pT+ci*rowHCh).toFixed(1)}\" stroke=\"var(--border2)\" stroke-width=\"0.6\" opacity=\"0.4\"/>`;\n    body += `<text x=\"${L_pL-10}\" y=\"${+rowY+5}\" text-anchor=\"end\" fill=\"${col}\" style=\"font-size:11.5px;font-weight:800\">${s.ch}<\/text>`;\n    body += `<rect x=\"${L_pL}\" y=\"${(+rowY-DOT_R+1.5).toFixed(1)}\" width=\"${L_iW}\" height=\"${(DOT_R*2-3).toFixed(1)}\" rx=\"5\" fill=\"${col}\" fill-opacity=\"0.07\"/>`;\n    body += `<line x1=\"${L_pL}\" y1=\"${rowY}\" x2=\"${dotX}\" y2=\"${rowY}\" stroke=\"${col}\" stroke-width=\"3\" opacity=\"0.6\" stroke-linecap=\"round\"/>`;\n    const tip = `<b>${s.ch}<\/b><div class='tip-row'><span>Tỷ lệ Active<\/span><span>${fmtPct(s.activePct)}<\/span><\/div><div class='tip-row'><span>Tổng KH<\/span><span>${fmtN(s.n)}<\/span><\/div>`;\n    body += `<circle class=\"bar-rect\" cx=\"${dotX}\" cy=\"${rowY}\" r=\"${DOT_R}\" fill=\"${col}\" fill-opacity=\"${above?1:0.35}\" stroke=\"${col}\" stroke-width=\"2\" data-tip='${tip}'/>`;\n    body += `<text x=\"${(+dotX+DOT_R+8).toFixed(1)}\" y=\"${+rowY+5}\" fill=\"${col}\" style=\"font-size:13px;font-weight:800\">${s.activePct.toFixed(0)}%<\/text>`;\n    body += `<text x=\"${(L_W-L_pR+5).toFixed(1)}\" y=\"${+rowY+5}\" fill=\"${above?'var(--green)':'var(--red)'}\" style=\"font-size:10px;font-weight:900\">${above?'▲':'▼'}<\/text>`;\n  });\n\n  // ── RIGHT: mgmt ──\n  const sortedMg = [...mgStats].sort((a,b)=>b.v-a.v);\n  const rowHMg = R_iH / sortedMg.length;\n  const R_x0 = R_off + R_pL;\n\n  [0,25,50,75,100].forEach(v => {\n    const xx = R_x0 + (v/100)*R_iW;\n    body += `<line x1=\"${xx}\" y1=\"${R_pT-6}\" x2=\"${xx}\" y2=\"${R_pT+R_iH+6}\" stroke=\"var(--border)\" stroke-width=\"${v===0?'1.2':'0.5'}\" stroke-dasharray=\"${v===0?'':'5,4'}\" opacity=\"0.65\"/>`;\n    body += `<text x=\"${xx}\" y=\"${R_pT+R_iH+18}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:9.5px;font-weight:600\">${v}%<\/text>`;\n  });\n  const bxMg = R_x0 + (benchmarkMg/100)*R_iW;\n  body += `<line x1=\"${bxMg.toFixed(1)}\" y1=\"${R_pT-22}\" x2=\"${bxMg.toFixed(1)}\" y2=\"${R_pT+R_iH+6}\" stroke=\"var(--green)\" stroke-width=\"1.3\" stroke-dasharray=\"5,4\" opacity=\"0.5\"/>`;\n  body += `<text x=\"${bxMg.toFixed(1)}\" y=\"${R_pT+4}\" text-anchor=\"middle\" fill=\"var(--green)\" style=\"font-size:9px;font-weight:700;opacity:0.85\">TB ${benchmarkMg.toFixed(1)}%<\/text>`;\n\n  sortedMg.forEach((ms,mi) => {\n    const rowY = (R_pT + (mi+0.5)*rowHMg).toFixed(1);\n    const dotX = (R_x0 + (ms.v/100)*R_iW).toFixed(1);\n    const col = MG_COLOR[ms.mg];\n    const above = ms.v >= benchmarkMg;\n    if (mi>0) body += `<line x1=\"${R_x0}\" y1=\"${(R_pT+mi*rowHMg).toFixed(1)}\" x2=\"${R_off+R_W-R_pR}\" y2=\"${(R_pT+mi*rowHMg).toFixed(1)}\" stroke=\"var(--border2)\" stroke-width=\"0.6\" opacity=\"0.4\"/>`;\n    body += `<text x=\"${(R_x0-10).toFixed(1)}\" y=\"${+rowY+6}\" text-anchor=\"end\" fill=\"${col}\" style=\"font-size:14px;font-weight:800\">${ms.mg}<\/text>`;\n    body += `<rect x=\"${R_x0}\" y=\"${(+rowY-DOT_R+1.5).toFixed(1)}\" width=\"${R_iW}\" height=\"${(DOT_R*2-3).toFixed(1)}\" rx=\"5\" fill=\"${col}\" fill-opacity=\"0.08\"/>`;\n    body += `<line x1=\"${R_x0}\" y1=\"${rowY}\" x2=\"${dotX}\" y2=\"${rowY}\" stroke=\"${col}\" stroke-width=\"3.5\" opacity=\"0.6\" stroke-linecap=\"round\"/>`;\n    const tip = `<b>${ms.mg}<\/b><div class='tip-row'><span>Tỷ lệ Active<\/span><span>${fmtPct(ms.v)}<\/span><\/div><div class='tip-row'><span>Tổng KH<\/span><span>${fmtN(ms.n)}<\/span><\/div>`;\n    body += `<circle class=\"bar-rect\" cx=\"${dotX}\" cy=\"${rowY}\" r=\"${DOT_R}\" fill=\"${col}\" fill-opacity=\"${above?1:0.35}\" stroke=\"${col}\" stroke-width=\"2.5\" data-tip='${tip}'/>`;\n    body += `<text x=\"${(+dotX+DOT_R+9).toFixed(1)}\" y=\"${+rowY+6}\" fill=\"${col}\" style=\"font-size:15px;font-weight:800\">${ms.v.toFixed(0)}%<\/text>`;\n    body += `<text x=\"${(R_off+R_W-R_pR+5).toFixed(1)}\" y=\"${+rowY+6}\" fill=\"${above?'var(--green)':'var(--red)'}\" style=\"font-size:11px;font-weight:900\">${above?'▲':'▼'}<\/text>`;\n  });\n\n  svg.innerHTML = body;\n\n  document.getElementById(\"active-combined-legend\").innerHTML =\n    `<div class=\"leg\"><span style=\"color:var(--green);font-size:10px\">▲<\/span><span style=\"font-size:10px;margin-left:4px\">Trên trung bình<\/span><\/div>\n     <div class=\"leg\"><span style=\"color:var(--red);font-size:10px\">▼<\/span><span style=\"font-size:10px;margin-left:4px\">Dưới trung bình<\/span><\/div>`;\n}\n\n// ═══════════════════════════════════════════════\n//  TREND — AUM/KH per month per channel\n// ═══════════════════════════════════════════════\nfunction renderTrend() {\n  const svg = document.getElementById(\"trend-svg\");\n  const W=600, H=280;\n  const pL=72, pR=20, pT=24, pB=48;\n  const iW=W-pL-pR, iH=H-pT-pB;\n\n  // compute per channel per month avg AUM\n  const series = CHANNELS.map(ch => {\n    const pts = MONTHS.map(m => {\n      const sub = filtered.filter(d => d.month===m && d.ch===ch);\n      return sub.length ? avg(sub.map(d=>d.deposit)) : null;\n    });\n    return { ch, pts };\n  });\n\n  // max value\n  const maxV = Math.max(...series.flatMap(s=>s.pts.filter(v=>v!==null)), 1);\n  const ticks = 5;\n\n  let body = \"\";\n  // grid\n  for (let t=0;t<=ticks;t++) {\n    const yy = pT + iH - (t/ticks)*iH;\n    body += `<line x1=\"${pL}\" y1=\"${yy}\" x2=\"${W-pR}\" y2=\"${yy}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${pL-8}\" y=\"${yy+4}\" text-anchor=\"end\" fill=\"var(--text3)\" style=\"font-size:9px\">${fmtM(maxV*t/ticks)}<\/text>`;\n  }\n  // x axis labels\n  MONTHS.forEach((m,i) => {\n    const xx = pL + (i/(MONTHS.length-1)) * iW;\n    body += `<text x=\"${xx}\" y=\"${pT+iH+16}\" text-anchor=\"middle\" fill=\"var(--text2)\" style=\"font-size:10.5px;font-weight:700\">${MONTH_LBL[i]}<\/text>`;\n    body += `<line x1=\"${xx}\" y1=\"${pT}\" x2=\"${xx}\" y2=\"${pT+iH}\" stroke=\"var(--border)\" stroke-width=\"0.5\"/>`;\n  });\n\n  // lines\n  series.forEach(s => {\n    const col = CH_COLOR[s.ch];\n    let path = \"\";\n    const pts = [];\n    s.pts.forEach((v,i) => {\n      if (v === null) return;\n      const xx = pL + (i/(MONTHS.length-1))*iW;\n      const yy = pT + iH - (v/maxV)*iH;\n      pts.push({ xx, yy, v });\n      path += (path === \"\" ? \"M\" : \"L\") + `${xx.toFixed(1)},${yy.toFixed(1)}`;\n    });\n    if (path) {\n      body += `<path d=\"${path}\" fill=\"none\" stroke=\"${col}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.85\"/>`;\n      pts.forEach(p => {\n        const tip = `<b>${s.ch}<\/b><div class='tip-row'><span>AUM/KH TB<\/span><span>${fmtM(p.v)}<\/span><\/div>`;\n        body += `<circle class=\"line-dot\" cx=\"${p.xx.toFixed(1)}\" cy=\"${p.yy.toFixed(1)}\" r=\"4\" fill=\"${col}\" stroke=\"var(--surface)\" stroke-width=\"1.5\" data-tip='${tip}'/>`;\n      });\n    }\n  });\n\n  // legend\n  CHANNELS.forEach((ch,i) => {\n    const lx = pL + i*((W-pL-pR)/CHANNELS.length);\n    body += `<line x1=\"${lx}\" y1=\"${pT+iH+30}\" x2=\"${lx+12}\" y2=\"${pT+iH+30}\" stroke=\"${CH_COLOR[ch]}\" stroke-width=\"2\"/>`;\n    body += `<circle cx=\"${lx+6}\" cy=\"${pT+iH+30}\" r=\"3\" fill=\"${CH_COLOR[ch]}\"/>`;\n    body += `<text x=\"${lx+16}\" y=\"${pT+iH+34}\" fill=\"var(--text2)\" style=\"font-size:9.5px;font-weight:600\">${ch}<\/text>`;\n  });\n\n  svg.innerHTML = body;\n  document.getElementById(\"trend-legend\").innerHTML = CHANNELS.map(ch =>\n    `<div class=\"leg\"><span class=\"leg-dot\" style=\"background:${CH_COLOR[ch]}\"><\/span>${ch}<\/div>`).join(\"\");\n}\n\n// ═══════════════════════════════════════════════\n//  HEATMAP — AUM/KH by Channel × Mgmt\n// ═══════════════════════════════════════════════\n// ═══════════════════════════════════════════════\n//  TREND MGMT — AUM/KH per month per mgmt type\n// ═══════════════════════════════════════════════\nfunction renderTrendMgmt() {\n  const svg = document.getElementById(\"trend-mgmt-svg\");\n  const W=600, H=280;\n  const pL=72, pR=28, pT=24, pB=48;\n  const iW=W-pL-pR, iH=H-pT-pB;\n\n  // compute per mgmt per month avg AUM\n  const series = MGMTS.map(mg => {\n    const pts = MONTHS.map(m => {\n      const sub = filtered.filter(d => d.month===m && d.mg===mg);\n      return sub.length ? avg(sub.map(d=>d.deposit)) : null;\n    });\n    return { mg, pts };\n  });\n\n  const maxV = Math.max(...series.flatMap(s=>s.pts.filter(v=>v!==null)), 1);\n  const ticks = 5;\n\n  let body = \"\";\n\n  // Grid lines + Y axis\n  for (let t=0;t<=ticks;t++) {\n    const yy = pT + iH - (t/ticks)*iH;\n    body += `<line x1=\"${pL}\" y1=\"${yy}\" x2=\"${W-pR}\" y2=\"${yy}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${pL-8}\" y=\"${yy+4}\" text-anchor=\"end\" fill=\"var(--text3)\" style=\"font-size:9px\">${fmtM(maxV*t/ticks)}<\/text>`;\n  }\n\n  // X axis labels + vertical guides\n  MONTHS.forEach((m,i) => {\n    const xx = pL + (i/(MONTHS.length-1)) * iW;\n    body += `<text x=\"${xx}\" y=\"${pT+iH+16}\" text-anchor=\"middle\" fill=\"var(--text2)\" style=\"font-size:10.5px;font-weight:700\">${MONTH_LBL[i]}<\/text>`;\n    body += `<line x1=\"${xx}\" y1=\"${pT}\" x2=\"${xx}\" y2=\"${pT+iH}\" stroke=\"var(--border)\" stroke-width=\"0.5\"/>`;\n  });\n\n  // Area fills under each line (subtle)\n  series.forEach(s => {\n    const col = MG_COLOR[s.mg];\n    const validPts = [];\n    s.pts.forEach((v,i) => {\n      if (v === null) return;\n      const xx = pL + (i/(MONTHS.length-1))*iW;\n      const yy = pT + iH - (v/maxV)*iH;\n      validPts.push({ xx, yy, v });\n    });\n    if (validPts.length < 2) return;\n    let areaPath = `M${validPts[0].xx.toFixed(1)},${(pT+iH).toFixed(1)}`;\n    validPts.forEach(p => { areaPath += ` L${p.xx.toFixed(1)},${p.yy.toFixed(1)}`; });\n    areaPath += ` L${validPts[validPts.length-1].xx.toFixed(1)},${(pT+iH).toFixed(1)} Z`;\n    body += `<path d=\"${areaPath}\" fill=\"${col}\" fill-opacity=\"0.06\"/>`;\n  });\n\n  // Lines + dots\n  series.forEach(s => {\n    const col = MG_COLOR[s.mg];\n    let path = \"\";\n    const pts = [];\n    s.pts.forEach((v,i) => {\n      if (v === null) return;\n      const xx = pL + (i/(MONTHS.length-1))*iW;\n      const yy = pT + iH - (v/maxV)*iH;\n      pts.push({ xx, yy, v });\n      path += (path===\"\" ? \"M\" : \"L\") + `${xx.toFixed(1)},${yy.toFixed(1)}`;\n    });\n    if (path) {\n      body += `<path d=\"${path}\" fill=\"none\" stroke=\"${col}\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.9\"/>`;\n      pts.forEach(p => {\n        const tip = `<b>${s.mg}<\/b><div class='tip-row'><span>AUM/KH TB<\/span><span>${fmtM(p.v)}<\/span><\/div>`;\n        body += `<circle class=\"line-dot\" cx=\"${p.xx.toFixed(1)}\" cy=\"${p.yy.toFixed(1)}\" r=\"4.5\" fill=\"${col}\" stroke=\"var(--surface)\" stroke-width=\"1.5\" data-tip='${tip}'/>`;\n      });\n      // End-of-line value label\n      if (pts.length) {\n        const last = pts[pts.length-1];\n        body += `<text x=\"${(last.xx+10).toFixed(1)}\" y=\"${(last.yy+4).toFixed(1)}\" fill=\"${col}\" style=\"font-size:10px;font-weight:800\">${fmtM(last.v)}<\/text>`;\n      }\n    }\n  });\n\n  svg.innerHTML = body;\n\n  // Legend\n  document.getElementById(\"trend-mgmt-legend\").innerHTML = MGMTS.map(mg =>\n    `<div class=\"leg\"><span class=\"leg-dot\" style=\"background:${MG_COLOR[mg]}\"><\/span>${mg}<\/div>`).join(\"\");\n}\n\n\n// ═══════════════════════════════════════════════\n//  DEPOSIT BUCKETS — stacked pct bar\n// ═══════════════════════════════════════════════\nfunction renderBuckets() {\n  const svg = document.getElementById(\"bucket-svg\");\n  const W=1100, H=280;\n  const pL=120, pR=30, pT=28, pB=40;\n  const iW=W-pL-pR, iH=H-pT-pB;\n\n  const BUCKETS = [\n    { label:\"Chưa nạp\", fn: d => d.deposit === 0, color:\"#8b949e\" },\n    { label:\"< 10tr\",   fn: d => d.deposit > 0 && d.deposit < 10_000_000, color:\"#58a6ff\" },\n    { label:\"10–50tr\",  fn: d => d.deposit >= 10_000_000 && d.deposit < 50_000_000, color:\"#3fb950\" },\n    { label:\"50–200tr\", fn: d => d.deposit >= 50_000_000 && d.deposit < 200_000_000, color:\"#f0a800\" },\n    { label:\"> 200tr\",  fn: d => d.deposit >= 200_000_000, color:\"#f85149\" },\n  ];\n\n  const rowH = iH / CHANNELS.length - 6;\n\n  let body = \"\";\n  CHANNELS.forEach((ch, ci) => {\n    const sub = filtered.filter(d => d.ch === ch);\n    const n = sub.length || 1;\n    const y = pT + ci*(rowH+6);\n    let cumX = pL;\n    BUCKETS.forEach(b => {\n      const cnt = sub.filter(b.fn).length;\n      const bw = (cnt/n)*iW;\n      const tip = `<b>${ch} — ${b.label}<\/b><div class='tip-row'><span>Số KH<\/span><span>${fmtN(cnt)}<\/span><\/div><div class='tip-row'><span>Tỷ trọng<\/span><span>${fmtPct(pctOf(cnt,sub.length))}<\/span><\/div>`;\n      if (bw > 1) {\n        body += `<rect class=\"bar-rect\" x=\"${cumX.toFixed(1)}\" y=\"${y}\" width=\"${bw.toFixed(1)}\" height=\"${rowH}\" fill=\"${b.color}\" fill-opacity=\"0.8\" data-tip='${tip}'/>`;\n        if (bw > 32) body += `<text x=\"${(cumX+bw/2).toFixed(1)}\" y=\"${y+rowH/2+4}\" text-anchor=\"middle\" fill=\"#000\" fill-opacity=\"0.85\" style=\"font-size:10px;font-weight:800\">${Math.round(cnt/n*100)}%<\/text>`;\n      }\n      cumX += bw;\n    });\n    body += `<text x=\"${pL-8}\" y=\"${y+rowH/2+5}\" text-anchor=\"end\" fill=\"${CH_COLOR[ch]}\" style=\"font-size:12px;font-weight:750\">${ch}<\/text>`;\n  });\n  // legend\n  BUCKETS.forEach((b,i) => {\n    body += `<rect x=\"${pL+i*110}\" y=\"${pT+iH+14}\" width=\"10\" height=\"10\" rx=\"2\" fill=\"${b.color}\"/>`;\n    body += `<text x=\"${pL+i*110+14}\" y=\"${pT+iH+23}\" fill=\"var(--text2)\" style=\"font-size:10.5px;font-weight:600\">${b.label}<\/text>`;\n  });\n\n  svg.innerHTML = body;\n  document.getElementById(\"bucket-legend\").innerHTML = `<div class=\"leg\"><span style=\"font-size:10px;color:var(--text3)\">Tỷ lệ % trên từng hàng = 100%<\/span><\/div>`;\n}\n\n// ═══════════════════════════════════════════════\nfunction renderScatter(stats) {\n  const svg = document.getElementById(\"scatter-svg\");\n  const W=520, H=280;\n  const pL=72, pR=40, pT=28, pB=44;\n  const iW=W-pL-pR, iH=H-pT-pB;\n\n  // X = Chi phí/KH (VND), Y = Phí NET/KH (feeAvg, VND)\n  const pts = stats.map(s => {\n    const costPerKH = (CH_COST_PER_1000[s.ch] || 0) * 1e6 / 1000; // VND per customer\n    const feePerKH  = s.feeAvg;                                     // VND per customer\n    const roi       = costPerKH > 0 ? feePerKH / costPerKH : 0;\n    return { ch: s.ch, x: costPerKH, y: feePerKH, n: s.n, roi };\n  });\n\n  const maxX = Math.max(...pts.map(p=>p.x), 1);\n  const maxY = Math.max(...pts.map(p=>p.y), 1);\n  const maxN = Math.max(...pts.map(p=>p.n), 1);\n  // Avg lines\n  const avgX = pts.reduce((a,p)=>a+p.x,0)/pts.length;\n  const avgY = pts.reduce((a,p)=>a+p.y,0)/pts.length;\n\n  let body = \"\";\n\n  // Quadrant shading: top-left = best (high fee, low cost)\n  const qx = pL + (avgX/maxX)*iW;\n  const qy = pT + iH - (avgY/maxY)*iH;\n  body += `<rect x=\"${pL}\" y=\"${pT}\" width=\"${(qx-pL).toFixed(1)}\" height=\"${(qy-pT).toFixed(1)}\" fill=\"rgba(63,185,80,0.04)\"/>`;\n  body += `<rect x=\"${qx.toFixed(1)}\" y=\"${qy.toFixed(1)}\" width=\"${(W-pR-qx).toFixed(1)}\" height=\"${(pT+iH-qy).toFixed(1)}\" fill=\"rgba(248,81,73,0.04)\"/>`;\n\n  // Grid\n  for (let t=0;t<=4;t++) {\n    const yy = pT + iH - (t/4)*iH;\n    const val = maxY*t/4;\n    body += `<line x1=\"${pL}\" y1=\"${yy}\" x2=\"${W-pR}\" y2=\"${yy}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${pL-6}\" y=\"${yy+4}\" text-anchor=\"end\" fill=\"var(--text3)\" style=\"font-size:8px\">${val>=1e6?(val/1e6).toFixed(0)+'M':Math.round(val/1000)+'K'}<\/text>`;\n  }\n  for (let t=0;t<=4;t++) {\n    const xx = pL + (t/4)*iW;\n    const val = maxX*t/4;\n    body += `<line x1=\"${xx}\" y1=\"${pT}\" x2=\"${xx}\" y2=\"${pT+iH}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${xx}\" y=\"${pT+iH+14}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:8px\">${val>=1e6?(val/1e6).toFixed(0)+'M':Math.round(val/1000)+'K'}<\/text>`;\n  }\n\n  // Average crosshair lines\n  body += `<line x1=\"${qx.toFixed(1)}\" y1=\"${pT}\" x2=\"${qx.toFixed(1)}\" y2=\"${pT+iH}\" stroke=\"#f0a800\" stroke-width=\"1\" stroke-dasharray=\"4,3\" opacity=\"0.45\"/>`;\n  body += `<line x1=\"${pL}\" y1=\"${qy.toFixed(1)}\" x2=\"${W-pR}\" y2=\"${qy.toFixed(1)}\" stroke=\"#f0a800\" stroke-width=\"1\" stroke-dasharray=\"4,3\" opacity=\"0.45\"/>`;\n\n  // Quadrant labels\n  body += `<text x=\"${(pL+8).toFixed(1)}\" y=\"${(pT+12).toFixed(1)}\" fill=\"var(--green)\" style=\"font-size:8px;font-weight:700;opacity:0.6\">↑ Hiệu quả cao<\/text>`;\n  body += `<text x=\"${(qx+8).toFixed(1)}\" y=\"${(pT+iH-6).toFixed(1)}\" fill=\"var(--red)\" style=\"font-size:8px;font-weight:700;opacity:0.6\">Chi phí cao ↓<\/text>`;\n\n  // Axis labels\n  body += `<text x=\"${pL-48}\" y=\"${pT+iH/2}\" text-anchor=\"middle\" fill=\"var(--text3)\" transform=\"rotate(-90,${pL-48},${pT+iH/2})\" style=\"font-size:9px\">Phí NET/KH (đ)<\/text>`;\n  body += `<text x=\"${pL+iW/2}\" y=\"${pT+iH+30}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:9px\">Chi phí/KH (đ)<\/text>`;\n\n  // Bubbles\n  pts.forEach(p => {\n    const cx = pL + (p.x/maxX)*iW;\n    const cy = pT + iH - (p.y/maxY)*iH;\n    const r  = 10 + (p.n/maxN)*20;\n    const col = CH_COLOR[p.ch];\n    const tip = `<b>${p.ch}<\/b><div class='tip-row'><span>Chi phí/KH<\/span><span>${fmtN(Math.round(p.x))}đ<\/span><\/div><div class='tip-row'><span>Phí NET/KH<\/span><span>${fmtM(p.y)}<\/span><\/div><div class='tip-row'><span>ROI (phí/chi phí)<\/span><span>${p.roi.toFixed(1)}×<\/span><\/div><div class='tip-row'><span>Số KH<\/span><span>${fmtN(p.n)}<\/span><\/div>`;\n    body += `<circle cx=\"${cx.toFixed(1)}\" cy=\"${cy.toFixed(1)}\" r=\"${r.toFixed(1)}\" fill=\"${col}\" fill-opacity=\"0.25\" stroke=\"${col}\" stroke-width=\"2\" data-tip='${tip}' class=\"bar-rect\"/>`;\n    body += `<text x=\"${cx.toFixed(1)}\" y=\"${(cy+4).toFixed(1)}\" text-anchor=\"middle\" fill=\"${col}\" style=\"font-size:10px;font-weight:800\">${p.ch.split(\" \")[0]}<\/text>`;\n  });\n\n  svg.innerHTML = body;\n}\n\n// ═══════════════════════════════════════════════\n//  TOOLTIP\n// ═══════════════════════════════════════════════\nconst tip = document.getElementById(\"tip\");\ndocument.addEventListener(\"mouseover\", e => {\n  const el = e.target.closest(\"[data-tip]\");\n  if (el) { tip.innerHTML = el.getAttribute(\"data-tip\"); tip.style.display = \"block\"; }\n});\ndocument.addEventListener(\"mousemove\", e => {\n  if (tip.style.display === \"block\") {\n    const x = e.clientX + 14, y = e.clientY - 12;\n    tip.style.left = Math.min(x, window.innerWidth - 260) + \"px\";\n    tip.style.top  = Math.max(y, 10) + \"px\";\n  }\n});\ndocument.addEventListener(\"mouseout\", e => {\n  if (e.target.closest(\"[data-tip]\")) tip.style.display = \"none\";\n});\n\n// ═══════════════════════════════════════════════\n//  INIT\n// ═══════════════════════════════════════════════\nwindow.onload = () => {\n  rawData   = genData();\n  filtered  = [...rawData];\n  renderAll();\n};\n<\/script>\n<\/body>\n<\/html>\n" },
  page3: { title: "Hiệu quả theo hình thức quản lý", html: "<!DOCTYPE html>\n<html lang=\"vi\">\n<head>\n<meta charset=\"utf-8\"/>\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"/>\n<title>Hiệu quả theo hình thức quản lý<\/title>\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap');\n:root{\n  --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--surface3:#21262d;\n  --border:#30363d;--border2:#21262d;\n  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;\n  --brand:#f0a800;--brand2:#ffc233;--brand-dim:rgba(240,168,0,0.15);--brand-glow:rgba(240,168,0,0.3);\n  --green:#3fb950;--green-dim:rgba(63,185,80,0.12);\n  --blue:#58a6ff;--blue-dim:rgba(88,166,255,0.12);\n  --red:#f85149;--red-dim:rgba(248,81,73,0.12);\n  --purple:#bc8cff;--purple-dim:rgba(188,140,255,0.12);\n  --teal:#39d353;--orange:#d29922;--pink:#f778ba;\n  --ch1:#3fb950;--ch2:#58a6ff;--ch3:#bc8cff;--ch4:#f0a800;--ch5:#f85149;\n  --shadow-sm:0 1px 3px rgba(0,0,0,0.4);\n  --shadow:0 8px 24px rgba(0,0,0,0.5);\n  --shadow-lg:0 16px 48px rgba(0,0,0,0.6);\n  --radius:12px;--radius-sm:8px;--radius-lg:16px;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{background:var(--bg);color:var(--text);font-family:'Be Vietnam Pro',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}\ncode,kbd,samp{font-family:'DM Mono','Courier New',monospace}\n\n/* ── Scrollbar ── */\n::-webkit-scrollbar{width:6px;height:6px}\n::-webkit-scrollbar-track{background:var(--surface)}\n::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}\n::-webkit-scrollbar-thumb:hover{background:var(--brand)}\n\n/* ── Layout ── */\n.page{max-width:1760px;margin:0 auto;padding:28px 32px 60px}\n\n/* ── Hero ── */\n.hero{\n  background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 50%,#1a1500 100%);\n  border:1px solid var(--border);border-radius:var(--radius-lg);\n  padding:32px 40px;margin-bottom:28px;position:relative;overflow:hidden;\n}\n.hero::before{\n  content:\"\";position:absolute;top:0;right:0;width:600px;height:100%;\n  background:radial-gradient(ellipse at 80% 50%,rgba(240,168,0,0.08) 0%,transparent 65%);\n  pointer-events:none\n}\n.hero::after{\n  content:\"\";position:absolute;bottom:-60px;right:-40px;\n  width:300px;height:300px;border-radius:50%;\n  background:radial-gradient(circle,rgba(240,168,0,0.05) 0%,transparent 70%);\n  pointer-events:none\n}\n.hero-row{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;position:relative;z-index:1}\n.hero-tag{display:inline-flex;align-items:center;gap:8px;background:var(--brand-dim);border:1px solid rgba(240,168,0,0.3);padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}\n.hero h1{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.5px;line-height:1.2}\n.hero h1 span{color:var(--brand)}\n.hero p{font-size:13px;color:var(--text2);margin-top:8px;max-width:580px;line-height:1.6}\n.hero-stats{display:flex;gap:16px;flex-wrap:wrap}\n.hero-stat{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 22px;text-align:center;min-width:120px}\n.hero-stat-val{font-size:24px;font-weight:800;color:var(--brand);display:block}\n.hero-stat-lbl{font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}\n\n/* ── Filters (sticky) ── */\n.filters{background:rgba(22,27,34,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius);padding:16px 24px;margin-bottom:28px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;position:sticky;top:8px;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,0.5)}\n\n/* ── Sticky indicator ── */\n.sticky-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(240,168,0,0.12);border:1px solid rgba(240,168,0,0.25);color:var(--brand);font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:0.5px;margin-left:8px;vertical-align:middle}\n.fg{display:flex;flex-direction:column;gap:7px;flex:1;min-width:140px}\n.fg-date{flex:0 0 148px}\n.fg label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px}\n.fc{height:40px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;font-size:12.5px;font-weight:600;color:var(--text);font-family:inherit;cursor:pointer;outline:none;transition:border-color 0.2s,box-shadow 0.2s;width:100%}\n.fc:focus,.fc:hover{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-dim)}\n.fc option{background:var(--surface2)}\n.btn-reset{height:40px;background:var(--brand);color:#000;border:none;border-radius:var(--radius-sm);font-size:12.5px;font-weight:800;cursor:pointer;padding:0 20px;white-space:nowrap;transition:background 0.2s,transform 0.1s;font-family:inherit}\n.btn-reset:hover{background:var(--brand2);transform:translateY(-1px)}\n.btn-reset:active{transform:translateY(0)}\n\n/* ── Section header ── */\n.section-head{\n  display:flex;align-items:center;gap:14px;\n  margin-bottom:20px;margin-top:16px;\n  padding:14px 20px;\n  background:linear-gradient(90deg,rgba(240,168,0,0.07) 0%,rgba(240,168,0,0.02) 60%,transparent 100%);\n  border-left:3px solid var(--brand);\n  border-radius:0 var(--radius-sm) var(--radius-sm) 0;\n  position:relative;\n}\n.section-head::before{\n  content:\"\";position:absolute;inset:0;\n  border-radius:0 var(--radius-sm) var(--radius-sm) 0;\n  box-shadow:inset 0 0 0 1px rgba(240,168,0,0.1);\n  pointer-events:none;\n}\n.section-head h2{\n  font-size:17px;font-weight:800;\n  color:var(--text);\n  letter-spacing:-0.3px;\n  text-shadow:0 0 24px rgba(240,168,0,0.15);\n}\n.section-tag{\n  background:var(--brand);\n  color:#000;\n  font-size:10px;font-weight:800;\n  padding:4px 11px;\n  border-radius:99px;\n  border:none;\n  text-transform:uppercase;\n  letter-spacing:0.8px;\n  box-shadow:0 0 10px rgba(240,168,0,0.4);\n  flex-shrink:0;\n}\n.section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(240,168,0,0.25) 0%,transparent 100%)}\n\n/* ── KPI Grid ── */\n.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px}\n@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}\n@media(max-width:700px){.kpi-grid{grid-template-columns:1fr 1fr}}\n@media(max-width:500px){.kpi-grid{grid-template-columns:1fr}}\n.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden;cursor:default;transition:border-color 0.25s,transform 0.25s,box-shadow 0.25s}\n.kpi-card:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:0 0 0 1px var(--brand),var(--shadow)}\n.kpi-card::after{content:\"\";position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(240,168,0,0.04),transparent 60%);pointer-events:none}\n.kpi-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:14px;flex-shrink:0}\n.kpi-label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}\n.kpi-value{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1;color:var(--text)}\n.kpi-delta{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:5px}\n.kpi-delta.up{color:var(--green);background:var(--green-dim)}\n.kpi-delta.down{color:var(--red);background:var(--red-dim)}\n.kpi-delta.neutral{color:var(--text2);background:rgba(255,255,255,0.04)}\n.kpi-sub{font-size:11px;color:var(--text3);margin-top:6px}\n\n/* ── Main grid ── */\n.charts-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:20px;margin-bottom:20px}\n.col-12{grid-column:span 12}\n.col-8{grid-column:span 8}\n.col-4{grid-column:span 4}\n.col-7{grid-column:span 7}\n.col-5{grid-column:span 5}\n.col-6{grid-column:span 6}\n@media(max-width:1200px){.col-8,.col-7{grid-column:span 12}.col-4,.col-5{grid-column:span 12}.col-6{grid-column:span 12}}\n@media(max-width:960px){.col-7,.col-5{grid-column:span 12}}\n\n/* ── Chart box ── */\n.cbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:relative;overflow:hidden;transition:border-color 0.25s,box-shadow 0.25s}\n.cbox:hover{border-color:rgba(240,168,0,0.3);box-shadow:0 0 20px rgba(240,168,0,0.05)}\n.cbox-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:12px;flex-wrap:wrap}\n.cbox-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}\n.cbox-sub{font-size:11.5px;color:var(--text3);line-height:1.5}\n.cbox-legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center}\n.leg{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;padding:3px 0;transition:color 0.2s}\n.leg:hover{color:var(--text)}\n.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}\n.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}\n.cbox-body{position:relative;width:100%;min-height:280px;display:flex;align-items:center;justify-content:center}\n.cbox-body svg{overflow:visible;width:100%;height:100%}\n\n/* ── Channel scorecard table ── */\n.sc-table{width:100%;border-collapse:collapse;font-size:12.5px}\n.sc-table thead th{padding:9px 14px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}\n.sc-table thead th:first-child{text-align:left}\n.sc-table tbody tr{border-bottom:1px solid var(--border2);transition:background 0.15s;cursor:default}\n.sc-table tbody tr:last-child{border-bottom:none}\n.sc-table tbody tr:hover{background:rgba(255,255,255,0.025)}\n.sc-table td{padding:10px 14px;text-align:right;color:var(--text);font-weight:600;vertical-align:middle}\n.sc-table td:first-child{text-align:left;font-weight:700}\n.sc-rank{width:22px;height:22px;border-radius:6px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}\n.badge-ch{display:inline-flex;align-items:center;gap:7px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;border:1px solid}\n.badge-good{background:var(--green-dim);color:var(--green);border-color:rgba(63,185,80,0.3)}\n.badge-warn{background:rgba(210,153,34,0.12);color:#d29922;border-color:rgba(210,153,34,0.3)}\n.badge-bad{background:var(--red-dim);color:var(--red);border-color:rgba(248,81,73,0.3)}\n.badge-avg{background:var(--blue-dim);color:var(--blue);border-color:rgba(88,166,255,0.3)}\n.bar-inline{display:inline-block;height:6px;border-radius:3px;vertical-align:middle;margin-left:6px;max-width:80px}\n.trend-pill{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:4px}\n.trend-up{background:var(--green-dim);color:var(--green)}\n.trend-dn{background:var(--red-dim);color:var(--red)}\n.trend-neu{background:rgba(255,255,255,0.04);color:var(--text3)}\n\n/* ── Gauge / Radial ── */\n.gauge-group{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;padding:8px 0}\n.gauge-item{text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:90px}\n.gauge-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px}\n.gauge-val{font-size:14px;font-weight:800;color:var(--text)}\n.gauge-sub{font-size:10px;color:var(--text3)}\n\n/* ── Tooltip ── */\n.tip{position:fixed;background:var(--surface3);backdrop-filter:blur(16px);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:12px;pointer-events:none;box-shadow:var(--shadow-lg);display:none;z-index:9999;line-height:1.6;max-width:240px}\n.tip b{display:block;margin-bottom:4px;color:var(--brand);font-size:12.5px}\n.tip .tip-row{display:flex;justify-content:space-between;gap:16px;font-size:11.5px}\n.tip .tip-row span:last-child{font-weight:700;color:var(--text)}\n\n/* ── Insight Panel ── */\n.insight-panel{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}\n@media(max-width:900px){.insight-panel{grid-template-columns:1fr 1fr}}\n@media(max-width:600px){.insight-panel{grid-template-columns:1fr}}\n.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;transition:border-color 0.25s,transform 0.25s}\n.insight-card:hover{border-color:rgba(240,168,0,0.35);transform:translateY(-2px)}\n.insight-card::before{content:\"\";position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}\n.insight-card.green::before{background:linear-gradient(90deg,var(--green),transparent)}\n.insight-card.blue::before{background:linear-gradient(90deg,var(--blue),transparent)}\n.insight-card.brand::before{background:linear-gradient(90deg,var(--brand),transparent)}\n.insight-icon{font-size:22px;margin-bottom:10px}\n.insight-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px}\n.insight-value{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.5px;line-height:1.1;margin-bottom:6px}\n.insight-value span{color:var(--brand)}\n.insight-desc{font-size:11.5px;color:var(--text2);line-height:1.5}\n\n/* ── Action Summary ── */\n.action-panel{background:linear-gradient(135deg,var(--surface) 0%,rgba(26,21,0,0.9) 100%);border:1px solid rgba(240,168,0,0.25);border-radius:var(--radius-lg);padding:28px 32px;margin-top:28px;position:relative;overflow:hidden}\n.action-panel::before{content:\"\";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--brand),transparent)}\n.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-top:20px}\n@media(max-width:900px){.action-grid{grid-template-columns:1fr 1fr}}\n@media(max-width:600px){.action-grid{grid-template-columns:1fr}}\n.action-item{background:rgba(255,255,255,0.03);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:16px 18px;display:flex;gap:12px;align-items:flex-start}\n.action-num{width:26px;height:26px;border-radius:7px;background:var(--brand-dim);border:1px solid rgba(240,168,0,0.3);color:var(--brand);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}\n.action-text strong{display:block;font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:4px}\n.action-text p{font-size:11.5px;color:var(--text2);line-height:1.5}\n.action-priority{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:6px}\n.priority-high{background:var(--red-dim);color:var(--red)}\n.priority-med{background:rgba(210,153,34,0.12);color:#d29922}\n.priority-low{background:var(--green-dim);color:var(--green)}\n\n/* ── Channel×Mgmt Analysis Panel ── */\n.cm-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;overflow:hidden;transition:border-color 0.25s,box-shadow 0.25s}\n.cm-panel:hover{border-color:rgba(240,168,0,0.3);box-shadow:0 0 20px rgba(240,168,0,0.05)}\n.cm-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}\n.cm-tab{height:32px;padding:0 16px;border-radius:var(--radius-sm);font-size:11.5px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:inherit;transition:all 0.2s}\n.cm-tab:hover{border-color:rgba(240,168,0,0.4);color:var(--text)}\n.cm-tab.active{background:var(--brand-dim);border-color:rgba(240,168,0,0.5);color:var(--brand)}\n.cm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}\n@media(max-width:1100px){.cm-grid{grid-template-columns:repeat(2,1fr)}}\n@media(max-width:700px){.cm-grid{grid-template-columns:1fr}}\n.cm-card{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:16px 18px;position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.2s}\n.cm-card:hover{border-color:var(--brand);transform:translateY(-1px)}\n.cm-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}\n.cm-ch-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;padding:3px 10px;border-radius:5px;border:1px solid}\n.cm-mg-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,0.06);color:var(--text3)}\n.cm-stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border2)}\n.cm-stat-row:last-child{border-bottom:none;padding-bottom:0}\n.cm-stat-label{font-size:10.5px;color:var(--text3);font-weight:600}\n.cm-stat-val{font-size:12px;font-weight:800;color:var(--text)}\n.cm-mini-bar-wrap{margin-top:10px}\n.cm-mini-bar-track{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-top:4px}\n.cm-mini-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}\n.cm-n-badge{font-size:9.5px;color:var(--text3);font-weight:600;margin-top:8px}\n.cm-rank-tag{position:absolute;top:10px;right:10px;font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:0.3px}\n\n/* ── Summary Matrix Table ── */\n.matrix-wrap{overflow-x:auto;margin-top:8px}\n.matrix-table{width:100%;border-collapse:collapse;font-size:11.5px;min-width:560px}\n.matrix-table th{padding:8px 14px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;border-bottom:1px <\/div>\n      <\/div>\n    <\/div>\n    <div id=\"scorecard-wrap\" style=\"overflow-x:auto\"><\/div>\n  <\/div>\n  <div class=\"cbox col-5 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Chi phí/KH vs Phí NET/KH theo Kênh<\/div>\n        <div class=\"cbox-sub\">So sánh chi phí vận hành trên mỗi KH với phí net thu được — bubble size = số KH.<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:280px\">\n      <svg id=\"scatter-svg\" viewBox=\"0 0 520 280\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- ── Row 1b: Mgmt Scorecard + Mgmt Scatter ── -->\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-7 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Bảng so sánh chỉ số hiệu quả — Theo Hình thức quản lý<\/div>\n        <div class=\"cbox-sub\">AUM/KH, Phí/KH, Tỷ lệ Active và điểm Hiệu quả tổng hợp theo MG / CTV / NoID.<\/div>\n      <\/div>\n    <\/div>\n    <div id=\"scorecard-mgmt-wrap\" style=\"overflow-x:auto\"><\/div>\n  <\/div>\n  <div class=\"cbox col-5 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Chi phí/KH vs Phí NET/KH theo Hình thức quản lý<\/div>\n        <div class=\"cbox-sub\">So sánh chi phí vận hành trên mỗi KH với phí net thu được — bubble size = số KH.<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:280px\">\n      <svg id=\"scatter-mgmt-svg\" viewBox=\"0 0 520 280\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- ── Row 2: AUM/KH grouped bar ── -->\n<div class=\"section-head\"><h2>AUM & Phí phân tích<\/h2><span class=\"section-tag\">Revenue Quality<\/span><div class=\"section-line\"><\/div><\/div>\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-12 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">AUM trung bình / Khách hàng theo Hình thức quản lý<\/div>\n        <div class=\"cbox-sub\">So sánh tài sản trung bình mỗi khách hàng theo từng hình thức quản lý (MG / CTV / NoID), phân tách theo Kênh phát triển.<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"aum-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:300px\">\n      <svg id=\"aum-svg\" viewBox=\"0 0 1100 300\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- ── Row 2b: Fee bar ── -->\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-12 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Phí net / Khách hàng theo Kênh theo Hình thức quản lý<\/div>\n        <div class=\"cbox-sub\">Phí giao dịch bình quân ước tính theo từng Kênh, phân tách theo Hình thức quản lý (MG / CTV / NoID).<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"fee-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:300px\">\n      <svg id=\"fee-svg\" viewBox=\"0 0 1100 300\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n\n<!-- ── Row 3: Active Rate — merged 1 chart ── -->\n<div class=\"section-head\"><h2>Chất lượng chuyển đổi<\/h2><span class=\"section-tag\">Conversion<\/span><div class=\"section-line\"><\/div><span style=\"font-size:11px;color:var(--text3);margin-left:8px\">2 biểu đồ → 1 biểu đồ kết hợp<\/span><\/div>\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-12 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Tỷ lệ Active theo Kênh & Hình thức quản lý — Biểu đồ kết hợp<\/div>\n        <div class=\"cbox-sub\">% KH kích hoạt giao dịch — phân tách đồng thời theo kênh phát triển và hình thức quản lý (MG / CTV / NoID).<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"active-combined-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:300px\">\n      <svg id=\"active-combined-svg\" viewBox=\"0 0 1100 300\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- ── Row 4: Monthly trend — 3 charts ── -->\n<div class=\"section-head\"><h2>Xu hướng<\/h2><span class=\"section-tag\">Trend<\/span><div class=\"section-line\"><\/div><span style=\"font-size:11px;color:var(--text3);margin-left:8px\">3 biểu đồ xu hướng độc lập<\/span><\/div>\n\n<!-- Chart 1: Trend by Channel -->\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-12 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">① Xu hướng AUM/KH theo tháng — Kênh phát triển<\/div>\n        <div class=\"cbox-sub\">Theo dõi biến động AUM trung bình mỗi khách hàng theo từng kênh mở tài khoản (App / Web / Loop / Teller / Bank) qua 5 tháng.<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"trend-ch-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:300px\">\n      <svg id=\"trend-ch-svg\" viewBox=\"0 0 1100 300\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- Chart 2: Trend by Mgmt -->\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-12 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">② Xu hướng AUM/KH theo tháng — Hình thức quản lý<\/div>\n        <div class=\"cbox-sub\">Theo dõi biến động AUM trung bình mỗi khách hàng theo hình thức quản lý (MG / CTV / NoID) qua 5 tháng.<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"trend-mg-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:300px\">\n      <svg id=\"trend-mg-svg\" viewBox=\"0 0 1100 300\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- Chart 3: Cross Trend Channel × Mgmt -->\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-12 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">③ Xu hướng AUM/KH theo tháng — Giao thoa Kênh × Hình thức quản lý<\/div>\n        <div class=\"cbox-sub\">Mỗi nhóm (MG / CTV / NoID) hiển thị riêng — theo dõi xu hướng từng kênh phát triển trong từng hình thức quản lý theo tháng.<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"trend-cross-legend\"><\/div>\n    <\/div>\n    <!-- Tab selector for mgmt group -->\n    <div style=\"display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap\" id=\"trend-cross-tabs\">\n      <button class=\"cm-tab active\" onclick=\"setTrendCrossTab('MG',this)\">Môi giới (MG)<\/button>\n      <button class=\"cm-tab\" onclick=\"setTrendCrossTab('CTV',this)\">Cộng tác viên (CTV)<\/button>\n      <button class=\"cm-tab\" onclick=\"setTrendCrossTab('NoID',this)\">Không ID (NoID)<\/button>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:300px\">\n      <svg id=\"trend-cross-svg\" viewBox=\"0 0 1100 300\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- ── Row 5: Thời gian chuyển đổi ── -->\n<div class=\"section-head\"><h2>Phân tích thời gian chuyển đổi<\/h2><span class=\"section-tag\">Conversion Time<\/span><div class=\"section-line\"><\/div><\/div>\n\n<!-- Chart A: Days to First Deposit by Channel -->\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-12 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Số ngày bình quân từ mở tài khoản đến nạp tiền lần đầu — theo Kênh & Hình thức quản lý<\/div>\n        <div class=\"cbox-sub\">Chỉ tính KH đã nạp tiền. Số ngày càng thấp = tốc
