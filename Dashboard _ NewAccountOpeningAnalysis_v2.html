độ chuyển đổi càng nhanh. Phân tách theo hình thức quản lý (MG / CTV / NoID).<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"conv-deposit-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:300px\">\n      <svg id=\"conv-deposit-svg\" viewBox=\"0 0 1100 360\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- Chart B: Days to First Trade by Channel -->\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-12 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Số ngày bình quân từ mở tài khoản đến phát sinh giao dịch đầu tiên — theo Kênh & Hình thức quản lý<\/div>\n        <div class=\"cbox-sub\">Chỉ tính KH đã giao dịch. Bao gồm độ trễ sau nạp tiền trước khi giao dịch lần đầu. Phân tách theo hình thức quản lý.<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"conv-trade-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:300px\">\n      <svg id=\"conv-trade-svg\" viewBox=\"0 0 1100 360\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- ── Action Summary ── -->\n<div class=\"action-panel anim-in\">\n  <div class=\"section-head\" style=\"margin-bottom:8px;margin-top:0\">\n    <h2>Kết luận & Đề xuất hành động<\/h2>\n    <span class=\"section-tag\">Action Summary<\/span>\n    <div class=\"section-line\"><\/div>\n    <span style=\"font-size:10px;color:var(--brand);background:var(--brand-dim);border:1px solid rgba(240,168,0,0.3);padding:2px 10px;border-radius:99px;margin-left:8px;font-weight:700;letter-spacing:0.4px\">⚡ Tự động từ dữ liệu<\/span>\n  <\/div>\n  <p style=\"font-size:12.5px;color:var(--text2);margin-bottom:16px\" id=\"action-summary-lead\"><\/p>\n  <div class=\"action-grid\" id=\"action-grid\"><\/div>\n<\/div>\n\n<\/div><!-- /page -->\n<div class=\"tip\" id=\"tip\"><\/div>\n\n<script>\n// ═══════════════════════════════════════════════\n//  DATA & CONFIG\n// ═══════════════════════════════════════════════\nconst CHANNELS   = [\"App (M)\",\"Web (O)\",\"Loop (E)\",\"Teller (F)\",\"Bank (L)\"];\nconst MGMTS      = [\"MG\",\"CTV\",\"NoID\"];\nconst REGIONS    = [\"Miền Bắc\",\"Miền Trung\",\"Miền Nam\"];\nconst MONTHS     = [\"2026-01\",\"2026-02\",\"2026-03\",\"2026-04\",\"2026-05\"];\nconst MONTH_LBL  = [\"T1\",\"T2\",\"T3\",\"T4\",\"T5\"];\n\nconst CH_COLOR = {\n  \"App (M)\":  \"#3fb950\",\n  \"Web (O)\":  \"#58a6ff\",\n  \"Loop (E)\": \"#bc8cff\",\n  \"Teller (F)\":\"#f0a800\",\n  \"Bank (L)\": \"#f85149\"\n};\nconst MG_COLOR = {\"MG\":\"#3fb950\",\"CTV\":\"#58a6ff\",\"NoID\":\"#8b949e\"};\n\n// Simulated operating costs per channel (VND million per 1000 customers)\nconst CH_COST_PER_1000 = {\n  \"App (M)\": 8,   // lowest — digital self-serve\n  \"Web (O)\": 12,\n  \"Loop (E)\": 50, // highest — referral incentive\n  \"Teller (F)\": 35,\n  \"Bank (L)\": 28\n};\n\n// Fee rate assumptions per mgmt type\nconst FEE_RATE = {\"MG\": 0.0035, \"CTV\": 0.0025, \"NoID\": 0.0015};\n\nlet rawData = [], filtered = [];\n\nfunction genData() {\n  const data = [];\n  const t0 = new Date(\"2026-01-01T00:00:00\").getTime();\n  const t1 = new Date(\"2026-05-31T23:59:59\").getTime();\n\n  for (let i = 1; i <= 5000; i++) {\n    const ts = t0 + Math.random() * (t1 - t0);\n    const d  = new Date(ts);\n    const dateStr  = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;\n    const monthStr = dateStr.substring(0,7);\n\n    let ch;\n    const rc = Math.random();\n    if      (rc < 0.44) ch = CHANNELS[0];\n    else if (rc < 0.68) ch = CHANNELS[1];\n    else if (rc < 0.81) ch = CHANNELS[2];\n    else if (rc < 0.91) ch = CHANNELS[3];\n    else                ch = CHANNELS[4];\n\n    let mg;\n    const rm = Math.random();\n    if (ch === \"Loop (E)\")   { mg = rm < 0.73 ? \"MG\" : \"CTV\"; }\n    else if (ch === \"Teller (F)\") { mg = rm < 0.58 ? \"MG\" : \"NoID\"; }\n    else if (ch === \"Bank (L)\")   { mg = rm < 0.45 ? \"MG\" : (rm < 0.7 ? \"CTV\" : \"NoID\"); }\n    else {\n      if (rm < 0.26) mg = \"MG\";\n      else if (rm < 0.50) mg = \"CTV\";\n      else mg = \"NoID\";\n    }\n\n    const region = REGIONS[Math.floor(Math.random() * 3)];\n\n    // AUM distribution: MG >> CTV >> NoID; loop/teller slightly higher\n    let deposit = 0;\n    if (Math.random() < (mg === \"MG\" ? 0.72 : mg === \"CTV\" ? 0.60 : 0.40)) {\n      const chMult = ch === \"Loop (E)\" ? 1.3 : ch === \"Teller (F)\" ? 1.15 : ch === \"Bank (L)\" ? 1.05 : 1.0;\n      if (mg === \"MG\")        deposit = Math.floor((18_000_000 + Math.random() * 200_000_000) * chMult);\n      else if (mg === \"CTV\")  deposit = Math.floor((4_000_000  + Math.random() * 70_000_000)  * chMult);\n      else                    deposit = Math.floor((500_000    + Math.random() * 18_000_000)  * chMult);\n    }\n\n    const active = deposit > 0 && Math.random() < (mg === \"MG\" ? 0.92 : mg === \"CTV\" ? 0.82 : 0.54);\n\n    // Estimated fee = deposit × rate × random utilisation\n    const fee = deposit > 0 ? deposit * FEE_RATE[mg] * (0.4 + Math.random() * 0.6) : 0;\n\n    // Days from account open to first deposit (null = never deposited)\n    // MG: fast ~4d avg, CTV: ~8d, NoID: ~18d; Loop/Bank shorter, App/Web longer\n    let daysToDeposit = null;\n    if (deposit > 0) {\n      const mgBase = mg === \"MG\" ? 4 : mg === \"CTV\" ? 8 : 18;\n      const chMod  = ch === \"Loop (E)\" ? -1.5 : ch === \"Bank (L)\" ? -1 : ch === \"Teller (F)\" ? -0.5 : ch === \"App (M)\" ? 1.5 : 2;\n      const base   = Math.max(1, mgBase + chMod);\n      daysToDeposit = Math.max(0, Math.round(base + Math.random() * base * 1.2));\n    }\n\n    // Days from account open to first trade (always >= daysToDeposit + lag)\n    let daysToTrade = null;\n    if (active && daysToDeposit !== null) {\n      const lag = Math.round(1 + Math.random() * (mg === \"MG\" ? 5 : mg === \"CTV\" ? 10 : 20));\n      daysToTrade = daysToDeposit + lag;\n    }\n\n    data.push({ id:i, date:dateStr, month:monthStr, ch, mg, region, deposit, active, fee, daysToDeposit, daysToTrade });\n  }\n  return data;\n}\n\n// ═══════════════════════════════════════════════\n//  FILTERS\n// ═══════════════════════════════════════════════\nfunction applyFilters() {\n  const s = document.getElementById(\"f-start\").value;\n  const e = document.getElementById(\"f-end\").value;\n  const fc = document.getElementById(\"f-channel\").value;\n  const fm = document.getElementById(\"f-mgmt\").value;\n\n  filtered = rawData.filter(d => {\n    if (s && d.date < s) return false;\n    if (e && d.date > e) return false;\n    if (fc !== \"all\" && d.ch !== fc) return false;\n    if (fm !== \"all\" && d.mg !== fm) return false;\n    return true;\n  });\n  renderAll();\n}\n\nfunction resetFilters() {\n  document.getElementById(\"f-start\").value   = \"2026-01-01\";\n  document.getElementById(\"f-end\").value     = \"2026-05-31\";\n  document.getElementById(\"f-channel\").value = \"all\";\n  document.getElementById(\"f-mgmt\").value    = \"all\";\n\n  applyFilters();\n}\n\n[\"f-start\",\"f-end\",\"f-channel\",\"f-mgmt\"].forEach(id =>\n  document.getElementById(id).addEventListener(\"change\", applyFilters)\n);\n\n// ═══════════════════════════════════════════════\n//  HELPERS\n// ═══════════════════════════════════════════════\nconst fmtN  = n => new Intl.NumberFormat('vi-VN').format(Math.round(n));\nconst fmtM  = n => {\n  if (!n) return \"0đ\";\n  if (n >= 1e9) return (n/1e9).toFixed(1) + \" tỷ\";\n  if (n >= 1e6) return (n/1e6).toFixed(1) + \" tr\";\n  return fmtN(n) + \"đ\";\n};\nconst fmtPct = (v,d=1) => v.toFixed(d) + \"%\";\nconst avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;\nconst pctOf = (a,b) => b ? a/b*100 : 0;\n\n// compute per-channel stats\nfunction chStats(data) {\n  return CHANNELS.map(ch => {\n    const sub = data.filter(d => d.ch === ch);\n    const n   = sub.length;\n    const depositors = sub.filter(d => d.deposit > 0);\n    const actives    = sub.filter(d => d.active);\n    const aumAvg     = n ? avg(sub.map(d => d.deposit)) : 0;\n    const aumActAvg  = depositors.length ? avg(depositors.map(d => d.deposit)) : 0;\n    const feeAvg     = n ? avg(sub.map(d => d.fee)) : 0;\n    const activePct  = pctOf(actives.length, n);\n    const depositPct = pctOf(depositors.length, n);\n    const totalAUM   = sub.reduce((a,d)=>a+d.deposit,0);\n    const totalFee   = sub.reduce((a,d)=>a+d.fee,0);\n    return { ch, n, aumAvg, aumActAvg, feeAvg, activePct, depositPct, totalAUM, totalFee };\n  });\n}\n\n// per-channel per-mgmt\nfunction chMgStats(data) {\n  const res = {};\n  CHANNELS.forEach(ch => { res[ch] = {}; MGMTS.forEach(mg => { res[ch][mg] = { n:0, sumAUM:0, sumFee:0, activeN:0 }; }); });\n  data.forEach(d => {\n    res[d.ch][d.mg].n++;\n    res[d.ch][d.mg].sumAUM  += d.deposit;\n    res[d.ch][d.mg].sumFee  += d.fee;\n    if (d.active) res[d.ch][d.mg].activeN++;\n  });\n  return res;\n}\n\n// ═══════════════════════════════════════════════\n//  RENDER ORCHESTRATOR\n// ═══════════════════════════════════════════════\nfunction renderAll() {\n  const stats = chStats(filtered);\n  const cms   = chMgStats(filtered);\n  renderInsightPanel(stats, cms);\n  renderKPIs(stats, cms);\n  renderScorecard(stats);\n  renderScorecardMgmt(cms);\n  renderScatter(stats);\n  renderScatterMgmt(cms);\n  renderAUMBar(stats, cms);\n  renderFeeBar(stats, cms);\n  renderActiveCombined(stats, cms);\n  renderTrendCh();\n  renderTrendMg();\n  renderTrendCross(window._trendCrossTab || 'MG');\n  renderConversionTime();\n  renderBuckets();\n  renderActionSummary();\n}\n\n// ═══════════════════════════════════════════════\n//  KPI GRID\n// ═══════════════════════════════════════════════\nfunction renderKPIs(stats, cms) {\n  const total = filtered.length;\n\n  // AUM/KH: weighted average across channels (consistent with stacked chart)\n  const totalAUM = stats.reduce((a,s)=>a+s.totalAUM,0);\n  const totalN   = stats.reduce((a,s)=>a+s.n,0);\n  const aumAvgAll = totalN ? totalAUM/totalN : 0;\n  const maxAUM = Math.max(...stats.map(s=>s.aumAvg));\n  const bestCH = stats.find(s=>s.aumAvg === maxAUM);\n\n  // Phí net/KH: weighted average across channels\n  const totalFee = stats.reduce((a,s)=>a+s.totalFee,0);\n  const feeAvgAll = totalN ? totalFee/totalN : 0;\n  const maxFee = Math.max(...stats.map(s=>s.feeAvg));\n  const bestFCH = stats.find(s=>s.feeAvg === maxFee);\n\n  const maxAct = Math.max(...stats.map(s=>s.activePct));\n  const bestACH = stats.find(s=>s.activePct === maxAct);\n\n  // Chi phí/KH: cost per customer by channel (VND per customer), weighted by n\n  const costPerKH = stats.map(s => ({\n    ch: s.ch,\n    n: s.n,\n    cost: (CH_COST_PER_1000[s.ch] || 0) * 1e6 / 1000\n  }));\n  // Weighted average cost per KH (by number of customers per channel)\n  const totalCostWeighted = costPerKH.reduce((a,c)=>a + c.cost*c.n, 0);\n  const avgCostPerKH = totalN > 0 ? totalCostWeighted / totalN : 0;\n  const maxCostCH = costPerKH.reduce((a,c)=>c.cost>a.cost?c:a, costPerKH[0]);\n  const minCostCH = costPerKH.reduce((a,c)=>c.cost<a.cost?c:a, costPerKH[0]);\n\n  // ROI net = Phí NET/KH / Chi phí/KH (toàn hệ thống)\n  const roiNet = avgCostPerKH > 0 ? (feeAvgAll / avgCostPerKH).toFixed(1) : \"—\";\n\n  // ── Mgmt-level computations (across all channels) ──\n  // Helper: aggregate cms across all channels for a given mgmt type\n  function mgTotal(mg) {\n    let n=0, sumAUM=0, sumFee=0, activeN=0;\n    CHANNELS.forEach(ch => {\n      if (!cms[ch] || !cms[ch][mg]) return;\n      const o = cms[ch][mg];\n      n      += o.n;\n      sumAUM += o.sumAUM;\n      sumFee += o.sumFee;\n      activeN+= o.activeN;\n    });\n    return { n, sumAUM, sumFee, activeN };\n  }\n  const mgTotals = {};\n  MGMTS.forEach(mg => { mgTotals[mg] = mgTotal(mg); });\n\n  // 1. AUM/KH by mgmt → best mgmt\n  const aumByMg = MGMTS.map(mg => ({ mg, v: mgTotals[mg].n ? mgTotals[mg].sumAUM/mgTotals[mg].n : 0 }));\n  const bestMgAUM = aumByMg.reduce((a,b)=>b.v>a.v?b:a);\n  const worstMgAUM = aumByMg.reduce((a,b)=>b.v<a.v?b:a);\n\n  // 2. Phí net/KH by mgmt → best mgmt\n  const feeByMg = MGMTS.map(mg => ({ mg, v: mgTotals[mg].n ? mgTotals[mg].sumFee/mgTotals[mg].n : 0 }));\n  const bestMgFee = feeByMg.reduce((a,b)=>b.v>a.v?b:a);\n\n  // 3. Chi phí/KH by mgmt: cost is channel-based so we use same CH_COST_PER_1000\n  //    weight by n across channels for each mgmt\n  const costByMg = MGMTS.map(mg => {\n    let wSum=0, nSum=0;\n    CHANNELS.forEach(ch => {\n      if (!cms[ch] || !cms[ch][mg]) return;\n      const n = cms[ch][mg].n;\n      const c = (CH_COST_PER_1000[ch] || 0) * 1e6 / 1000;\n      wSum += c * n; nSum += n;\n    });\n    return { mg, v: nSum ? wSum/nSum : 0 };\n  });\n  const bestMgCost  = costByMg.reduce((a,b)=>b.v<a.v?b:a); // lowest cost = best\n  const worstMgCost = costByMg.reduce((a,b)=>b.v>a.v?b:a);\n\n  // 4. Active% by mgmt\n  const actByMg = MGMTS.map(mg => ({ mg, v: mgTotals[mg].n ? pctOf(mgTotals[mg].activeN, mgTotals[mg].n) : 0 }));\n  const bestMgAct  = actByMg.reduce((a,b)=>b.v>a.v?b:a);\n  const worstMgAct = actByMg.reduce((a,b)=>b.v<a.v?b:a);\n\n  // 5. Nạp tiền% by mgmt (deposit > 0 = sumAUM > 0 for that customer)\n  //    We need to count deposit>0 per mgmt from filtered\n  const depositByMg = MGMTS.map(mg => {\n    const sub = filtered.filter(d=>d.mg===mg);\n    return { mg, v: sub.length ? pctOf(sub.filter(d=>d.deposit>0).length, sub.length) : 0, n: sub.length };\n  });\n  const bestMgDep  = depositByMg.reduce((a,b)=>b.v>a.v?b:a);\n  const worstMgDep = depositByMg.reduce((a,b)=>b.v<a.v?b:a);\n\n  const items = [\n    {\n      icon:\"💰\", label:\"AUM/KH Trung bình\", val:fmtM(aumAvgAll),\n      sub:\"Kênh cao nhất: \" + (bestCH?.ch || \"—\") + \" · \" + fmtM(maxAUM),\n      mgmt:\"Quản lý tốt nhất: \" + bestMgAUM.mg + \" (\" + fmtM(bestMgAUM.v) + \") · Thấp nhất: \" + worstMgAUM.mg,\n      color:\"#f0a800\", bg:\"rgba(240,168,0,0.1)\"\n    },\n    {\n      icon:\"📊\", label:\"Phí net/KH\", val:fmtM(feeAvgAll),\n      sub:\"Kênh cao nhất: \" + (bestFCH?.ch || \"—\") + \" · \" + fmtM(maxFee),\n      mgmt:\"Quản lý cao nhất: \" + bestMgFee.mg + \" (\" + fmtM(bestMgFee.v) + \")\",\n      color:\"#3fb950\", bg:\"rgba(63,185,80,0.1)\"\n    },\n    {\n      icon:\"🏷️\", label:\"Chi phí/KH TB\", val:fmtN(Math.round(avgCostPerKH)) + \"đ\",\n      sub:\"ROI net: \" + roiNet + \"× · Đắt nhất: \" + maxCostCH.ch + \" · Rẻ nhất: \" + minCostCH.ch,\n      mgmt:\"Rẻ nhất: \" + bestMgCost.mg + \" (\" + fmtN(Math.round(bestMgCost.v)) + \"đ) · Đắt nhất: \" + worstMgCost.mg,\n      color:\"#bc8cff\", bg:\"rgba(188,140,255,0.1)\"\n    },\n    {\n      icon:\"⚡\", label:\"Tỷ lệ Active\", val:fmtPct(pctOf(filtered.filter(d=>d.active).length, total)),\n      sub:\"Kênh dẫn đầu: \" + (bestACH?.ch || \"—\") + \" · \" + fmtPct(maxAct),\n      mgmt:\"Quản lý dẫn đầu: \" + bestMgAct.mg + \" (\" + fmtPct(bestMgAct.v) + \") · Thấp nhất: \" + worstMgAct.mg + \" (\" + fmtPct(worstMgAct.v) + \")\",\n      color:\"#58a6ff\", bg:\"rgba(88,166,255,0.1)\"\n    },\n    {\n      icon:\"📥\", label:\"Tỷ lệ Nạp tiền\", val:fmtPct(pctOf(filtered.filter(d=>d.deposit>0).length, total)),\n      sub:\"KH có AUM > 0\",\n      mgmt:\"Quản lý tốt nhất: \" + bestMgDep.mg + \" (\" + fmtPct(bestMgDep.v) + \") · Thấp nhất: \" + worstMgDep.mg,\n      color:\"#f85149\", bg:\"rgba(248,81,73,0.1)\"\n    },\n  ];\n  const g = document.getElementById(\"kpi-grid\");\n  g.innerHTML = items.map(it => `\n    <div class=\"kpi-card\">\n      <div class=\"kpi-icon\" style=\"background:${it.bg};color:${it.color}\">${it.icon}<\/div>\n      <div class=\"kpi-label\">${it.label}<\/div>\n      <div class=\"kpi-value\" style=\"color:${it.color}\">${it.val}<\/div>\n      <div class=\"kpi-sub\">${it.sub}<\/div>\n      <div class=\"kpi-sub\" style=\"margin-top:4px;color:var(--text3);font-size:10.5px;border-top:1px solid var(--border2);padding-top:5px\">🗂️ ${it.mgmt}<\/div>\n    <\/div>\n  `).join(\"\");\n}\n\n// ═══════════════════════════════════════════════\n//  SCORECARD TABLE\n// ═══════════════════════════════════════════════\nfunction renderScorecard(stats) {\n  // Composite score (0-100)\n  const maxAUM = Math.max(...stats.map(s=>s.aumAvg), 1);\n  const maxFee = Math.max(...stats.map(s=>s.feeAvg), 1);\n  const maxAct = Math.max(...stats.map(s=>s.activePct), 1);\n\n  const withScore = stats.map(s => ({\n    ...s,\n    score: Math.round(\n      (s.aumAvg/maxAUM * 0.45 +\n       s.feeAvg/maxFee * 0.30 +\n       s.activePct/maxAct * 0.25) * 100\n    )\n  })).sort((a,b) => b.score - a.score);\n\n  const rankColors = [\"#CD7F32\",\"#CD7F32\",\"#CD7F32\",\"#C0C8D0\",\"#C0C8D0\"];\n  const maxAUMv = Math.max(...withScore.map(s=>s.aumAvg), 1);\n  const maxFeeV = Math.max(...withScore.map(s=>s.feeAvg), 1);\n\n  const rows = withScore.map((s, i) => {\n    const barW    = (s.aumAvg / maxAUMv * 72).toFixed(0);\n    const actClass   = s.activePct >= 60 ? \"badge-good\" : s.activePct >= 40 ? \"badge-warn\" : \"badge-bad\";\n    const chCost     = (CH_COST_PER_1000[s.ch] || 0) * 1e6 / 1000;  // VND/KH\n    const roi        = chCost > 0 ? s.feeAvg / chCost : 0;\n    const roiClass   = roi >= 3 ? \"badge-good\" : roi >= 1.5 ? \"badge-warn\" : \"badge-bad\";\n    return `<tr>\n      <td>\n        <div style=\"display:flex;align-items:center;gap:10px\">\n          <span class=\"sc-rank\" style=\"background:${rankColors[i]}18;color:${rankColors[i]};border:1.5px solid ${rankColors[i]}50;font-size:${i<3?'12':'11'}px\">${i+1}<\/span>\n          <span class=\"badge-ch\" style=\"background:${CH_COLOR[s.ch]}15;color:${CH_COLOR[s.ch]};border-color:${CH_COLOR[s.ch]}40\">${s.ch}<\/span>\n        <\/div>\n      <\/td>\n      <td>${fmtN(s.n)}<\/td>\n      <td>\n        ${fmtM(s.aumAvg)}\n        <span class=\"bar-inline\" style=\"width:${barW}px;background:${CH_COLOR[s.ch]}60\"><\/span>\n      <\/td>\n      <td>${fmtM(s.feeAvg)}<\/td>\n      <td><span class=\"${actClass}\">${fmtPct(s.activePct)}<\/span><\/td>\n      <td>${fmtN(Math.round(chCost))}đ<\/td>\n      <td><span class=\"${roiClass}\" style=\"font-size:11px;font-weight:800\">${roi.toFixed(1)}×<\/span><\/td>\n    <\/tr>`;\n  }).join(\"\");\n\n  document.getElementById(\"scorecard-wrap\").innerHTML = `\n    <table class=\"sc-table\">\n      <thead><tr>\n        <th style=\"text-align:left\">Kênh<\/th>\n        <th>Số KH<\/th>\n        <th>AUM/KH<\/th>\n        <th>Phí NET/KH<\/th>\n        <th>Active%<\/th>\n        <th>Chi phí/KH<\/th>\n        <th>ROI net<\/th>\n      <\/tr><\/thead>\n      <tbody>${rows}<\/tbody>\n    <\/table>`;\n}\n\n// ═══════════════════════════════════════════════\n//  AUM GROUPED BAR (by MGMT on X-axis, grouped by CHANNEL inside)\n// ═══════════════════════════════════════════════\nfunction renderAUMBar(stats, cms) {\n  const svg = document.getElementById(\"aum-svg\");\n  const W = 1060, H = 300;\n  const pL=72, pR=28, pT=28, pB=52;\n  const iW = W-pL-pR, iH = H-pT-pB;\n  const mgmts = MGMTS; // [\"MG\",\"CTV\",\"NoID\"] — now the X-axis groups\n  const nMg = mgmts.length;\n  const nCh = CHANNELS.length;\n\n  // Compute per-mgmt per-channel avg AUM\n  // vals[mi][ci] = avg AUM for mgmt[mi] × channel[ci]\n  const vals = mgmts.map(mg => CHANNELS.map(ch => {\n    const o = cms[ch][mg];\n    return o.n ? o.sumAUM / o.n : 0;\n  }));\n\n  // Max across all bars\n  const maxV = Math.max(...vals.flat(), 1);\n  const ticks = 5;\n\n  // Group width and individual bar width\n  const gW = iW / nMg;         // width per mgmt group\n  const gPad = gW * 0.08;\n  const innerW = gW - gPad*2;\n  const bW = innerW / nCh - 2;\n  const bGap = 2;\n\n  let body = \"\";\n\n  // Grid lines + Y axis labels\n  for (let t=0;t<=ticks;t++) {\n    const yy = pT + iH - (t/ticks)*iH;\n    const vv = (maxV * t/ticks) / 1e6;\n    body += `<line x1=\"${pL}\" y1=\"${yy}\" x2=\"${W-pR}\" y2=\"${yy}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${pL-6}\" y=\"${yy+4}\" text-anchor=\"end\" fill=\"var(--text3)\" style=\"font-size:9px;font-weight:600\">${vv.toFixed(0)}M<\/text>`;\n  }\n\n  // Draw grouped bars: outer loop = mgmt, inner loop = channel\n  mgmts.forEach((mg, mi) => {\n    const gx = pL + mi * gW + gPad;\n\n    CHANNELS.forEach((ch, ci) => {\n      const v = vals[mi][ci];\n      if (v < 1) return;\n      const bh = (v / maxV) * iH;\n      const bx = gx + ci * (bW + bGap);\n      const by = pT + iH - bh;\n      const col = CH_COLOR[ch];\n      const tip = `<b>${mg} — ${ch}<\/b><div class='tip-row'><span>AUM/KH TB<\/span><span>${fmtM(v)}<\/span><\/div><div class='tip-row'><span>Số KH<\/span><span>${fmtN(cms[ch][mg].n)}<\/span><\/div>`;\n\n      body += `<rect class=\"bar-rect\" x=\"${bx.toFixed(1)}\" y=\"${by.toFixed(1)}\" width=\"${bW.toFixed(1)}\" height=\"${bh.toFixed(1)}\" rx=\"3\" fill=\"${col}\" fill-opacity=\"0.85\" data-tip='${tip}'/>`;\n    });\n\n    // Mgmt X-label\n    const mgCol = MG_COLOR[mg];\n    body += `<text x=\"${(pL + mi*gW + gW/2).toFixed(1)}\" y=\"${pT+iH+18}\" text-anchor=\"middle\" fill=\"${mgCol}\" style=\"font-size:11.5px;font-weight:800\">${mg}<\/text>`;\n    // Color strip under label\n    body += `<rect x=\"${(pL+mi*gW+gW*0.1).toFixed(1)}\" y=\"${pT+iH+27}\" width=\"${(gW*0.8).toFixed(1)}\" height=\"3\" rx=\"1.5\" fill=\"${mgCol}\" fill-opacity=\"0.6\"/>`;\n\n    // ── Average line within this mgmt group ──\n    const groupVals = vals[mi].filter(v => v > 0);\n    if (groupVals.length) {\n      const groupAvg = groupVals.reduce((a,b)=>a+b,0) / groupVals.length;\n      const avgY = pT + iH - (groupAvg / maxV) * iH;\n      const x1 = pL + mi * gW + gPad * 0.5;\n      const x2 = pL + (mi+1) * gW - gPad * 0.5;\n      body += `<line x1=\"${x1.toFixed(1)}\" y1=\"${avgY.toFixed(1)}\" x2=\"${x2.toFixed(1)}\" y2=\"${avgY.toFixed(1)}\" stroke=\"${mgCol}\" stroke-width=\"2\" stroke-dasharray=\"6,3\" opacity=\"0.75\" stroke-linecap=\"round\"/>`;\n      // Tag with value\n      const tagStr = fmtM(groupAvg);\n      const tagW = tagStr.length * 6 + 12;\n      const tagX = x2 - tagW / 2;\n      const tagY = avgY - 10;\n      body += `<rect x=\"${tagX.toFixed(1)}\" y=\"${tagY.toFixed(1)}\" width=\"${tagW.toFixed(1)}\" height=\"16\" rx=\"3\" fill=\"${mgCol}\" opacity=\"0.75\"/>`;\n      body += `<text x=\"${(tagX + tagW/2).toFixed(1)}\" y=\"${(tagY + 11).toFixed(1)}\" text-anchor=\"middle\" fill=\"#000\" style=\"font-size:9px;font-weight:900\">${tagStr}<\/text>`;\n    }\n  });\n\n  svg.innerHTML = body;\n\n  // Legend — now shows channels\n  document.getElementById(\"aum-legend\").innerHTML = CHANNELS.map(ch =>\n    `<div class=\"leg\"><span class=\"leg-dot\" style=\"background:${CH_COLOR[ch]}\"><\/span>${ch}<\/div>`\n  ).join(\"\");\n}\n\n// ═══════════════════════════════════════════════\n//  FEE BAR (by MGMT on X-axis, grouped by CHANNEL inside — mirrors AUM chart)\n// ═══════════════════════════════════════════════\nfunction renderFeeBar(stats, cms) {\n  const svg = document.getElementById(\"fee-svg\");\n  const W = 1060, H = 300;\n  const pL=72, pR=28, pT=28, pB=52;\n  const iW = W-pL-pR, iH = H-pT-pB;\n  const mgmts = MGMTS; // [\"MG\",\"CTV\",\"NoID\"] — X-axis groups\n  const nMg = mgmts.length;\n  const nCh = CHANNELS.length;\n\n  // Compute per-mgmt per-channel avg fee (sumFee / n)\n  const vals = mgmts.map(mg => CHANNELS.map(ch => {\n    const o = cms[ch][mg];\n    return o.n ? o.sumFee / o.n : 0;\n  }));\n\n  // Max across all bars\n  const maxV = Math.max(...vals.flat(), 1);\n  const ticks = 5;\n\n  // Group width and individual bar width\n  const gW = iW / nMg;\n  const gPad = gW * 0.08;\n  const innerW = gW - gPad*2;\n  const bW = innerW / nCh - 2;\n  const bGap = 2;\n\n  let body = \"\";\n\n  // Grid lines + Y axis labels\n  for (let t=0;t<=ticks;t++) {\n    const yy = pT + iH - (t/ticks)*iH;\n    const vv = maxV * t/ticks;\n    body += `<line x1=\"${pL}\" y1=\"${yy}\" x2=\"${W-pR}\" y2=\"${yy}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${pL-6}\" y=\"${yy+4}\" text-anchor=\"end\" fill=\"var(--text3)\" style=\"font-size:9px;font-weight:600\">${fmtM(vv)}<\/text>`;\n  }\n\n  // Draw grouped bars: outer loop = mgmt, inner loop = channel\n  mgmts.forEach((mg, mi) => {\n    const gx = pL + mi * gW + gPad;\n\n    CHANNELS.forEach((ch, ci) => {\n      const v = vals[mi][ci];\n      if (v < 1) return;\n      const bh = (v / maxV) * iH;\n      const bx = gx + ci * (bW + bGap);\n      const by = pT + iH - bh;\n      const col = CH_COLOR[ch];\n      const tip = `<b>${mg} — ${ch}<\/b><div class='tip-row'><span>Phí NET/KH TB<\/span><span>${fmtM(v)}<\/span><\/div><div class='tip-row'><span>Số KH<\/span><span>${fmtN(cms[ch][mg].n)}<\/span><\/div>`;\n\n      body += `<rect class=\"bar-rect\" x=\"${bx.toFixed(1)}\" y=\"${by.toFixed(1)}\" width=\"${bW.toFixed(1)}\" height=\"${bh.toFixed(1)}\" rx=\"3\" fill=\"${col}\" fill-opacity=\"0.85\" data-tip='${tip}'/>`;\n    });\n\n    // Mgmt X-label\n    const mgCol = MG_COLOR[mg];\n    body += `<text x=\"${(pL + mi*gW + gW/2).toFixed(1)}\" y=\"${pT+iH+18}\" text-anchor=\"middle\" fill=\"${mgCol}\" style=\"font-size:11.5px;font-weight:800\">${mg}<\/text>`;\n    // Color strip under label\n    body += `<rect x=\"${(pL+mi*gW+gW*0.1).toFixed(1)}\" y=\"${pT+iH+27}\" width=\"${(gW*0.8).toFixed(1)}\" height=\"3\" rx=\"1.5\" fill=\"${mgCol}\" fill-opacity=\"0.6\"/>`;\n\n    // ── Average line within this mgmt group ──\n    const groupVals = vals[mi].filter(v => v > 0);\n    if (groupVals.length) {\n      const groupAvg = groupVals.reduce((a,b)=>a+b,0) / groupVals.length;\n      const avgY = pT + iH - (groupAvg / maxV) * iH;\n      const x1 = pL + mi * gW + gPad * 0.5;\n      const x2 = pL + (mi+1) * gW - gPad * 0.5;\n      body += `<line x1=\"${x1.toFixed(1)}\" y1=\"${avgY.toFixed(1)}\" x2=\"${x2.toFixed(1)}\" y2=\"${avgY.toFixed(1)}\" stroke=\"${mgCol}\" stroke-width=\"2\" stroke-dasharray=\"6,3\" opacity=\"0.75\" stroke-linecap=\"round\"/>`;\n      const tagStr = fmtM(groupAvg);\n      const tagW = tagStr.length * 6 + 12;\n      const tagX = x2 - tagW / 2;\n      const tagY = avgY - 10;\n      body += `<rect x=\"${tagX.toFixed(1)}\" y=\"${tagY.toFixed(1)}\" width=\"${tagW.toFixed(1)}\" height=\"16\" rx=\"3\" fill=\"${mgCol}\" opacity=\"0.75\"/>`;\n      body += `<text x=\"${(tagX + tagW/2).toFixed(1)}\" y=\"${(tagY + 11).toFixed(1)}\" text-anchor=\"middle\" fill=\"#000\" style=\"font-size:9px;font-weight:900\">${tagStr}<\/text>`;\n    }\n  });\n\n  // Remove old channel avg lines (replaced by mgmt group avg above)\n\n  svg.innerHTML = body;\n\n  // Legend — shows channels (mirrors AUM chart)\n  document.getElementById(\"fee-legend\").innerHTML = CHANNELS.map(ch =>\n    `<div class=\"leg\"><span class=\"leg-dot\" style=\"background:${CH_COLOR[ch]}\"><\/span>${ch}<\/div>`\n  ).join(\"\");\n}\n\n// ═══════════════════════════════════════════════\n//  INSIGHT PANEL — 2 nhóm: Kênh mở TK + Kênh quản lý TK\n// ═══════════════════════════════════════════════\nfunction renderInsightPanel(stats, cms) {\n  const totalN          = filtered.length;\n  const inactiveDeposit = filtered.filter(d=>!d.active && d.deposit>0).length;\n  const oppPct          = pctOf(inactiveDeposit, totalN);\n\n  // ── KÊNH MỞ TÀI KHOẢN ──\n  const sortedAUM    = [...stats].sort((a,b)=>b.aumAvg-a.aumAvg);\n  const bestCH       = sortedAUM[0];\n  const worstCH      = sortedAUM[sortedAUM.length-1];\n  const sortedActive = [...stats].sort((a,b)=>b.activePct-a.activePct);\n  const worstActive  = sortedActive[sortedActive.length-1];\n  const avgActive    = stats.reduce((s,x)=>s+x.activePct,0)/stats.length;\n  const avgAUM       = stats.reduce((s,x)=>s+x.aumAvg,0)/stats.length;\n  const sortedN      = [...stats].sort((a,b)=>b.n-a.n);\n  const largestCH    = sortedN[0];\n\n  const roiStats = stats.map(s => {\n    const cost = (CH_COST_PER_1000[s.ch]||0)*1e6/1000;\n    return { ch:s.ch, roi: cost>0 ? s.feeAvg/cost : 0 };\n  }).sort((a,b)=>b.roi-a.roi);\n  const bestROI = roiStats[0];\n\n  // ── KÊNH QUẢN LÝ TÀI KHOẢN ──\n  const mgStats = MGMTS.map(mg => {\n    let n=0, sumAUM=0, sumFee=0, activeN=0;\n    CHANNELS.forEach(ch => {\n      const o = cms[ch][mg];\n      n+=o.n; sumAUM+=o.sumAUM; sumFee+=o.sumFee; activeN+=o.activeN;\n    });\n    return { mg, n, aumAvg: n?sumAUM/n:0, feeAvg: n?sumFee/n:0, activePct: n?pctOf(activeN,n):0 };\n  });\n  const sortedMgAUM    = [...mgStats].sort((a,b)=>b.aumAvg-a.aumAvg);\n  const bestMgAUM      = sortedMgAUM[0];\n  const worstMgAUM     = sortedMgAUM[sortedMgAUM.length-1];\n  const sortedMgActive = [...mgStats].sort((a,b)=>b.activePct-a.activePct);\n  const bestMgActive   = sortedMgActive[0];\n  const worstMgActive  = sortedMgActive[sortedMgActive.length-1];\n  const sortedMgFee    = [...mgStats].sort((a,b)=>b.feeAvg-a.feeAvg);\n  const bestMgFee      = sortedMgFee[0];\n  const avgMgActive    = mgStats.reduce((s,x)=>s+x.activePct,0)/mgStats.length;\n\n  // ── Summary paragraph ──\n  document.getElementById(\"insight-summary-text\").innerHTML =\n    `Trong giai đoạn <strong>01–05/2026<\/strong>, hệ thống ghi nhận <strong>${fmtN(totalN)} khách hàng<\/strong> qua 5 kênh mở tài khoản. ` +\n    `Kênh mở TK <strong>${bestCH.ch}<\/strong> dẫn đầu với AUM/KH đạt <strong>${fmtM(bestCH.aumAvg)}<\/strong>, ` +\n    `gấp <strong>${(bestCH.aumAvg/worstCH.aumAvg).toFixed(1)}×<\/strong> so với kênh thấp nhất <strong>${worstCH.ch}<\/strong>. ` +\n    `Về kênh quản lý, nhóm <strong>${bestMgAUM.mg}<\/strong> dẫn đầu AUM/KH (<strong>${fmtM(bestMgAUM.aumAvg)}<\/strong>) và ` +\n    `Active Rate (<strong>${fmtPct(bestMgActive.activePct)}<\/strong>), trong khi <strong>${worstMgActive.mg}<\/strong> ` +\n    `chỉ đạt <strong>${fmtPct(worstMgActive.activePct)}<\/strong> — cách biệt <strong>${(bestMgActive.activePct-worstMgActive.activePct).toFixed(1)} điểm %<\/strong>. ` +\n    `Có <strong>${fmtPct(oppPct)} KH<\/strong> đã nạp tiền nhưng chưa kích hoạt — nhóm tái kích hoạt tiềm năng cao nhất.`;\n\n  // ── Group A: Kênh mở TK ──\n  document.getElementById(\"ins-ch-1-val\").innerHTML = `${bestCH.ch} <span>#1<\/span>`;\n  document.getElementById(\"ins-ch-1-desc\").textContent =\n    `AUM/KH cao nhất: ${fmtM(bestCH.aumAvg)}, gấp ${(bestCH.aumAvg/avgAUM).toFixed(1)}× mức TB hệ thống (${fmtM(avgAUM)}). Đây là kênh chất lượng tài sản tốt nhất.`;\n\n  document.getElementById(\"ins-ch-2-val\").innerHTML = `${worstActive.ch} <span style=\"color:var(--red)\">${fmtPct(worstActive.activePct)}<\/span>`;\n  document.getElementById(\"ins-ch-2-desc\").textContent =\n    `Tỷ lệ Active thấp nhất trong các kênh mở TK, thấp hơn TB ${(avgActive-worstActive.activePct).toFixed(1)} điểm %. Cần cải thiện onboarding và chiến dịch kích hoạt sau mở TK.`;\n\n  document.getElementById(\"ins-ch-3-val\").innerHTML = `${bestROI.ch} <span>${bestROI.roi.toFixed(1)}×<\/span>`;\n  document.getElementById(\"ins-ch-3-desc\").textContent =\n    `ROI net tốt nhất: phí NET / chi phí vận hành đạt ${bestROI.roi.toFixed(1)}×. Chi phí thu hút KH thấp nhưng phí thu được cao — mô hình hiệu quả nhất.`;\n\n  document.getElementById(\"ins-ch-4-val\").innerHTML = `${largestCH.ch} <span>${fmtN(largestCH.n)} KH<\/span>`;\n  document.getElementById(\"ins-ch-4-desc\").textContent =\n    `Kênh có số lượng KH lớn nhất (${fmtPct(pctOf(largestCH.n,totalN))} tổng KH). Tối ưu chuyển đổi tại kênh này có tác động quy mô cao nhất toàn hệ thống.`;\n\n  document.getElementById(\"ins-ch-5-val\").innerHTML = `${fmtPct(oppPct)} <span>KH<\/span>`;\n  document.getElementById(\"ins-ch-5-desc\").textContent =\n    `${fmtN(inactiveDeposit)} KH đã nạp tiền nhưng chưa Active — nhóm retargeting tiềm năng cao nhất. Thiết lập quy trình tự động 7–14 ngày sau nạp tiền.`;\n\n  // ── Group B: Kênh quản lý TK ──\n  document.getElementById(\"ins-mg-1-val\").innerHTML = `${bestMgAUM.mg} <span>${fmtM(bestMgAUM.aumAvg)}<\/span>`;\n  document.getElementById(\"ins-mg-1-desc\").textContent =\n    `Nhóm quản lý ${bestMgAUM.mg} có AUM/KH cao nhất: ${fmtM(bestMgAUM.aumAvg)}, gấp ${worstMgAUM.aumAvg>0?(bestMgAUM.aumAvg/worstMgAUM.aumAvg).toFixed(1):'∞'}× so với ${worstMgAUM.mg} (${fmtM(worstMgAUM.aumAvg)}). Chuyển dịch sang ${bestMgAUM.mg} là đòn bẩy AUM lớn nhất.`;\n\n  document.getElementById(\"ins-mg-2-val\").innerHTML = `${bestMgActive.mg} <span>${fmtPct(bestMgActive.activePct)}<\/span>`;\n  document.getElementById(\"ins-mg-2-desc\").textContent =\n    `${bestMgActive.mg} dẫn đầu tỷ lệ kích hoạt giao dịch (${fmtPct(bestMgActive.activePct)}), cao hơn TB ${(bestMgActive.activePct-avgMgActive).toFixed(1)} điểm %. Cơ chế quản lý chặt chẽ tạo ra tỷ lệ Active cao nhất.`;\n\n  document.getElementById(\"ins-mg-3-val\").innerHTML = `${bestMgFee.mg} <span>${fmtM(bestMgFee.feeAvg)}<\/span>`;\n  document.getElementById(\"ins-mg-3-desc\").textContent =\n    `Nhóm ${bestMgFee.mg} sinh phí NET/KH cao nhất (${fmtM(bestMgFee.feeAvg)}). Tỷ lệ phí áp dụng cao hơn kết hợp tài sản lớn tạo ra doanh thu phí vượt trội so với các nhóm còn lại.`;\n\n  document.getElementById(\"ins-mg-4-val\").innerHTML = `${worstMgActive.mg} <span style=\"color:var(--red)\">${fmtPct(worstMgActive.activePct)}<\/span>`;\n  document.getElementById(\"ins-mg-4-desc\").textContent =\n    `${worstMgActive.mg} có tỷ lệ Active thấp nhất (${fmtPct(worstMgActive.activePct)}), cách biệt ${(bestMgActive.activePct-worstMgActive.activePct).toFixed(1)} điểm % so với ${bestMgActive.mg}. Cần chiến lược kích hoạt và theo dõi riêng cho nhóm này.`;\n\n  const mgMoved = mgStats.find(m=>m.mg!==bestMgAUM.mg) || mgStats[1];\n  const uplift = bestMgAUM.aumAvg - mgMoved.aumAvg;\n  document.getElementById(\"ins-mg-5-val\").innerHTML = `→ ${bestMgAUM.mg} <span>+${fmtM(uplift)}/KH<\/span>`;\n  document.getElementById(\"ins-mg-5-desc\").textContent =\n    `Mỗi KH chuyển từ ${mgMoved.mg} sang ${bestMgAUM.mg} tăng thêm ${fmtM(uplift)} AUM/KH. Ưu tiên chương trình tư vấn chuyển đổi HTQL để tối đa hóa tổng tài sản quản lý.`;\n}\n\n// ═══════════════════════════════════════════════\n//  ACTIVE RATE — COMBINED (channel + mgmt, side by side)\n// ═══════════════════════════════════════════════\nfunction renderActiveCombined(stats, cms) {\n  const svg = document.getElementById(\"active-combined-svg\");\n  const W=1100, H=300;\n  // Left panel: by channel\n  const L_pL=130, L_pR=60, L_pT=40, L_pB=36;\n  const L_W = 520;\n  const L_iW = L_W - L_pL - L_pR, L_iH = H - L_pT - L_pB;\n  // Right panel: by mgmt (offset by L_W + gap)\n  const gap = 60;\n  const R_off = L_W + gap;\n  const R_pL=80, R_pR=60, R_pT=40, R_pB=36;\n  const R_W = W - R_off;\n  const R_iW = R_W - R_pL - R_pR, R_iH = H - R_pT - R_pB;\n\n  const DOT_R = 9;\n\n  // Compute per-mgmt active rates\n  const mgStats = MGMTS.map(mg => {\n    let totalN=0, totalActive=0;\n    CHANNELS.forEach(ch => { totalN += cms[ch][mg].n; totalActive += cms[ch][mg].activeN; });\n    return { mg, v: totalN ? pctOf(totalActive, totalN) : 0, n: totalN };\n  });\n\n  const benchmarkCh = stats.reduce((s,x)=>s+x.activePct,0)/stats.length;\n  const benchmarkMg = mgStats.reduce((s,x)=>s+x.v,0)/mgStats.length;\n\n  let body = \"\";\n\n  // ── Panel titles\n  body += `<text x=\"${L_pL + L_iW/2}\" y=\"18\" text-anchor=\"middle\" fill=\"var(--text)\" style=\"font-size:12px;font-weight:800\">Theo Kênh phát triển<\/text>`;\n  body += `<text x=\"${R_off + R_pL + R_iW/2}\" y=\"18\" text-anchor=\"middle\" fill=\"var(--text)\" style=\"font-size:12px;font-weight:800\">Theo Hình thức quản lý<\/text>`;\n  body += `<line x1=\"${L_W + gap/2}\" y1=\"26\" x2=\"${L_W + gap/2}\" y2=\"${H-10}\" stroke=\"var(--border)\" stroke-width=\"1\" stroke-dasharray=\"5,4\" opacity=\"0.4\"/>`;\n\n  // ── LEFT: channels ──\n  const sortedCh = [...stats].sort((a,b)=>b.activePct-a.activePct);\n  const rowHCh = L_iH / sortedCh.length;\n\n  [0,25,50,75,100].forEach(v => {\n    const xx = L_pL + (v/100)*L_iW;\n    body += `<line x1=\"${xx}\" y1=\"${L_pT-6}\" x2=\"${xx}\" y2=\"${L_pT+L_iH+6}\" stroke=\"var(--border)\" stroke-width=\"${v===0?'1.2':'0.5'}\" stroke-dasharray=\"${v===0?'':'5,4'}\" opacity=\"0.65\"/>`;\n    body += `<text x=\"${xx}\" y=\"${L_pT+L_iH+18}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:9.5px;font-weight:600\">${v}%<\/text>`;\n  });\n  const bxCh = L_pL + (benchmarkCh/100)*L_iW;\n  body += `<line x1=\"${bxCh.toFixed(1)}\" y1=\"${L_pT-22}\" x2=\"${bxCh.toFixed(1)}\" y2=\"${L_pT+L_iH+6}\" stroke=\"var(--green)\" stroke-width=\"1.3\" stroke-dasharray=\"5,4\" opacity=\"0.5\"/>`;\n  body += `<text x=\"${bxCh.toFixed(1)}\" y=\"${L_pT+4}\" text-anchor=\"middle\" fill=\"var(--green)\" style=\"font-size:9px;font-weight:700;opacity:0.85\">TB ${benchmarkCh.toFixed(1)}%<\/text>`;\n\n  sortedCh.forEach((s,ci) => {\n    const rowY = (L_pT + (ci+0.5)*rowHCh).toFixed(1);\n    const dotX = (L_pL + (s.activePct/100)*L_iW).toFixed(1);\n    const col = CH_COLOR[s.ch];\n    const above = s.activePct >= benchmarkCh;\n    if (ci>0) body += `<line x1=\"${L_pL}\" y1=\"${(L_pT+ci*rowHCh).toFixed(1)}\" x2=\"${L_W-L_pR}\" y2=\"${(L_pT+ci*rowHCh).toFixed(1)}\" stroke=\"var(--border2)\" stroke-width=\"0.6\" opacity=\"0.4\"/>`;\n    body += `<text x=\"${L_pL-10}\" y=\"${+rowY+5}\" text-anchor=\"end\" fill=\"${col}\" style=\"font-size:11.5px;font-weight:800\">${s.ch}<\/text>`;\n    body += `<rect x=\"${L_pL}\" y=\"${(+rowY-DOT_R+1.5).toFixed(1)}\" width=\"${L_iW}\" height=\"${(DOT_R*2-3).toFixed(1)}\" rx=\"5\" fill=\"${col}\" fill-opacity=\"0.07\"/>`;\n    body += `<line x1=\"${L_pL}\" y1=\"${rowY}\" x2=\"${dotX}\" y2=\"${rowY}\" stroke=\"${col}\" stroke-width=\"3\" opacity=\"0.6\" stroke-linecap=\"round\"/>`;\n    const tip = `<b>${s.ch}<\/b><div class='tip-row'><span>Tỷ lệ Active<\/span><span>${fmtPct(s.activePct)}<\/span><\/div><div class='tip-row'><span>Tổng KH<\/span><span>${fmtN(s.n)}<\/span><\/div>`;\n    body += `<circle class=\"bar-rect\" cx=\"${dotX}\" cy=\"${rowY}\" r=\"${DOT_R}\" fill=\"${col}\" fill-opacity=\"${above?1:0.35}\" stroke=\"${col}\" stroke-width=\"2\" data-tip='${tip}'/>`;\n    body += `<text x=\"${(+dotX+DOT_R+8).toFixed(1)}\" y=\"${+rowY+5}\" fill=\"${col}\" style=\"font-size:13px;font-weight:800\">${s.activePct.toFixed(0)}%<\/text>`;\n    body += `<text x=\"${(L_W-L_pR+5).toFixed(1)}\" y=\"${+rowY+5}\" fill=\"${above?'var(--green)':'var(--red)'}\" style=\"font-size:10px;font-weight:900\">${above?'▲':'▼'}<\/text>`;\n  });\n\n  // ── RIGHT: mgmt ──\n  const sortedMg = [...mgStats].sort((a,b)=>b.v-a.v);\n  const rowHMg = R_iH / sortedMg.length;\n  const R_x0 = R_off + R_pL;\n\n  [0,25,50,75,100].forEach(v => {\n    const xx = R_x0 + (v/100)*R_iW;\n    body += `<line x1=\"${xx}\" y1=\"${R_pT-6}\" x2=\"${xx}\" y2=\"${R_pT+R_iH+6}\" stroke=\"var(--border)\" stroke-width=\"${v===0?'1.2':'0.5'}\" stroke-dasharray=\"${v===0?'':'5,4'}\" opacity=\"0.65\"/>`;\n    body += `<text x=\"${xx}\" y=\"${R_pT+R_iH+18}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:9.5px;font-weight:600\">${v}%<\/text>`;\n  });\n  const bxMg = R_x0 + (benchmarkMg/100)*R_iW;\n  body += `<line x1=\"${bxMg.toFixed(1)}\" y1=\"${R_pT-22}\" x2=\"${bxMg.toFixed(1)}\" y2=\"${R_pT+R_iH+6}\" stroke=\"var(--green)\" stroke-width=\"1.3\" stroke-dasharray=\"5,4\" opacity=\"0.5\"/>`;\n  body += `<text x=\"${bxMg.toFixed(1)}\" y=\"${R_pT+4}\" text-anchor=\"middle\" fill=\"var(--green)\" style=\"font-size:9px;font-weight:700;opacity:0.85\">TB ${benchmarkMg.toFixed(1)}%<\/text>`;\n\n  sortedMg.forEach((ms,mi) => {\n    const rowY = (R_pT + (mi+0.5)*rowHMg).toFixed(1);\n    const dotX = (R_x0 + (ms.v/100)*R_iW).toFixed(1);\n    const col = MG_COLOR[ms.mg];\n    const above = ms.v >= benchmarkMg;\n    if (mi>0) body += `<line x1=\"${R_x0}\" y1=\"${(R_pT+mi*rowHMg).toFixed(1)}\" x2=\"${R_off+R_W-R_pR}\" y2=\"${(R_pT+mi*rowHMg).toFixed(1)}\" stroke=\"var(--border2)\" stroke-width=\"0.6\" opacity=\"0.4\"/>`;\n    body += `<text x=\"${(R_x0-10).toFixed(1)}\" y=\"${+rowY+6}\" text-anchor=\"end\" fill=\"${col}\" style=\"font-size:14px;font-weight:800\">${ms.mg}<\/text>`;\n    body += `<rect x=\"${R_x0}\" y=\"${(+rowY-DOT_R+1.5).toFixed(1)}\" width=\"${R_iW}\" height=\"${(DOT_R*2-3).toFixed(1)}\" rx=\"5\" fill=\"${col}\" fill-opacity=\"0.08\"/>`;\n    body += `<line x1=\"${R_x0}\" y1=\"${rowY}\" x2=\"${dotX}\" y2=\"${rowY}\" stroke=\"${col}\" stroke-width=\"3.5\" opacity=\"0.6\" stroke-linecap=\"round\"/>`;\n    const tip = `<b>${ms.mg}<\/b><div class='tip-row'><span>Tỷ lệ Active<\/span><span>${fmtPct(ms.v)}<\/span><\/div><div class='tip-row'><span>Tổng KH<\/span><span>${fmtN(ms.n)}<\/span><\/div>`;\n    body += `<circle class=\"bar-rect\" cx=\"${dotX}\" cy=\"${rowY}\" r=\"${DOT_R}\" fill=\"${col}\" fill-opacity=\"${above?1:0.35}\" stroke=\"${col}\" stroke-width=\"2.5\" data-tip='${tip}'/>`;\n    body += `<text x=\"${(+dotX+DOT_R+9).toFixed(1)}\" y=\"${+rowY+6}\" fill=\"${col}\" style=\"font-size:15px;font-weight:800\">${ms.v.toFixed(0)}%<\/text>`;\n    body += `<text x=\"${(R_off+R_W-R_pR+5).toFixed(1)}\" y=\"${+rowY+6}\" fill=\"${above?'var(--green)':'var(--red)'}\" style=\"font-size:11px;font-weight:900\">${above?'▲':'▼'}<\/text>`;\n  });\n\n  svg.innerHTML = body;\n\n  document.getElementById(\"active-combined-legend\").innerHTML =\n    `<div class=\"leg\"><span style=\"color:var(--green);font-size:10px\">▲<\/span><span style=\"font-size:10px;margin-left:4px\">Trên trung bình<\/span><\/div>\n     <div class=\"leg\"><span style=\"color:var(--red);font-size:10px\">▼<\/span><span style=\"font-size:10px;margin-left:4px\">Dưới trung bình<\/span><\/div>`;\n}\n\n// ═══════════════════════════════════════════════\n//  TREND CHART 1 — by Channel (Kênh phát triển)\n// ═══════════════════════════════════════════════\nfunction renderTrendCh() {\n  const svg = document.getElementById(\"trend-ch-svg\");\n  if (!svg) return;\n  const W=1100, H=300, pL=78, pR=80, pT=36, pB=52;\n  const iW=W-pL-pR, iH=H-pT-pB;\n\n  const series = CHANNELS.map(ch => ({\n    key:ch, col:CH_COLOR[ch], label:ch,\n    pts: MONTHS.map(m => {\n      const sub = filtered.filter(d=>d.month===m && d.ch===ch);\n      return sub.length ? avg(sub.map(d=>d.deposit)) : null;\n    })\n  }));\n\n  const allVals = series.flatMap(s=>s.pts.filter(v=>v!==null));\n  const maxV = Math.max(...allVals, 1);\n  const ticks = 5;\n  let body = \"\";\n\n  // Grid + Y axis\n  for (let t=0;t<=ticks;t++) {\n    const yy = pT + iH - (t/ticks)*iH;\n    body += `<line x1=\"${pL}\" y1=\"${yy.toFixed(1)}\" x2=\"${W-pR}\" y2=\"${yy.toFixed(1)}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${pL-8}\" y=\"${(yy+4).toFixed(1)}\" text-anchor=\"end\" fill=\"var(--text3)\" style=\"font-size:9.5px\">${fmtM(maxV*t/ticks)}<\/text>`;\n  }\n  // X axis\n  MONTHS.forEach((m,i)=>{\n    const xx = pL + (i/(MONTHS.length-1))*iW;\n    body += `<line x1=\"${xx.toFixed(1)}\" y1=\"${pT}\" x2=\"${xx.toFixed(1)}\" y2=\"${(pT+iH).toFixed(1)}\" stroke=\"var(--border)\" stroke-width=\"0.5\"/>`;\n    body += `<text x=\"${xx.toFixed(1)}\" y=\"${(pT+iH+16).toFixed(1)}\" text-anchor=\"middle\" fill=\"var(--text2)\" style=\"font-size:11px;font-weight:700\">${MONTH_LBL[i]}<\/text>`;\n  });\n\n  // Area fills\n  series.forEach(s=>{\n    const pts = s.pts.map((v,i)=>v!==null?{xx:pL+(i/(MONTHS.length-1))*iW, yy:pT+iH-(v/maxV)*iH, v}:null).filter(Boolean);\n    if (pts.length<2) return;\n    let area=`M${pts[0].xx.toFixed(1)},${(pT+iH).toFixed(1)}`;\n    pts.forEach(p=>{area+=` L${p.xx.toFixed(1)},${p.yy.toFixed(1)}`;});\n    area+=` L${pts[pts.length-1].xx.toFixed(1)},${(pT+iH).toFixed(1)} Z`;\n    body+=`<path d=\"${area}\" fill=\"${s.col}\" fill-opacity=\"0.07\"/>`;\n  });\n\n  // Lines + dots + labels\n  series.forEach(s=>{\n    const pts = s.pts.map((v,i)=>v!==null?{xx:pL+(i/(MONTHS.length-1))*iW, yy:pT+iH-(v/maxV)*iH, v}:null).filter(Boolean);\n    if (!pts.length) return;\n    const path = pts.map((p,i)=>(i===0?'M':'L')+`${p.xx.toFixed(1)},${p.yy.toFixed(1)}`).join('');\n    body+=`<path d=\"${path}\" fill=\"none\" stroke=\"${s.col}\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.9\"/>`;\n    pts.forEach(p=>{\n      const tip=`<b>${s.label}<\/b><div class='tip-row'><span>AUM/KH TB<\/span><span>${fmtM(p.v)}<\/span><\/div>`;\n      body+=`<circle class=\"line-dot\" cx=\"${p.xx.toFixed(1)}\" cy=\"${p.yy.toFixed(1)}\" r=\"4.5\" fill=\"${s.col}\" stroke=\"var(--surface)\" stroke-width=\"1.5\" data-tip='${tip}'/>`;\n    });\n    const last = pts[pts.length-1];\n    body+=`<text x=\"${(last.xx+10).toFixed(1)}\" y=\"${(last.yy+4).toFixed(1)}\" fill=\"${s.col}\" style=\"font-size:10px;font-weight:800\">${fmtM(last.v)}<\/text>`;\n  });\n\n  svg.innerHTML = body;\n\n  document.getElementById(\"trend-ch-legend\").innerHTML =\n    CHANNELS.map(ch=>`<div class=\"leg\"><span class=\"leg-dot\" style=\"background:${CH_COLOR[ch]}\"><\/span>${ch}<\/div>`).join(\"\");\n}\n\n// ═══════════════════════════════════════════════\n//  TREND CHART 2 — by Mgmt (Hình thức quản lý)\n// ═══════════════════════════════════════════════\nfunction renderTrendMg() {\n  const svg = document.getElementById(\"trend-mg-svg\");\n  if (!svg) return;\n  const W=1100, H=300, pL=78, pR=80, pT=36, pB=52;\n  const iW=W-pL-pR, iH=H-pT-pB;\n\n  const series = MGMTS.map(mg => ({\n    key:mg, col:MG_COLOR[mg], label:mg,\n    pts: MONTHS.map(m => {\n      const sub = filtered.filter(d=>d.month===m && d.mg===mg);\n      return sub.length ? avg(sub.map(d=>d.deposit)) : null;\n    })\n  }));\n\n  const allVals = series.flatMap(s=>s.pts.filter(v=>v!==null));\n  const maxV = Math.max(...allVals, 1);\n  const ticks = 5;\n  let body = \"\";\n\n  for (let t=0;t<=ticks;t++) {\n    const yy = pT + iH - (t/ticks)*iH;\n    body += `<line x1=\"${pL}\" y1=\"${yy.toFixed(1)}\" x2=\"${W-pR}\" y2=\"${yy.toFixed(1)}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${pL-8}\" y=\"${(yy+4).toFixed(1)}\" text-anchor=\"end\" fill=\"var(--text3)\" style=\"font-size:9.5px\">${fmtM(maxV*t/ticks)}<\/text>`;\n  }\n  MONTHS.forEach((m,i)=>{\n    const xx = pL + (i/(MONTHS.length-1))*iW;\n    body += `<line x1=\"${xx.toFixed(1)}\" y1=\"${pT}\" x2=\"${xx.toFixed(1)}\" y2=\"${(pT+iH).toFixed(1)}\" stroke=\"var(--border)\" stroke-width=\"0.5\"/>`;\n    body += `<text x=\"${xx.toFixed(1)}\" y=\"${(pT+iH+16).toFixed(1)}\" text-anchor=\"middle\" fill=\"var(--text2)\" style=\"font-size:11px;font-weight:700\">${MONTH_LBL[i]}<\/text>`;\n  });\n\n  series.forEach(s=>{\n    const pts = s.pts.map((v,i)=>v!==null?{xx:pL+(i/(MONTHS.length-1))*iW, yy:pT+iH-(v/maxV)*iH, v}:null).filter(Boolean);\n    if (pts.length<2) return;\n    let area=`M${pts[0].xx.toFixed(1)},${(pT+iH).toFixed(1)}`;\n    pts.forEach(p=>{area+=` L${p.xx.toFixed(1)},${p.yy.toFixed(1)}`;});\n    area+=` L${pts[pts.length-1].xx.toFixed(1)},${(pT+iH).toFixed(1)} Z`;\n    body+=`<path d=\"${area}\" fill=\"${s.col}\" fill-opacity=\"0.10\"/>`;\n  });\n\n  series.forEach(s=>{\n    const pts = s.pts.map((v,i)=>v!==null?{xx:pL+(i/(MONTHS.length-1))*iW, yy:pT+iH-(v/maxV)*iH, v}:null).filter(Boolean);\n    if (!pts.length) return;\n    const path = pts.map((p,i)=>(i===0?'M':'L')+`${p.xx.toFixed(1)},${p.yy.toFixed(1)}`).join('');\n    body+=`<path d=\"${path}\" fill=\"none\" stroke=\"${s.col}\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.95\"/>`;\n    pts.forEach(p=>{\n      const tip=`<b>${s.label}<\/b><div class='tip-row'><span>AUM/KH TB<\/span><span>${fmtM(p.v)}<\/span><\/div>`;\n      body+=`<circle class=\"line-dot\" cx=\"${p.xx.toFixed(1)}\" cy=\"${p.yy.toFixed(1)}\" r=\"5.5\" fill=\"${s.col}\" stroke=\"var(--surface)\" stroke-width=\"1.5\" data-tip='${tip}'/>`;\n    });\n    const last = pts[pts.length-1];\n    const tagStr = fmtM(last.v);\n    const tagW = tagStr.length*6.5+16;\n    body+=`<rect x=\"${(last.xx+6).toFixed(1)}\" y=\"${(last.yy-11).toFixed(1)}\" width=\"${tagW}\" height=\"18\" rx=\"4\" fill=\"${s.col}\" opacity=\"0.9\"/>`;\n    body+=`<text x=\"${(last.xx+6+tagW/2).toFixed(1)}\" y=\"${(last.yy+2).toFixed(1)}\" text-anchor=\"middle\" fill=\"#000\" style=\"font-size:10px;font-weight:900\">${tagStr}<\/text>`;\n  });\n\n  // Legend inline bottom\n  MGMTS.forEach((mg,i)=>{\n    const lx = pL + i*(iW/MGMTS.length);\n    body+=`<line x1=\"${lx}\" y1=\"${pT+iH+34}\" x2=\"${lx+14}\" y2=\"${pT+iH+34}\" stroke=\"${MG_COLOR[mg]}\" stroke-width=\"2.5\"/>`;\n    body+=`<circle cx=\"${lx+7}\" cy=\"${pT+iH+34}\" r=\"3.5\" fill=\"${MG_COLOR[mg]}\"/>`;\n    body+=`<text x=\"${lx+20}\" y=\"${pT+iH+38}\" fill=\"var(--text2)\" style=\"font-size:11px;font-weight:700\">${mg}<\/text>`;\n  });\n\n  svg.innerHTML = body;\n\n  document.getElementById(\"trend-mg-legend\").innerHTML =\n    MGMTS.map(mg=>`<div class=\"leg\"><span class=\"leg-dot\" style=\"background:${MG_COLOR[mg]}\"><\/span>${mg}<\/div>`).join(\"\");\n}\n\n// ═══════════════════════════════════════════════\n//  TREND CHART 3 — Cross: Channel × Mgmt (tab per mgmt)\n// ═══════════════════════════════════════════════\nwindow._trendCrossTab = 'MG';\n\nfunction setTrendCrossTab(mg, btn) {\n  window._trendCrossTab = mg;\n  document.querySelectorAll('#trend-cross-tabs .cm-tab').forEach(b=>b.classList.remove('active'));\n  btn.classList.add('active');\n  renderTrendCross(mg);\n}\n\nfunction renderTrendCross(activeMg) {\n  const svg = document.getElementById(\"trend-cross-svg\");\n  if (!svg) return;\n  const W=1100, H=300, pL=78, pR=80, pT=36, pB=52;\n  const iW=W-pL-pR, iH=H-pT-pB;\n\n  const mgCol = MG_COLOR[activeMg];\n\n  const series = CHANNELS.map(ch => ({\n    key:ch, col:CH_COLOR[ch], label:ch,\n    pts: MONTHS.map(m => {\n      const sub = filtered.filter(d=>d.month===m && d.ch===ch && d.mg===activeMg);\n      return sub.length ? avg(sub.map(d=>d.deposit)) : null;\n    })\n  }));\n\n  const allVals = series.flatMap(s=>s.pts.filter(v=>v!==null));\n  const maxV = Math.max(...allVals, 1);\n  const ticks = 5;\n  let body = \"\";\n\n  // Background tint matching mgmt color\n  body += `<rect x=\"${pL}\" y=\"${pT}\" width=\"${iW}\" height=\"${iH}\" fill=\"${mgCol}\" fill-opacity=\"0.025\" rx=\"4\"/>`;\n\n  // Mgmt label watermark\n  body += `<text x=\"${(pL+iW/2).toFixed(1)}\" y=\"${(pT+iH/2+18).toFixed(1)}\" text-anchor=\"middle\" fill=\"${mgCol}\" style=\"font-size:64px;font-weight:900;opacity:0.04\">${activeMg}<\/text>`;\n\n  for (let t=0;t<=ticks;t++) {\n    const yy = pT + iH - (t/ticks)*iH;\n    body += `<line x1=\"${pL}\" y1=\"${yy.toFixed(1)}\" x2=\"${W-pR}\" y2=\"${yy.toFixed(1)}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${pL-8}\" y=\"${(yy+4).toFixed(1)}\" text-anchor=\"end\" fill=\"var(--text3)\" style=\"font-size:9.5px\">${fmtM(maxV*t/ticks)}<\/text>`;\n  }\n  MONTHS.forEach((m,i)=>{\n    const xx = pL + (i/(MONTHS.length-1))*iW;\n    body += `<line x1=\"${xx.toFixed(1)}\" y1=\"${pT}\" x2=\"${xx.toFixed(1)}\" y2=\"${(pT+iH).toFixed(1)}\" stroke=\"var(--border)\" stroke-width=\"0.5\"/>`;\n    body += `<text x=\"${xx.toFixed(1)}\" y=\"${(pT+iH+16).toFixed(1)}\" text-anchor=\"middle\" fill=\"var(--text2)\" style=\"font-size:11px;font-weight:700\">${MONTH_LBL[i]}<\/text>`;\n  });\n\n  // Trend direction arrows between T1 and T5 for each channel\n  series.forEach(s=>{\n    const pts = s.pts.map((v,i)=>v!==null?{xx:pL+(i/(MONTHS.length-1))*iW, yy:pT+iH-(v/maxV)*iH, v}:null).filter(Boolean);\n    if (pts.length<2) return;\n    let area=`M${pts[0].xx.toFixed(1)},${(pT+iH).toFixed(1)}`;\n    pts.forEach(p=>{area+=` L${p.xx.toFixed(1)},${p.yy.toFixed(1)}`;});\n    area+=` L${pts[pts.length-1].xx.toFixed(1)},${(pT+iH).toFixed(1)} Z`;\n    body+=`<path d=\"${area}\" fill=\"${s.col}\" fill-opacity=\"0.08\"/>`;\n  });\n\n  series.forEach(s=>{\n    const pts = s.pts.map((v,i)=>v!==null?{xx:pL+(i/(MONTHS.length-1))*iW, yy:pT+iH-(v/maxV)*iH, v}:null).filter(Boolean);\n    if (!pts.length) return;\n    const path = pts.map((p,i)=>(i===0?'M':'L')+`${p.xx.toFixed(1)},${p.yy.toFixed(1)}`).join('');\n    body+=`<path d=\"${path}\" fill=\"none\" stroke=\"${s.col}\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.9\"/>`;\n    pts.forEach(p=>{\n      const cnt = filtered.filter(d=>d.mg===activeMg && d.ch===s.key && d.month===MONTHS[s.pts.indexOf(s.pts.find((_,i)=>pL+(i/(MONTHS.length-1))*iW===p.xx||Math.abs(pL+(i/(MONTHS.length-1))*iW-p.xx)<1))]).length;\n      const tip=`<b>${s.label} [${activeMg}]<\/b><div class='tip-row'><span>AUM/KH TB<\/span><span>${fmtM(p.v)}<\/span><\/div>`;\n      body+=`<circle class=\"line-dot\" cx=\"${p.xx.toFixed(1)}\" cy=\"${p.yy.toFixed(1)}\" r=\"4.5\" fill=\"${s.col}\" stroke=\"var(--surface)\" stroke-width=\"1.5\" data-tip='${tip}'/>`;\n    });\n    const last = pts[pts.length-1];\n    const first = pts[0];\n    // Trend indicator: compare last to first\n    const trend = last.v > first.v ? '▲' : last.v < first.v ? '▼' : '–';\n    const trendCol = last.v > first.v ? 'var(--green)' : last.v < first.v ? 'var(--red)' : 'var(--text3)';\n    body+=`<text x=\"${(last.xx+10).toFixed(1)}\" y=\"${(last.yy+4).toFixed(1)}\" fill=\"${s.col}\" style=\"font-size:10px;font-weight:800\">${fmtM(last.v)}<\/text>`;\n    body+=`<text x=\"${(last.xx+10).toFixed(1)}\" y=\"${(last.yy+16).toFixed(1)}\" fill=\"${trendCol}\" style=\"font-size:9px;font-weight:900\">${trend}<\/text>`;\n  });\n\n  // Legend bottom\n  CHANNELS.forEach((ch,i)=>{\n    const lx = pL + i*(iW/CHANNELS.length);\n    body+=`<line x1=\"${lx}\" y1=\"${pT+iH+34}\" x2=\"${lx+14}\" y2=\"${pT+iH+34}\" stroke=\"${CH_COLOR[ch]}\" stroke-width=\"2.2\"/>`;\n    body+=`<circle cx=\"${lx+7}\" cy=\"${pT+iH+34}\" r=\"3\" fill=\"${CH_COLOR[ch]}\"/>`;\n    body+=`<text x=\"${lx+20}\" y=\"${pT+iH+38}\" fill=\"var(--text2)\" style=\"font-size:10px;font-weight:700\">${ch}<\/text>`;\n  });\n\n  svg.innerHTML = body;\n\n  document.getElementById(\"trend-cross-legend\").innerHTML =\n    `<span style=\"font-size:11px;color:${mgCol};font-weight:700;background:rgba(255,255,255,0.06);padding:3px 10px;border-radius:6px;border:1px solid ${mgCol}44\">Lọc: ${activeMg}<\/span>&nbsp;` +\n    CHANNELS.map(ch=>`<div class=\"leg\"><span class=\"leg-dot\" style=\"background:${CH_COLOR[ch]}\"><\/span>${ch}<\/div>`).join(\"\") +\n    `<div class=\"leg\" style=\"margin-left:6px\"><span style=\"color:var(--green);font-size:11px\">▲<\/span> Tăng&nbsp;<span style=\"color:var(--red);font-size:11px\">▼<\/span> Giảm<\/div>`;\n}\n\n\n// ═══════════════════════════════════════════════\n//  CONVERSION TIME — Days to Deposit & Days to Trade\n// ═══════════════════════════════════════════════\nfunction renderConversionTime() {\n  _renderConvBar(\n    \"conv-deposit-svg\",\n    \"conv-deposit-legend\",\n    d => d.daysToDeposit !== null,\n    d => d.daysToDeposit,\n    \"Ngày TB đến nạp tiền đầu\"\n  );\n  _renderConvBar(\n    \"conv-trade-svg\",\n    \"conv-trade-legend\",\n    d => d.daysToTrade !== null,\n    d => d.daysToTrade,\n    \"Ngày TB đến giao dịch đầu\"\n  );\n}\n\nfunction _renderConvBar(svgId, legendId, filterFn, valFn, metricLabel) {\n  const svg = document.getElementById(svgId);\n  if (!svg) return;\n\n  // Layout zones:\n  //   [0 .. mgLabelW]          = mgmt group name (MG / CTV / NoID)\n  //   [mgLabelW .. pL]         = channel sub-labels (ch name, compact)\n  //   [pL .. W-pR]             = bar area\n  const W = 1100, H = 360;\n  const mgLabelW  = 68;   // right-edge of mgmt name\n  const chLabelW  = 44;   // extra space for channel sub-label\n  const pL        = mgLabelW + chLabelW + 6;  // = 118\n  const pR = 40, pT = 42, pB = 50;\n  const iW = W - pL - pR, iH = H - pT - pB;\n\n  const nCh   = CHANNELS.length;\n  const rowH  = iH / MGMTS.length;\n  const rowPad = 5;\n  const barH  = (rowH - rowPad*2 - (nCh-1)*4) / nCh;\n\n  // Data matrix [mg][ch]\n  const matrix = MGMTS.map(mg =>\n    CHANNELS.map(ch => {\n      const sub  = filtered.filter(d => d.mg===mg && d.ch===ch && filterFn(d));\n      const vals = sub.map(valFn).filter(v => v !== null && v >= 0);\n      return { n: vals.length, avg: vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null };\n    })\n  );\n\n  const maxVal    = Math.max(...matrix.flatMap(row => row.map(c => c.avg||0)), 1);\n  const scaleCeil = Math.ceil(maxVal / 5) * 5;\n\n  let body = \"\";\n\n  // ── X axis grid + labels ──\n  const ticks = 6;\n  for (let t=0; t<=ticks; t++) {\n    const xx  = pL + (t/ticks)*iW;\n    const val = Math.round(scaleCeil*t/ticks);\n    body += `<line x1=\"${xx.toFixed(1)}\" y1=\"${pT-6}\" x2=\"${xx.toFixed(1)}\" y2=\"${pT+iH}\" stroke=\"var(--border)\" stroke-width=\"${t===0?'1.4':'0.6'}\" stroke-dasharray=\"${t===0?'':'5,4'}\" opacity=\"0.65\"/>`;\n    body += `<text x=\"${xx.toFixed(1)}\" y=\"${pT+iH+16}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:9.5px;font-weight:600\">${val} ngày<\/text>`;\n  }\n\n  // ── Benchmark line ──\n  const allVals    = filtered.filter(filterFn).map(valFn).filter(v=>v!==null&&v>=0);\n  const overallAvg = allVals.length ? allVals.reduce((a,b)=>a+b,0)/allVals.length : 0;\n  const bmarkX     = pL + (overallAvg/scaleCeil)*iW;\n  body += `<line x1=\"${bmarkX.toFixed(1)}\" y1=\"${pT-18}\" x2=\"${bmarkX.toFixed(1)}\" y2=\"${pT+iH+4}\" stroke=\"var(--brand)\" stroke-width=\"1.5\" stroke-dasharray=\"5,4\" opacity=\"0.75\"/>`;\n  const bmTag = `TB ${overallAvg.toFixed(1)} ngày`;\n  const bmW   = bmTag.length * 6.2 + 12;\n  body += `<rect x=\"${(bmarkX - bmW/2).toFixed(1)}\" y=\"${pT-36}\" width=\"${bmW.toFixed(1)}\" height=\"18\" rx=\"4\" fill=\"var(--brand)\" opacity=\"0.9\"/>`;\n  body += `<text x=\"${bmarkX.toFixed(1)}\" y=\"${pT-24}\" text-anchor=\"middle\" fill=\"#000\" style=\"font-size:9.5px;font-weight:900\">${bmTag}<\/text>`;\n\n  // ── Mgmt rows ──\n  MGMTS.forEach((mg, mi) => {\n    const rowY = pT + mi * rowH;\n    const midY = rowY + rowH / 2;\n    const mgCol = MG_COLOR[mg];\n\n    // Row separator\n    if (mi > 0) body += `<line x1=\"0\" y1=\"${rowY}\" x2=\"${W}\" y2=\"${rowY}\" stroke=\"var(--border2)\" stroke-width=\"0.6\" opacity=\"0.5\"/>`;\n\n    // Alternating row bg\n    if (mi%2===0) body += `<rect x=\"${pL}\" y=\"${rowY}\" width=\"${iW}\" height=\"${rowH}\" fill=\"rgba(255,255,255,0.012)\"/>`;\n\n    // ── Mgmt group name — large, vertically centred ──\n    body += `<text x=\"${mgLabelW}\" y=\"${(midY+6).toFixed(1)}\" text-anchor=\"end\" fill=\"${mgCol}\" style=\"font-size:15px;font-weight:900\">${mg}<\/text>`;\n\n    // ── Channel sub-bars ──\n    CHANNELS.forEach((ch, ci) => {\n      const cell    = matrix[mi][ci];\n      const barY    = rowY + rowPad + ci * (barH + 4);\n      const barMidY = barY + barH / 2;\n      const chCol   = CH_COLOR[ch];\n\n      // Channel sub-label — between mgmt name and bar\n      body += `<text x=\"${(mgLabelW + chLabelW + 2).toFixed(1)}\" y=\"${(barMidY+4).toFixed(1)}\" text-anchor=\"end\" fill=\"${chCol}\" style=\"font-size:8.5px;font-weight:800\">${ch.split(' ')[0]}<\/text>`;\n\n      if (cell.avg === null || cell.n === 0) {\n        body += `<line x1=\"${(pL+4).toFixed(1)}\" y1=\"${barMidY.toFixed(1)}\" x2=\"${(pL+22).toFixed(1)}\" y2=\"${barMidY.toFixed(1)}\" stroke=\"${chCol}\" stroke-width=\"1.5\" opacity=\"0.25\"/>`;\n        return;\n      }\n\n      const bw  = (cell.avg / scaleCeil) * iW;\n      const tip = `<b>${mg} — ${ch}<\/b><div class='tip-row'><span>${metricLabel}<\/span><span>${cell.avg.toFixed(1)} ngày<\/span><\/div><div class='tip-row'><span>Số KH<\/span><span>${fmtN(cell.n)}<\/span><\/div>`;\n\n      // Track bg\n      body += `<rect x=\"${pL}\" y=\"${barY}\" width=\"${iW}\" height=\"${barH}\" rx=\"3\" fill=\"${chCol}\" fill-opacity=\"0.06\"/>`;\n      // Bar\n      body += `<rect class=\"bar-rect\" x=\"${pL}\" y=\"${barY}\" width=\"${Math.max(bw,2).toFixed(1)}\" height=\"${barH}\" rx=\"3\" fill=\"${chCol}\" fill-opacity=\"0.85\" data-tip='${tip}'/>`;\n\n      // Value label\n      const inside = bw > 55;\n      const lx = inside ? pL + bw - 6 : pL + bw + 7;\n      body += `<text x=\"${lx.toFixed(1)}\" y=\"${(barMidY+4).toFixed(1)}\" text-anchor=\"${inside?'end':'start'}\" fill=\"${inside?'#000':chCol}\" style=\"font-size:10px;font-weight:800\">${cell.avg.toFixed(1)}d<\/text>`;\n    });\n  });\n\n  svg.innerHTML = body;\n\n  // ── Top legend ──\n  document.getElementById(legendId).innerHTML =\n    CHANNELS.map(ch =>\n      `<div class=\"leg\"><span class=\"leg-dot\" style=\"background:${CH_COLOR[ch]}\"><\/span>${ch}<\/div>`\n    ).join(\"\") +\n    `<div class=\"leg\" style=\"margin-left:10px;gap:5px\">\n       <span style=\"display:inline-block;width:20px;height:0;border-top:2px dashed var(--brand);vertical-align:middle\"><\/span>\n       <span style=\"color:var(--brand);font-weight:700\">TB tổng thể<\/span>\n     <\/div>`;\n}\n\n// ═══════════════════════════════════════════════\n//  DEPOSIT BUCKETS — kept as stub (no longer rendered)\n// ═══════════════════════════════════════════════\nfunction renderBuckets() { /* replaced by renderConversionTime */ }\n\n// ═══════════════════════════════════════════════\n//  SCORECARD MGMT TABLE\n// ═══════════════════════════════════════════════\nfunction renderScorecardMgmt(cms) {\n  // Build per-mgmt stats\n  const mgStats = MGMTS.map(mg => {\n    let n=0, sumAUM=0, sumFee=0, activeN=0;\n    CHANNELS.forEach(ch => {\n      const o = cms[ch][mg];\n      n       += o.n;\n      sumAUM  += o.sumAUM;\n      sumFee  += o.sumFee;\n      activeN += o.activeN;\n    });\n    const aumAvg    = n ? sumAUM / n : 0;\n    const feeAvg    = n ? sumFee / n : 0;\n    const activePct = n ? activeN / n * 100 : 0;\n    // Weighted avg cost per KH for this mgmt (channel cost × n of that channel)\n    let wCost = 0, wN = 0;\n    CHANNELS.forEach(ch => {\n      const o = cms[ch][mg];\n      wCost += (CH_COST_PER_1000[ch] || 0) * 1e6 / 1000 * o.n;\n      wN    += o.n;\n    });\n    const costPerKH = wN ? wCost / wN : 0;\n    return { mg, n, aumAvg, feeAvg, activePct, costPerKH };\n  });\n\n  const maxAUM = Math.max(...mgStats.map(s=>s.aumAvg), 1);\n  const maxFee = Math.max(...mgStats.map(s=>s.feeAvg), 1);\n  const maxAct = Math.max(...mgStats.map(s=>s.activePct), 1);\n\n  const withScore = mgStats.map(s => ({\n    ...s,\n    score: Math.round(\n      (s.aumAvg/maxAUM * 0.45 +\n       s.feeAvg/maxFee * 0.30 +\n       s.activePct/maxAct * 0.25) * 100\n    )\n  })).sort((a,b) => b.score - a.score);\n\n  const rankColors = [\"#f0a800\",\"#58a6ff\",\"#8b949e\"];\n  const maxAUMv = Math.max(...withScore.map(s=>s.aumAvg), 1);\n\n  const rows = withScore.map((s, i) => {\n    const barW    = (s.aumAvg / maxAUMv * 72).toFixed(0);\n    const actClass = s.activePct >= 60 ? \"badge-good\" : s.activePct >= 40 ? \"badge-warn\" : \"badge-bad\";\n    const roi      = s.costPerKH > 0 ? s.feeAvg / s.costPerKH : 0;\n    const roiClass = roi >= 3 ? \"badge-good\" : roi >= 1.5 ? \"badge-warn\" : \"badge-bad\";\n    const mgCol    = MG_COLOR[s.mg];\n    return `<tr>\n      <td>\n        <div style=\"display:flex;align-items:center;gap:10px\">\n          <span class=\"sc-rank\" style=\"background:${rankColors[i]}18;color:${rankColors[i]};border:1.5px solid ${rankColors[i]}50;font-size:12px\">${i+1}<\/span>\n          <span class=\"badge-ch\" style=\"background:${mgCol}15;color:${mgCol};border-color:${mgCol}40\">${s.mg}<\/span>\n        <\/div>\n      <\/td>\n      <td>${fmtN(s.n)}<\/td>\n      <td>\n        ${fmtM(s.aumAvg)}\n        <span class=\"bar-inline\" style=\"width:${barW}px;background:${mgCol}60\"><\/span>\n      <\/td>\n      <td>${fmtM(s.feeAvg)}<\/td>\n      <td><span class=\"${actClass}\">${fmtPct(s.activePct)}<\/span><\/td>\n      <td>${fmtN(Math.round(s.costPerKH))}đ<\/td>\n      <td><span class=\"${roiClass}\" style=\"font-size:11px;font-weight:800\">${roi.toFixed(1)}×<\/span><\/td>\n    <\/tr>`;\n  }).join(\"\");\n\n  document.getElementById(\"scorecard-mgmt-wrap\").innerHTML = `\n    <table class=\"sc-table\">\n      <thead><tr>\n        <th style=\"text-align:left\">Quản lý<\/th>\n        <th>Số KH<\/th>\n        <th>AUM/KH<\/th>\n        <th>Phí NET/KH<\/th>\n        <th>Active%<\/th>\n        <th>Chi phí/KH<\/th>\n        <th>ROI net<\/th>\n      <\/tr><\/thead>\n      <tbody>${rows}<\/tbody>\n    <\/table>`;\n}\n\n// ═══════════════════════════════════════════════\n//  SCATTER MGMT\n// ═══════════════════════════════════════════════\nfunction renderScatterMgmt(cms) {\n  const svg = document.getElementById(\"scatter-mgmt-svg\");\n  const W=520, H=280;\n  const pL=72, pR=40, pT=28, pB=44;\n  const iW=W-pL-pR, iH=H-pT-pB;\n\n  // Build per-mgmt aggregates\n  const pts = MGMTS.map(mg => {\n    let n=0, sumAUM=0, sumFee=0;\n    CHANNELS.forEach(ch => {\n      const o = cms[ch][mg];\n      n += o.n; sumAUM += o.sumAUM; sumFee += o.sumFee;\n    });\n    const feePerKH = n ? sumFee / n : 0;\n    // Weighted avg cost per KH\n    let wCost=0, wN=0;\n    CHANNELS.forEach(ch => {\n      const o = cms[ch][mg];\n      wCost += (CH_COST_PER_1000[ch]||0)*1e6/1000 * o.n;\n      wN    += o.n;\n    });\n    const costPerKH = wN ? wCost / wN : 0;\n    const roi = costPerKH > 0 ? feePerKH / costPerKH : 0;\n    return { mg, x: costPerKH, y: feePerKH, n, roi };\n  });\n\n  const maxX = Math.max(...pts.map(p=>p.x), 1);\n  const maxY = Math.max(...pts.map(p=>p.y), 1);\n  const maxN = Math.max(...pts.map(p=>p.n), 1);\n  const avgX = pts.reduce((a,p)=>a+p.x,0)/pts.length;\n  const avgY = pts.reduce((a,p)=>a+p.y,0)/pts.length;\n\n  let body = \"\";\n\n  const qx = pL + (avgX/maxX)*iW;\n  const qy = pT + iH - (avgY/maxY)*iH;\n  body += `<rect x=\"${pL}\" y=\"${pT}\" width=\"${(qx-pL).toFixed(1)}\" height=\"${(qy-pT).toFixed(1)}\" fill=\"rgba(63,185,80,0.04)\"/>`;\n  body += `<rect x=\"${qx.toFixed(1)}\" y=\"${qy.toFixed(1)}\" width=\"${(W-pR-qx).toFixed(1)}\" height=\"${(pT+iH-qy).toFixed(1)}\" fill=\"rgba(248,81,73,0.04)\"/>`;\n\n  // Grid\n  for (let t=0;t<=4;t++) {\n    const yy = pT + iH - (t/4)*iH;\n    const val = maxY*t/4;\n    body += `<line x1=\"${pL}\" y1=\"${yy}\" x2=\"${W-pR}\" y2=\"${yy}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${pL-6}\" y=\"${yy+4}\" text-anchor=\"end\" fill=\"var(--text3)\" style=\"font-size:8px\">${val>=1e6?(val/1e6).toFixed(0)+'M':Math.round(val/1000)+'K'}<\/text>`;\n  }\n  for (let t=0;t<=4;t++) {\n    const xx = pL + (t/4)*iW;\n    const val = maxX*t/4;\n    body += `<line x1=\"${xx}\" y1=\"${pT}\" x2=\"${xx}\" y2=\"${pT+iH}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${xx}\" y=\"${pT+iH+14}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:8px\">${val>=1e6?(val/1e6).toFixed(0)+'M':Math.round(val/1000)+'K'}<\/text>`;\n  }\n\n  // Crosshair\n  body += `<line x1=\"${qx.toFixed(1)}\" y1=\"${pT}\" x2=\"${qx.toFixed(1)}\" y2=\"${pT+iH}\" stroke=\"#f0a800\" stroke-width=\"1\" stroke-dasharray=\"4,3\" opacity=\"0.45\"/>`;\n  body += `<line x1=\"${pL}\" y1=\"${qy.toFixed(1)}\" x2=\"${W-pR}\" y2=\"${qy.toFixed(1)}\" stroke=\"#f0a800\" stroke-width=\"1\" stroke-dasharray=\"4,3\" opacity=\"0.45\"/>`;\n\n  // Quadrant labels\n  body += `<text x=\"${(pL+8).toFixed(1)}\" y=\"${(pT+12).toFixed(1)}\" fill=\"var(--green)\" style=\"font-size:8px;font-weight:700;opacity:0.6\">↑ Hiệu quả cao<\/text>`;\n  body += `<text x=\"${(qx+8).toFixed(1)}\" y=\"${(pT+iH-6).toFixed(1)}\" fill=\"var(--red)\" style=\"font-size:8px;font-weight:700;opacity:0.6\">Chi phí cao ↓<\/text>`;\n\n  // Axis labels\n  body += `<text x=\"${pL-48}\" y=\"${pT+iH/2}\" text-anchor=\"middle\" fill=\"var(--text3)\" transform=\"rotate(-90,${pL-48},${pT+iH/2})\" style=\"font-size:9px\">Phí NET/KH (đ)<\/text>`;\n  body += `<text x=\"${pL+iW/2}\" y=\"${pT+iH+30}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:9px\">Chi phí/KH (đ)<\/text>`;\n\n  // Bubbles\n  pts.forEach(p => {\n    const cx = pL + (p.x/maxX)*iW;\n    const cy = pT + iH - (p.y/maxY)*iH;\n    const r  = 12 + (p.n/maxN)*22;\n    const col = MG_COLOR[p.mg];\n    const tip = `<b>${p.mg}<\/b><div class='tip-row'><span>Chi phí/KH<\/span><span>${fmtN(Math.round(p.x))}đ<\/span><\/div><div class='tip-row'><span>Phí NET/KH<\/span><span>${fmtM(p.y)}<\/span><\/div><div class='tip-row'><span>ROI<\/span><span>${p.roi.toFixed(1)}×<\/span><\/div><div class='tip-row'><span>Số KH<\/span><span>${fmtN(p.n)}<\/span><\/div>`;\n    body += `<circle cx=\"${cx.toFixed(1)}\" cy=\"${cy.toFixed(1)}\" r=\"${r.toFixed(1)}\" fill=\"${col}\" fill-opacity=\"0.25\" stroke=\"${col}\" stroke-width=\"2\" data-tip='${tip}' class=\"bar-rect\"/>`;\n    body += `<text x=\"${cx.toFixed(1)}\" y=\"${(cy+4).toFixed(1)}\" text-anchor=\"middle\" fill=\"${col}\" style=\"font-size:11px;font-weight:800\">${p.mg}<\/text>`;\n  });\n\n  svg.innerHTML = body;\n}\n\n// ═══════════════════════════════════════════════\nfunction renderScatter(stats) {\n  const svg = document.getElementById(\"scatter-svg\");\n  const W=520, H=280;\n  const pL=72, pR=40, pT=28, pB=44;\n  const iW=W-pL-pR, iH=H-pT-pB;\n\n  // X = Chi phí/KH (VND), Y = Phí NET/KH (feeAvg, VND)\n  const pts = stats.map(s => {\n    const costPerKH = (CH_COST_PER_1000[s.ch] || 0) * 1e6 / 1000; // VND per customer\n    const feePerKH  = s.feeAvg;                                     // VND per customer\n    const roi       = costPerKH > 0 ? feePerKH / costPerKH : 0;\n    return { ch: s.ch, x: costPerKH, y: feePerKH, n: s.n, roi };\n  });\n\n  const maxX = Math.max(...pts.map(p=>p.x), 1);\n  const maxY = Math.max(...pts.map(p=>p.y), 1);\n  const maxN = Math.max(...pts.map(p=>p.n), 1);\n  // Avg lines\n  const avgX = pts.reduce((a,p)=>a+p.x,0)/pts.length;\n  const avgY = pts.reduce((a,p)=>a+p.y,0)/pts.length;\n\n  let body = \"\";\n\n  // Quadrant shading: top-left = best (high fee, low cost)\n  const qx = pL + (avgX/maxX)*iW;\n  const qy = pT + iH - (avgY/maxY)*iH;\n  body += `<rect x=\"${pL}\" y=\"${pT}\" width=\"${(qx-pL).toFixed(1)}\" height=\"${(qy-pT).toFixed(1)}\" fill=\"rgba(63,185,80,0.04)\"/>`;\n  body += `<rect x=\"${qx.toFixed(1)}\" y=\"${qy.toFixed(1)}\" width=\"${(W-pR-qx).toFixed(1)}\" height=\"${(pT+iH-qy).toFixed(1)}\" fill=\"rgba(248,81,73,0.04)\"/>`;\n\n  // Grid\n  for (let t=0;t<=4;t++) {\n    const yy = pT + iH - (t/4)*iH;\n    const val = maxY*t/4;\n    body += `<line x1=\"${pL}\" y1=\"${yy}\" x2=\"${W-pR}\" y2=\"${yy}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${pL-6}\" y=\"${yy+4}\" text-anchor=\"end\" fill=\"var(--text3)\" style=\"font-size:8px\">${val>=1e6?(val/1e6).toFixed(0)+'M':Math.round(val/1000)+'K'}<\/text>`;\n  }\n  for (let t=0;t<=4;t++) {\n    const xx = pL + (t/4)*iW;\n    const val = maxX*t/4;\n    body += `<line x1=\"${xx}\" y1=\"${pT}\" x2=\"${xx}\" y2=\"${pT+iH}\" stroke=\"var(--border)\" stroke-width=\"0.7\" stroke-dasharray=\"4,4\"/>`;\n    body += `<text x=\"${xx}\" y=\"${pT+iH+14}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:8px\">${val>=1e6?(val/1e6).toFixed(0)+'M':Math.round(val/1000)+'K'}<\/text>`;\n  }\n\n  // Average crosshair lines\n  body += `<line x1=\"${qx.toFixed(1)}\" y1=\"${pT}\" x2=\"${qx.toFixed(1)}\" y2=\"${pT+iH}\" stroke=\"#f0a800\" stroke-width=\"1\" stroke-dasharray=\"4,3\" opacity=\"0.45\"/>`;\n  body += `<line x1=\"${pL}\" y1=\"${qy.toFixed(1)}\" x2=\"${W-pR}\" y2=\"${qy.toFixed(1)}\" stroke=\"#f0a800\" stroke-width=\"1\" stroke-dasharray=\"4,3\" opacity=\"0.45\"/>`;\n\n  // Quadrant labels\n  body += `<text x=\"${(pL+8).toFixed(1)}\" y=\"${(pT+12).toFixed(1)}\" fill=\"var(--green)\" style=\"font-size:8px;font-weight:700;opacity:0.6\">↑ Hiệu quả cao<\/text>`;\n  body += `<text x=\"${(qx+8).toFixed(1)}\" y=\"${(pT+iH-6).toFixed(1)}\" fill=\"var(--red)\" style=\"font-size:8px;font-weight:700;opacity:0.6\">Chi phí cao ↓<\/text>`;\n\n  // Axis labels\n  body += `<text x=\"${pL-48}\" y=\"${pT+iH/2}\" text-anchor=\"middle\" fill=\"var(--text3)\" transform=\"rotate(-90,${pL-48},${pT+iH/2})\" style=\"font-size:9px\">Phí NET/KH (đ)<\/text>`;\n  body += `<text x=\"${pL+iW/2}\" y=\"${pT+iH+30}\" text-anchor=\"middle\" fill=\"var(--text3)\" style=\"font-size:9px\">Chi phí/KH (đ)<\/text>`;\n\n  // Bubbles\n  pts.forEach(p => {\n    const cx = pL + (p.x/maxX)*iW;\n    const cy = pT + iH - (p.y/maxY)*iH;\n    const r  = 10 + (p.n/maxN)*20;\n    const col = CH_COLOR[p.ch];\n    const tip = `<b>${p.ch}<\/b><div class='tip-row'><span>Chi phí/KH<\/span><span>${fmtN(Math.round(p.x))}đ<\/span><\/div><div class='tip-row'><span>Phí NET/KH<\/span><span>${fmtM(p.y)}<\/span><\/div><div class='tip-row'><span>ROI (phí/chi phí)<\/span><span>${p.roi.toFixed(1)}×<\/span><\/div><div class='tip-row'><span>Số KH<\/span><span>${fmtN(p.n)}<\/span><\/div>`;\n    body += `<circle cx=\"${cx.toFixed(1)}\" cy=\"${cy.toFixed(1)}\" r=\"${r.toFixed(1)}\" fill=\"${col}\" fill-opacity=\"0.25\" stroke=\"${col}\" stroke-width=\"2\" data-tip='${tip}' class=\"bar-rect\"/>`;\n    body += `<text x=\"${cx.toFixed(1)}\" y=\"${(cy+4).toFixed(1)}\" text-anchor=\"middle\" fill=\"${col}\" style=\"font-size:10px;font-weight:800\">${p.ch.split(\" \")[0]}<\/text>`;\n  });\n\n  svg.innerHTML = body;\n}\n\n// ═══════════════════════════════════════════════\n//  TOOLTIP\n// ═══════════════════════════════════════════════\nconst tip = document.getElementById(\"tip\");\ndocument.addEventListener(\"mouseover\", e => {\n  const el = e.target.closest(\"[data-tip]\");\n  if (el) { tip.innerHTML = el.getAttribute(\"data-tip\"); tip.style.display = \"block\"; }\n});\ndocument.addEventListener(\"mousemove\", e => {\n  if (tip.style.display === \"block\") {\n    const x = e.clientX + 14, y = e.clientY - 12;\n    tip.style.left = Math.min(x, window.innerWidth - 260) + \"px\";\n    tip.style.top  = Math.max(y, 10) + \"px\";\n  }\n});\ndocument.addEventListener(\"mouseout\", e => {\n  if (e.target.closest(\"[data-tip]\")) tip.style.display = \"none\";\n});\n\n// ═══════════════════════════════════════════════\n//  ACTION SUMMARY — tự động từ dữ liệu\n// ═══════════════════════════════════════════════\nfunction renderActionSummary() {\n  const totalN = filtered.length;\n  if (!totalN) return;\n\n  // ── Tính các chỉ số cần thiết ──\n\n  // 1. AUM/KH theo kênh\n  const chAUM = CHANNELS.map(ch => {\n    const sub = filtered.filter(d => d.ch === ch);\n    return { ch, n: sub.length, aumAvg: sub.length ? avg(sub.map(d=>d.deposit)) : 0 };\n  }).sort((a,b) => b.aumAvg - a.aumAvg);\n  const bestAUMch  = chAUM[0];\n  const worstAUMch = chAUM[chAUM.length-1];\n\n  // 2. Active rate theo kênh × mgmt — tìm combo tệ nhất\n  let worstActiveCombo = null, worstActiveRate = 100;\n  CHANNELS.forEach(ch => {\n    MGMTS.forEach(mg => {\n      const sub = filtered.filter(d => d.ch===ch && d.mg===mg);\n      if (sub.length < 20) return;\n      const rate = pctOf(sub.filter(d=>d.active).length, sub.length);\n      if (rate < worstActiveRate) { worstActiveRate = rate; worstActiveCombo = {ch, mg, rate, n: sub.length}; }\n    });\n  });\n\n  // 3. Tỷ lệ KH chưa nạp tiền\n  const noDepositN   = filtered.filter(d => d.deposit === 0).length;\n  const noDepositPct = pctOf(noDepositN, totalN);\n\n  // 4. Thời gian chuyển đổi — tìm nhóm chậm nhất (days to deposit)\n  const convByMg = MGMTS.map(mg => {\n    const vals = filtered.filter(d => d.mg===mg && d.daysToDeposit!==null).map(d=>d.daysToDeposit);\n    return { mg, avgDays: vals.length ? avg(vals) : 0, n: vals.length };\n  }).sort((a,b) => b.avgDays - a.avgDays);\n  const slowestMg  = convByMg[0];\n  const fastestMg  = convByMg[convByMg.length-1];\n\n  // 5. Kênh có ROI thấp nhất (chi phí cao, phí thấp)\n  const roiByCh = CHANNELS.map(ch => {\n    const sub     = filtered.filter(d=>d.ch===ch);\n    const feeAvg  = sub.length ? avg(sub.map(d=>d.fee)) : 0;\n    const cost    = (CH_COST_PER_1000[ch]||0)*1e6/1000;\n    return { ch, roi: cost > 0 ? feeAvg/cost : 0, feeAvg, n: sub.length };\n  }).sort((a,b) => a.roi - b.roi);\n  const worstROI = roiByCh[0];\n  const bestROI  = roiByCh[roiByCh.length-1];\n\n  // 6. Kênh có tỷ trọng MG thấp nhất (cơ hội nâng cấp)\n  const mgShareByCh = CHANNELS.map(ch => {\n    const sub = filtered.filter(d=>d.ch===ch);\n    const mgN = sub.filter(d=>d.mg==='MG').length;\n    return { ch, mgPct: pctOf(mgN, sub.length), n: sub.length };\n  }).sort((a,b) => a.mgPct - b.mgPct);\n  const lowestMGch = mgShareByCh[0];\n\n  // 7. Tháng tăng trưởng cuối (so T4→T5)\n  const t4N = filtered.filter(d=>d.month==='2026-04').length;\n  const t5N = filtered.filter(d=>d.month==='2026-05').length;\n  const growthMoM = t4N > 0 ? ((t5N - t4N)/t4N*100) : 0;\n\n  // ── Build actions array ──\n  const actions = [];\n\n  // Action 1 — Nhân rộng kênh AUM tốt nhất\n  actions.push({\n    priority: 'high',\n    title: `Nhân rộng ${bestAUMch.ch} — kênh dẫn đầu AUM/KH`,\n    body: `${bestAUMch.ch} đạt AUM/KH trung bình ${fmtM(bestAUMch.aumAvg)}, cao nhất trong ${CHANNELS.length} kênh — gấp ${(bestAUMch.aumAvg / Math.max(worstAUMch.aumAvg,1)).toFixed(1)}× so với kênh thấp nhất (${worstAUMch.ch}). Ưu tiên tăng ngân sách và mở rộng độ phủ.`\n  });\n\n  // Action 2 — Cải thiện tỷ lệ Active yếu nhất\n  if (worstActiveCombo) {\n    actions.push({\n      priority: 'high',\n      title: `Cải thiện Active Rate tại ${worstActiveCombo.ch} – ${worstActiveCombo.mg}`,\n      body: `Tỷ lệ kích hoạt giao dịch của nhóm ${worstActiveCombo.mg} trên kênh ${worstActiveCombo.ch} chỉ đạt ${fmtPct(worstActiveCombo.rate)} — thấp nhất toàn hệ thống (${fmtN(worstActiveCombo.n)} KH). Triển khai onboarding journey và chiến dịch re-engagement tự động trong 14 ngày sau mở TK.`\n    });\n  }\n\n  // Action 3 — Rút ngắn thời gian chuyển đổi nhóm chậm\n  actions.push({\n    priority: 'high',\n    title: `Rút ngắn thời gian nạp tiền lần đầu — nhóm ${slowestMg.mg}`,\n    body: `Nhóm ${slowestMg.mg} mất bình quân ${slowestMg.avgDays.toFixed(1)} ngày từ mở TK đến nạp tiền lần đầu — chậm hơn ${(slowestMg.avgDays - fastestMg.avgDays).toFixed(1)} ngày so với ${fastestMg.mg} (${fastestMg.avgDays.toFixed(1)} ngày). Thiết lập trigger SMS/email nhắc nạp tiền vào ngày 3, 7, 14.`\n  });\n\n  // Action 4 — Tăng tỷ lệ nạp tiền lần đầu\n  actions.push({\n    priority: 'med',\n    title: `Kích hoạt ${fmtN(noDepositN)} KH chưa nạp tiền (${fmtPct(noDepositPct,0)})`,\n    body: `${fmtPct(noDepositPct)} tổng KH trong kỳ chưa nạp tiền sau khi mở tài khoản. Thiết kế ưu đãi khuyến mãi nạp lần đầu trong 7 ngày và phân luồng chiến dịch theo kênh mở TK để cá nhân hóa thông điệp.`\n  });\n\n  // Action 5 — Nâng tỷ trọng MG tại kênh thấp nhất\n  actions.push({\n    priority: 'med',\n    title: `Nâng tỷ trọng MG tại ${lowestMGch.ch} (hiện ${fmtPct(lowestMGch.mgPct,0)})`,\n    body: `${lowestMGch.ch} có tỷ lệ khách hàng được quản lý bởi MG chỉ ${fmtPct(lowestMGch.mgPct)} — thấp nhất trong các kênh. Đào tạo và nâng cấp CTV tiềm năng tại kênh này để cải thiện AUM/KH và Active Rate.`\n  });\n\n  // Action 6 — Tối ưu ROI kênh yếu nhất / KPI dài hạn\n  if (growthMoM < 0) {\n    actions.push({\n      priority: 'low',\n      title: `Điều tra nguyên nhân tăng trưởng giảm T4→T5 (${growthMoM.toFixed(1)}%)`,\n      body: `Số KH mới tháng 5 (${fmtN(t5N)}) thấp hơn tháng 4 (${fmtN(t4N)}), giảm ${Math.abs(growthMoM).toFixed(1)}%. Rà soát ngân sách marketing, chất lượng lead và thời gian phê duyệt để xác định điểm nghẽn.`\n    });\n  } else {\n    actions.push({\n      priority: 'low',\n      title: `Đặt KPI chất lượng song song KPI số lượng`,\n      body: `Bổ sung chỉ tiêu AUM/KH ≥ ${fmtM(bestAUMch.aumAvg * 0.6)} và Active Rate ≥ ${fmtPct(Math.min(75, worstActiveRate + 15), 0)} vào dashboard theo dõi hàng tuần. Gắn KPI chất lượng vào đánh giá hiệu quả từng kênh theo tháng.`\n    });\n  }\n\n  // ── Render lead text ──\n  const dateRange = (() => {\n    const dates = filtered.map(d=>d.date).sort();\n    if (!dates.length) return 'kỳ lọc';\n    const fmt = s => s.split('-').reverse().slice(0,2).join('/');\n    return `${fmt(dates[0])} – ${fmt(dates[dates.length-1])}`;\n  })();\n  document.getElementById('action-summary-lead').innerHTML =\n    `Dựa trên <strong style=\"color:var(--text)\">${fmtN(totalN)} khách hàng<\/strong> trong giai đoạn <strong style=\"color:var(--text)\">${dateRange}<\/strong>, dưới đây là ${actions.length} đề xuất ưu tiên được tổng hợp tự động từ dữ liệu thực tế.`;\n\n  // ── Render action cards ──\n  const priorityMap = {\n    high: { cls:'priority-high', label:'🔴 Ưu tiên cao' },\n    med:  { cls:'priority-med',  label:'🟡 Trung bình' },\n    low:  { cls:'priority-low',  label:'🟢 Dài hạn' }\n  };\n  document.getElementById('action-grid').innerHTML = actions.map((a, i) => {\n    const p = priorityMap[a.priority];\n    return `<div class=\"action-item\">\n      <div class=\"action-num\">${i+1}<\/div>\n      <div class=\"action-text\">\n        <strong>${a.title}<\/strong>\n        <p>${a.body}<\/p>\n        <span class=\"action-priority ${p.cls}\">${p.label}<\/span>\n      <\/div>\n    <\/div>`;\n  }).join('');\n}\n\n// ═══════════════════════════════════════════════\n//  INIT\n// ═══════════════════════════════════════════════\nwindow.onload = () => {\n  rawData   = genData();\n  filtered  = [...rawData];\n  renderAll();\n};\n<\/script>\n<\/body>\n<\/html>\n" }
};
let currentPage = 'page1';

function setActiveTab(pageKey) {
  document.querySelectorAll('.navtab').forEach(btn => btn.classList.remove('active'));
  const active = document.getElementById('tab-' + pageKey);
  if (active) active.classList.add('active');
}

function showPage(pageKey, replaceHash = false) {
  if (!PAGES[pageKey]) pageKey = 'page1';
  currentPage = pageKey;
  setActiveTab(pageKey);
  document.getElementById('pageTitle').textContent = PAGES[pageKey].title;
  const loader = document.getElementById('loader');
  const frame = document.getElementById('dashboardFrame');
  loader.classList.add('show');
  frame.onload = () => loader.classList.remove('show');
  frame.srcdoc = PAGES[pageKey].html;
  const targetHash = '#' + pageKey;
  if (replaceHash) {
    history.replaceState(null, '', targetHash);
  } else if (location.hash !== targetHash) {
    history.pushState(null, '', targetHash);
  }
}

function reloadCurrentPage() {
  showPage(currentPage, true);
}

window.addEventListener('hashchange', () => {
  const pageKey = (location.hash || '#page1').replace('#','');
  showPage(pageKey, true);
});

showPage((location.hash || '#page1').replace('#',''), true);
</script>
