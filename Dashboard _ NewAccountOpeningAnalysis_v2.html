<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard tổng hợp - 3 trang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#1c2333;
  --surface3:#21262d;
  --border:#30363d;
  --text:#e6edf3;
  --text2:#8b949e;
  --text3:#6e7681;
  --brand:#f0a800;
  --brand2:#ffc233;
  --brand-dim:rgba(240,168,0,0.15);
  --shadow:0 10px 34px rgba(0,0,0,.45);
  --radius:14px;
}
* { box-sizing:border-box; }
html, body { margin:0; min-height:100%; background:var(--bg); color:var(--text); font-family:'Be Vietnam Pro',system-ui,sans-serif; }
body { overflow:hidden; }
.shell { height:100vh; display:flex; flex-direction:column; background:linear-gradient(180deg,#0d1117 0%,#0b0f15 100%); }
.topbar {
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:14px 22px;
  background:rgba(22,27,34,.96);
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow);
  position:relative;
  z-index:10;
}
.brandbox { display:flex; flex-direction:column; gap:2px; min-width:260px; }
.brandbox .eyebrow { font-size:10px; line-height:1; font-weight:800; color:var(--brand); letter-spacing:1px; text-transform:uppercase; }
.brandbox h1 { margin:0; font-size:15px; line-height:1.25; font-weight:800; color:var(--text); letter-spacing:-.2px; }
.navtabs { display:flex; align-items:center; justify-content:center; gap:10px; flex:1; }
.navtab {
  height:40px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text2);
  border-radius:999px;
  padding:0 18px;
  font-size:12.5px;
  font-weight:800;
  font-family:inherit;
  cursor:pointer;
  transition:all .18s ease;
  white-space:nowrap;
}
.navtab:hover { color:var(--text); border-color:rgba(240,168,0,.45); transform:translateY(-1px); }
.navtab.active { background:var(--brand); color:#000; border-color:var(--brand); box-shadow:0 6px 18px rgba(240,168,0,.22); }
.actions { display:flex; align-items:center; gap:10px; justify-content:flex-end; min-width:260px; }
.smallpill {
  border:1px solid rgba(240,168,0,.25);
  background:var(--brand-dim);
  color:var(--brand);
  border-radius:999px;
  padding:7px 11px;
  font-size:10.5px;
  font-weight:800;
  white-space:nowrap;
}
.reload {
  height:34px;
  border:1px solid var(--border);
  background:var(--surface3);
  color:var(--text);
  border-radius:10px;
  padding:0 12px;
  font-size:11px;
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
}
.reload:hover { border-color:var(--brand); color:var(--brand); }
.frame-wrap { flex:1 1 auto; min-height:0; position:relative; }
#dashboardFrame { width:100%; height:100%; border:0; display:block; background:var(--bg); }
.loader {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  color:var(--brand);
  font-size:12px;
  font-weight:800;
  letter-spacing:.4px;
  z-index:2;
  opacity:0;
  pointer-events:none;
  transition:opacity .12s ease;
}
.loader.show { opacity:1; }
@media(max-width:900px) {
  body { overflow:auto; }
  .shell { min-height:100vh; height:100vh; }
  .topbar { flex-direction:column; align-items:stretch; padding:12px; }
  .brandbox, .actions { min-width:0; }
  .navtabs { justify-content:flex-start; overflow-x:auto; padding-bottom:3px; }
  .navtab { flex:0 0 auto; }
  .actions { justify-content:space-between; }
}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brandbox">
      <div class="eyebrow">Dashboard tổng hợp</div>
      <h1>Dashboard tổng hợp 3 trang</h1>
    </div>
    <nav class="navtabs" aria-label="Chọn trang dashboard">
      <button class="navtab active" id="tab-page1" type="button" onclick="showPage('page1')">Page 1 · Mở mới tài khoản</button>
      <button class="navtab" id="tab-page2" type="button" onclick="showPage('page2')">Page 2 · Hiệu quả kênh</button>
      <button class="navtab" id="tab-page3" type="button" onclick="showPage('page3')">Page 3 · Hiệu quả theo hình thức quản lý</button>
    </nav>
    <div class="actions">
      <span class="smallpill" id="pageTitle">Dashboard Theo dõi Khách hàng mở mới tài khoản</span>
      <button class="reload" type="button" onclick="reloadCurrentPage()">Tải lại page</button>
    </div>
  </header>
  <main class="frame-wrap">
    <div class="loader" id="loader">Đang tải dashboard…</div>
    <iframe id="dashboardFrame" title="Dashboard page" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
  </main>
</div>
<script>
const PAGES = {
  page1: { title: "Dashboard Theo dõi Khách hàng mở mới tài khoản", html: "<!DOCTYPE html>\n<html lang=\"vi\">\n<head>\n<meta charset=\"utf-8\"/>\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"/>\n<title>Dashboard Theo dõi Khách hàng mở mới tài khoản<\/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link href=\"https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<style>\n:root{\n  /* Backgrounds - 4 depth layers */\n  --bg:#0d1117;\n  --surface:#161b22;\n  --surface2:#1c2333;\n  --surface3:#21262d;\n\n  /* Text - 3 levels */\n  --text:#e6edf3;\n  --text2:#8b949e;\n  --text3:#6e7681;\n\n  /* Brand - amber/gold as primary accent */\n  --brand:#f0a800;\n  --brand2:#ffc233;\n  --brand-dim:rgba(240,168,0,0.15);\n  --brand-glow:rgba(240,168,0,0.3);\n\n  /* Semantic colors */\n  --green:#3fb950;\n  --green-dim:rgba(63,185,80,0.15);\n  --red:#f85149;\n  --red-dim:rgba(248,81,73,0.15);\n  --blue:#58a6ff;\n  --blue-dim:rgba(88,166,255,0.15);\n  --purple:#bc8cff;\n  --purple-dim:rgba(188,140,255,0.15);\n\n  /* Channel colors */\n  --ch1:#3fb950; /* App (M) */\n  --ch2:#58a6ff; /* Web (O) */\n  --ch3:#bc8cff; /* Loop (E) */\n  --ch4:#f0a800; /* Teller (F) */\n  --ch5:#f85149; /* Bank (L) */\n\n  /* Management group colors */\n  --mg-color:#3fb950;\n  --ctv-color:#58a6ff;\n  --noid-color:#8b949e;\n\n  /* Borders */\n  --border:#30363d;\n  --border2:#21262d;\n  --radius:12px;\n  --radius-sm:8px;\n  --radius-lg:16px;\n\n  /* Shadows */\n  --shadow-sm:0 1px 3px rgba(0,0,0,0.4);\n  --shadow-md:0 4px 16px rgba(0,0,0,0.5);\n  --shadow-lg:0 8px 32px rgba(0,0,0,0.6);\n\n  /* Legacy compat aliases */\n  --card:var(--surface);\n  --card2:var(--surface2);\n  --ink:var(--text);\n  --muted:var(--text2);\n  --line:var(--border);\n  --soft:var(--shadow-sm);\n  --shadow:var(--shadow-md);\n  --good:var(--green);\n  --bad:var(--red);\n  --blue-old:var(--blue);\n}\n*{box-sizing:border-box}\n\n@keyframes fadeUp{\n  from{opacity:0;transform:translateY(12px)}\n  to{opacity:1;transform:translateY(0)}\n}\n\nbody{\n  margin:0;\n  background:var(--bg);\n  color:var(--text);\n  font-family:'Be Vietnam Pro',sans-serif;\n  -webkit-font-smoothing:antialiased;\n}\n\n::-webkit-scrollbar{width:8px;height:8px}\n::-webkit-scrollbar-track{background:var(--bg);border-radius:10px}\n::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}\n::-webkit-scrollbar-thumb:hover{background:var(--brand)}\n\n.page{max-width:1680px;margin:0 auto;padding:22px 28px 40px}\n\n/* ── Hero ── */\n.hero{\n  background:linear-gradient(135deg, var(--surface) 0%, var(--surface2) 55%, #1a1500 100%);\n  color:var(--text);\n  padding:32px 36px;\n  border-radius:var(--radius-lg);\n  box-shadow:var(--shadow-md);\n  margin-bottom:28px;\n  position:relative;\n  overflow:hidden;\n  border:1px solid var(--border);\n  animation:fadeUp 0.45s ease-out;\n}\n.hero::before{\n  content:\"\";position:absolute;top:0;left:0;right:0;bottom:0;\n  background:radial-gradient(ellipse at 85% 50%, rgba(240,168,0,0.08) 0%, transparent 60%);\n  pointer-events:none;\n}\n.hero::after{\n  content:\"\";position:absolute;top:-30%;right:-5%;width:450px;height:450px;\n  background:radial-gradient(circle, rgba(240,168,0,0.06) 0%, transparent 65%);\n  border-radius:50%;pointer-events:none;\n}\n.hero-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;z-index:1;position:relative}\n.hero-badge{display:flex;align-items:center;gap:10px;margin-bottom:14px}\n.hero-tag{\n  display:inline-flex;align-items:center;gap:8px;\n  background:var(--brand-dim);\n  border:1px solid rgba(240,168,0,0.3);\n  border-radius:20px;\n  padding:5px 14px;\n  font-size:9.5px;font-weight:700;letter-spacing:1.5px;\n  color:var(--brand);text-transform:uppercase;\n  margin-bottom:14px;\n}\n.hero-info h1{\n  margin:0 0 8px;\n  font-size:27px;font-weight:800;letter-spacing:-0.5px;\n  color:var(--text);line-height:1.2;\n}\n.hero-info h1 span{color:var(--brand)}\n.hero-info p{margin:0;font-size:13px;color:var(--text2);font-weight:400;max-width:640px}\n.hero-meta{display:flex;flex-direction:column;gap:10px;align-items:flex-end}\n.hero-meta-pill{\n  background:var(--brand-dim);\n  border:1px solid rgba(240,168,0,0.2);\n  padding:6px 16px;border-radius:var(--radius-sm);text-align:right;\n}\n.hero-meta-pill .pill-label{font-size:9px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:0.8px;display:block}\n.hero-meta-pill .pill-val{font-size:13px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}\n.time-tag{\n  background:var(--surface3);border:1px solid var(--border);\n  padding:7px 15px;border-radius:20px;\n  font-size:12px;font-weight:600;letter-spacing:0.3px;color:var(--brand);\n  display:flex;align-items:center;gap:6px;\n}\n.hero-stat-row{\n  display:flex;gap:20px;margin-top:18px;flex-wrap:wrap;\n  z-index:1;position:relative;\n}\n.hero-stat{\n  background:rgba(255,255,255,0.04);\n  border:1px solid var(--border2);\n  border-radius:var(--radius-sm);\n  padding:10px 18px;\n  text-align:center;\n}\n.hero-stat-val{font-size:18px;font-weight:800;color:var(--brand);font-family:'DM Mono',monospace;display:block}\n.hero-stat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px}\n\n/* ── Filter Bar (Sticky) ── */\n.filters-bar{\n  background:rgba(22,27,34,0.85);\n  backdrop-filter:blur(20px);\n  -webkit-backdrop-filter:blur(20px);\n  border-radius:var(--radius);\n  padding:18px 24px;\n  box-shadow:var(--shadow-sm);\n  margin-bottom:28px;\n  border:1px solid var(--border);\n  display:grid;\n  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));\n  gap:16px;align-items:end;\n  position:sticky;top:8px;z-index:50;\n  animation:fadeUp 0.45s ease-out 0.05s both;\n}\n.filter-group{display:flex;flex-direction:column;gap:7px}\n.filter-group label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px}\n.filter-ctrl{\n  height:40px;\n  border:1px solid var(--border);\n  border-radius:var(--radius-sm);\n  padding:0 12px;\n  font-size:13px;font-weight:600;\n  color:var(--text);\n  background:var(--surface2);\n  outline:none;\n  transition:all 0.2s cubic-bezier(0.4,0,0.2,1);\n  cursor:pointer;width:100%;\n  font-family:'Be Vietnam Pro',sans-serif;\n}\n.filter-ctrl:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow)}\n.filter-ctrl option{background:var(--surface2);color:var(--text)}\n.btn-reset{\n  height:40px;border:none;\n  background:var(--brand);color:#000;\n  border-radius:var(--radius-sm);\n  font-size:12.5px;font-weight:800;\n  cursor:pointer;\n  display:flex;align-items:center;justify-content:center;gap:8px;\n  transition:all 0.2s;\n  box-shadow:0 4px 14px rgba(240,168,0,0.25);\n  width:100%;\n  font-family:'Be Vietnam Pro',sans-serif;\n}\n.btn-reset:hover{background:var(--brand2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,168,0,0.4)}\n.btn-reset:active{transform:translateY(0)}\n\n/* ── KPI Cards ── */\n.kpis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:28px}\n@media(max-width:900px){.kpis-grid{grid-template-columns:1fr}}\n.kpi-card{\n  background:var(--surface);\n  border-radius:var(--radius-lg);\n  padding:24px 26px;\n  box-shadow:var(--shadow-sm);\n  border:1px solid var(--border);\n  position:relative;overflow:hidden;\n  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);\n  display:flex;flex-direction:column;justify-content:space-between;\n  min-height:160px;\n  animation:fadeUp 0.45s ease-out 0.1s both;\n}\n.kpi-card::before{\n  content:\"\";position:absolute;top:0;left:0;right:0;height:2px;\n  background:linear-gradient(90deg, var(--brand), var(--brand2));\n  border-radius:var(--radius-lg) var(--radius-lg) 0 0;\n}\n.kpi-card::after{\n  content:\"\";position:absolute;top:0;right:0;width:140px;height:140px;\n  background:radial-gradient(circle at top right, var(--brand-dim), transparent 70%);\n  pointer-events:none;\n}\n.kpi-card:hover{\n  transform:translateY(-2px);\n  border-color:rgba(240,168,0,0.4);\n  box-shadow:0 4px 20px rgba(240,168,0,0.08), var(--shadow-md);\n}\n.kpi-label{\n  font-size:10.5px;font-weight:700;color:var(--text2);\n  text-transform:uppercase;letter-spacing:0.6px;\n  display:flex;align-items:center;justify-content:space-between;\n  margin-bottom:14px;\n}\n.kpi-icon-box{\n  width:32px;height:32px;border-radius:var(--radius-sm);\n  display:flex;align-items:center;justify-content:center;font-size:15px;\n}\n.kpi-val{\n  font-size:38px;font-weight:900;color:var(--text);\n  letter-spacing:-1.5px;line-height:1;\n  margin-bottom:16px;\n  font-family:'DM Mono',monospace;\n}\n\n/* Progress bar */\n.kpi-progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}\n.kpi-progress-label{font-size:11.5px;font-weight:600;color:var(--text2)}\n.kpi-progress-pct{font-size:11.5px;font-weight:700;color:var(--brand);font-family:'DM Mono',monospace}\n.kpi-progress-track{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden;width:100%}\n.kpi-progress-fill{\n  height:100%;border-radius:99px;\n  background:linear-gradient(90deg,var(--brand),var(--brand2));\n  transition:width 0.6s cubic-bezier(0.4,0,0.2,1);\n}\n\n/* Segmented bar */\n.kpi-seg-track{height:7px;background:var(--surface3);border-radius:99px;overflow:hidden;display:flex;width:100%;margin-bottom:12px}\n.kpi-seg-fill{height:100%;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}\n.kpi-seg-legend{display:flex;gap:14px;flex-wrap:wrap}\n.kpi-seg-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}\n.kpi-seg-item{display:flex;align-items:center;font-size:11.5px;font-weight:600;color:var(--text2)}\n\n/* Channel rows */\n.kpi-channel-row{\n  display:flex;align-items:center;justify-content:space-between;\n  padding:9px 0;border-bottom:1px solid var(--border2);\n}\n.kpi-channel-row:last-child{border-bottom:none;padding-bottom:0}\n.kpi-channel-badge{\n  font-size:9.5px;font-weight:800;padding:3px 8px;border-radius:5px;\n  text-transform:uppercase;letter-spacing:0.5px;margin-right:10px;flex-shrink:0;\n}\n.badge-high{background:var(--green-dim);color:var(--green)}\n.badge-low{background:var(--red-dim);color:var(--red)}\n.kpi-channel-name{font-size:13px;font-weight:700;color:var(--text);flex:1}\n.kpi-channel-stat{text-align:right}\n.kpi-channel-stat-val{font-size:13.5px;font-weight:800;color:var(--text);display:block;font-family:'DM Mono',monospace}\n.kpi-channel-stat-pct{font-size:10.5px;color:var(--text2);font-weight:500}\n\n/* ── Charts Grid ── */\n.charts-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:22px;margin-bottom:28px}\n.chart-box{\n  background:var(--surface);\n  border-radius:var(--radius-lg);\n  box-shadow:var(--shadow-sm);\n  border:1px solid var(--border);\n  padding:24px;\n  display:flex;flex-direction:column;\n  position:relative;\n  transition:all 0.25s;\n  animation:fadeUp 0.45s ease-out 0.15s both;\n}\n.chart-box:hover{\n  border-color:rgba(240,168,0,0.3);\n  box-shadow:0 0 20px rgba(240,168,0,0.05), var(--shadow-md);\n}\n.col-12{grid-column:span 12}\n.col-8{grid-column:span 8}\n@media(max-width:1150px){.col-8{grid-column:span 12}}\n.col-4{grid-column:span 4}\n@media(max-width:1150px){.col-4{grid-column:span 12}}\n.col-6{grid-column:span 6}\n@media(max-width:1150px){.col-6{grid-column:span 12}}\n\n.chart-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:15px;flex-wrap:wrap}\n.chart-info h3{margin:0 0 4px;font-size:14.5px;font-weight:700;color:var(--text);letter-spacing:-0.2px}\n.chart-info p{margin:0;font-size:11.5px;color:var(--text2)}\n.chart-act{display:flex;gap:8px;align-items:center}\n.chart-legend{display:flex;gap:12px;flex-wrap:wrap}\n.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text2)}\n.leg-dot{width:9px;height:9px;border-radius:3px}\n\n.chart-body{position:relative;width:100%;min-height:280px;flex-grow:1;display:flex;align-items:center;justify-content:center}\n.chart-body svg{overflow:visible;width:100%;height:100%}\n\n/* SVG interactions */\n.line-node{cursor:pointer;transition:all 0.15s}\n.line-node:hover{r:6.5;filter:drop-shadow(0 0 6px var(--brand-glow))}\n.line-path{transition:stroke-dashoffset 1s ease-out;stroke-linecap:round;stroke-linejoin:round}\n.bar-rect{transition:all 0.3s cubic-bezier(0.4,0,0.2,1);cursor:pointer}\n.bar-rect:hover{filter:brightness(1.25)}\n.donut-slice{transition:all 0.3s;cursor:pointer}\n.donut-slice:hover{filter:drop-shadow(0 4px 10px rgba(240,168,0,0.3));transform:scale(1.03);transform-origin:center}\n.sankey-node{cursor:grab;transition:fill 0.2s}\n.sankey-node:active{cursor:grabbing}\n.flow{transition:opacity 0.2s}\n.flow:hover{opacity:0.85}\n.heatmap-cell{transition:all 0.2s;cursor:pointer}\n.heatmap-cell:hover{filter:brightness(1.25);stroke:var(--brand);stroke-width:2px}\n\n/* Tooltip */\n.tooltip{\n  position:fixed;\n  background:var(--surface3);\n  backdrop-filter:blur(12px);\n  color:var(--text);\n  padding:10px 14px;border-radius:var(--radius-sm);\n  font-size:12px;pointer-events:none;\n  box-shadow:var(--shadow-lg);\n  display:none;z-index:9999;\n  border:1px solid var(--border);\n  line-height:1.6;\n  font-family:'Be Vietnam Pro',sans-serif;\n}\n.tooltip b{display:block;margin-bottom:4px;color:var(--brand);font-size:12px;font-weight:700}\n.tooltip span{color:var(--text2)}\n\n/* Responsive */\n@media(max-width:700px){.page{padding:12px 12px 32px}}\n@media(max-width:600px){.hero{padding:22px 20px}}\n@media(max-width:500px){.filters-bar{grid-template-columns:1fr}}\n<\/style>\n<\/head>\n<body>\n<div class=\"page\">\n\n  <!-- Hero Section -->\n  <div class=\"hero\">\n    <div class=\"hero-head\">\n      <div class=\"hero-info\">\n        <div class=\"hero-tag\">\n          <svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><polyline points=\"12 6 12 12 16 14\"/><\/svg>\n          Dashboard · Realtime\n        <\/div>\n        <h1>Theo dõi Khách hàng <span>Mở mới Tài khoản<\/span><\/h1>\n        <p>Phân tích luồng đăng ký theo kênh phân phối, hình thức quản lý và trạng thái kích hoạt tài khoản.<\/p>\n      <\/div>\n      <div class=\"hero-meta\">\n        <div class=\"hero-meta-pill\">\n          <span class=\"pill-label\">Dữ liệu mẫu<\/span>\n          <span class=\"pill-val\">01/01 – 31/05/2026<\/span>\n        <\/div>\n        <div class=\"time-tag\">\n          <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><polyline points=\"12 6 12 12 16 14\"/><\/svg>\n          Cập nhật: 31/05/2026\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- Sticky Filter Bar -->\n  <div class=\"filters-bar\">\n    <div class=\"filter-group\">\n      <label>Từ ngày<\/label>\n      <input type=\"date\" id=\"f-start-date\" class=\"filter-ctrl\" onchange=\"applyFilters()\">\n    <\/div>\n    <div class=\"filter-group\">\n      <label>Đến ngày<\/label>\n      <input type=\"date\" id=\"f-end-date\" class=\"filter-ctrl\" onchange=\"applyFilters()\">\n    <\/div>\n    <div class=\"filter-group\">\n      <label>Kênh mở tài khoản<\/label>\n      <select id=\"f-channel\" class=\"filter-ctrl\" onchange=\"applyFilters()\">\n        <option value=\"all\" selected>Tất cả các kênh<\/option>\n        <option value=\"App (M)\">App (M)<\/option>\n        <option value=\"Web (O)\">Web (O)<\/option>\n        <option value=\"Loop (E)\">Loop (E)<\/option>\n        <option value=\"Teller (F)\">Teller (F)<\/option>\n        <option value=\"Bank (L)\">Bank (L)<\/option>\n      <\/select>\n    <\/div>\n    <div class=\"filter-group\">\n      <label>Hình thức quản lý<\/label>\n      <select id=\"f-mgmt\" class=\"filter-ctrl\" onchange=\"applyFilters()\">\n        <option value=\"all\" selected>Tất cả hình thức<\/option>\n        <option value=\"MG\">Môi giới (MG)<\/option>\n        <option value=\"CTV\">Cộng tác viên (CTV)<\/option>\n        <option value=\"NoID\">Không có ID (NoID)<\/option>\n      <\/select>\n    <\/div>\n    <div class=\"filter-group\">\n      <button class=\"btn-reset\" onclick=\"resetAllFilters()\">\n        <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67\"/><\/svg>\n        Đặt lại bộ lọc\n      <\/button>\n    <\/div>\n  <\/div>\n\n  <!-- KPI Cards -->\n  <div class=\"kpis-grid\">\n\n    <!-- Card 1: Tổng tài khoản mở mới -->\n    <div class=\"kpi-card\">\n      <div class=\"kpi-label\">\n        <span>Tổng tài khoản mở mới<\/span>\n        <div class=\"kpi-icon-box\" style=\"background:var(--blue-dim);color:var(--blue)\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"/><circle cx=\"9\" cy=\"7\" r=\"4\"/><line x1=\"19\" y1=\"8\" x2=\"19\" y2=\"14\"/><line x1=\"22\" y1=\"11\" x2=\"16\" y2=\"11\"/><\/svg>\n        <\/div>\n      <\/div>\n      <div class=\"kpi-val\" id=\"kpi-total\">0<\/div>\n    <\/div>\n\n    <!-- Card 2: Kênh mở tài khoản -->\n    <div class=\"kpi-card\">\n      <div class=\"kpi-label\">\n        <span>Kênh mở tài khoản<\/span>\n        <div class=\"kpi-icon-box\" style=\"background:var(--brand-dim);color:var(--brand)\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><polyline points=\"23 6 13.5 15.5 8.5 10.5 1 18\"/><polyline points=\"17 6 23 6 23 12\"/><\/svg>\n        <\/div>\n      <\/div>\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px\">\n        <div class=\"kpi-channel-row\">\n          <span class=\"kpi-channel-badge badge-high\">Cao nhất<\/span>\n          <span class=\"kpi-channel-name\" id=\"kpi-ch-high-name\">-<\/span>\n          <div class=\"kpi-channel-stat\">\n            <span class=\"kpi-channel-stat-val\" id=\"kpi-ch-high-val\">-<\/span>\n            <span class=\"kpi-channel-stat-pct\" id=\"kpi-ch-high-pct\">-<\/span>\n          <\/div>\n        <\/div>\n        <div class=\"kpi-channel-row\">\n          <span class=\"kpi-channel-badge badge-low\">Thấp nhất<\/span>\n          <span class=\"kpi-channel-name\" id=\"kpi-ch-low-name\">-<\/span>\n          <div class=\"kpi-channel-stat\">\n            <span class=\"kpi-channel-stat-val\" id=\"kpi-ch-low-val\">-<\/span>\n            <span class=\"kpi-channel-stat-pct\" id=\"kpi-ch-low-pct\">-<\/span>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <!-- Card 3: Tỷ lệ TK có ID quản lý -->\n    <div class=\"kpi-card\">\n      <div class=\"kpi-label\">\n        <span>Tỷ lệ TK có ID Quản lý<\/span>\n        <div class=\"kpi-icon-box\" style=\"background:var(--green-dim);color:var(--green)\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"/><\/svg>\n        <\/div>\n      <\/div>\n      <div class=\"kpi-val\" id=\"kpi-managed\">0%<\/div>\n      <div>\n        <div class=\"kpi-seg-track\">\n          <div class=\"kpi-seg-fill\" id=\"kpi-seg-mg\" style=\"width:0%;background:var(--mg-color)\"><\/div>\n          <div class=\"kpi-seg-fill\" id=\"kpi-seg-ctv\" style=\"width:0%;background:var(--ctv-color)\"><\/div>\n          <div class=\"kpi-seg-fill\" id=\"kpi-seg-noid\" style=\"width:0%;background:var(--noid-color)\"><\/div>\n        <\/div>\n        <div class=\"kpi-seg-legend\">\n          <div class=\"kpi-seg-item\"><span class=\"kpi-seg-dot\" style=\"background:var(--mg-color)\"><\/span>MG: <span id=\"kpi-pct-mg\" style=\"color:var(--text);margin-left:3px;font-family:'DM Mono',monospace\">0%<\/span><\/div>\n          <div class=\"kpi-seg-item\"><span class=\"kpi-seg-dot\" style=\"background:var(--ctv-color)\"><\/span>CTV: <span id=\"kpi-pct-ctv\" style=\"color:var(--text);margin-left:3px;font-family:'DM Mono',monospace\">0%<\/span><\/div>\n          <div class=\"kpi-seg-item\"><span class=\"kpi-seg-dot\" style=\"background:var(--noid-color)\"><\/span>NoID: <span id=\"kpi-pct-noid\" style=\"color:var(--text);margin-left:3px;font-family:'DM Mono',monospace\">0%<\/span><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- Charts Grid -->\n  <div class=\"charts-grid\">\n\n    <!-- Chart 1.1: Xu hướng theo Kênh -->\n    <div class=\"chart-box col-6\">\n      <div class=\"chart-head\">\n        <div class=\"chart-info\">\n          <h3>Xu hướng theo Kênh mở tài khoản<\/h3>\n          <p>Mật độ đăng ký phân tách theo 5 nhóm kênh tiếp cận chính.<\/p>\n        <\/div>\n        <div class=\"chart-act\">\n          <div class=\"chart-legend\" id=\"channel-trend-legend\"><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"chart-body\" id=\"channel-trend-body\" style=\"min-height:280px;\">\n        <svg id=\"channel-trend-svg\" viewBox=\"0 0 600 280\" preserveAspectRatio=\"none\"><\/svg>\n      <\/div>\n    <\/div>\n\n    <!-- Chart 1.2: Xu hướng theo Quản lý -->\n    <div class=\"chart-box col-6\">\n      <div class=\"chart-head\">\n        <div class=\"chart-info\">\n          <h3>Xu hướng theo Hình thức quản lý<\/h3>\n          <p>Tốc độ phát triển số lượng tài khoản phân bổ về các phân khúc MG, CTV, NoID.<\/p>\n        <\/div>\n        <div class=\"chart-act\">\n          <div class=\"chart-legend\" id=\"mgmt-trend-legend\"><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"chart-body\" id=\"mgmt-trend-body\" style=\"min-height:280px;\">\n        <svg id=\"mgmt-trend-svg\" viewBox=\"0 0 600 280\" preserveAspectRatio=\"none\"><\/svg>\n      <\/div>\n    <\/div>\n\n    <!-- Chart 4: Horizontal Bar -->\n    <div class=\"chart-box col-6\">\n      <div class=\"chart-head\">\n        <div class=\"chart-info\">\n          <h3>Xếp hạng Kênh phân phối theo Số lượng tài khoản mở mới<\/h3>\n          <p>Đo lường mức độ chuyển đổi và đóng góp số lượng tài khoản theo từng kênh phân phối.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"chart-body\" id=\"channel-bar-body\" style=\"min-height:320px;\">\n        <svg id=\"channel-svg\" viewBox=\"0 0 500 320\" preserveAspectRatio=\"none\"><\/svg>\n      <\/div>\n    <\/div>\n\n    <!-- Chart 5: Heatmap -->\n    <div class=\"chart-box col-6\">\n      <div class=\"chart-head\">\n        <div class=\"chart-info\">\n          <h3>Ma trận Phân bổ: Kênh phân phối &amp; Hình thức quản lý<\/h3>\n          <p>Phân tích chéo mật độ phân phối số lượng tài khoản để tìm kênh đầu vào ưu tú.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"chart-body\" id=\"heatmap-body\" style=\"min-height:320px;\">\n        <svg id=\"heatmap-svg\" viewBox=\"0 0 500 320\" preserveAspectRatio=\"none\"><\/svg>\n      <\/div>\n    <\/div>\n\n    <!-- Sankey Chart -->\n    <div class=\"chart-box col-12\">\n      <div class=\"chart-head\">\n        <div class=\"chart-info\">\n          <h3>Biểu đồ luồng: Từ Kênh đăng ký &rarr; Nhóm quản lý &rarr; Trạng thái kích hoạt<\/h3>\n          <p>Báo cáo luồng chuyển dịch số lượng khách hàng từ nguồn đăng ký qua phân khúc chăm sóc đến trạng thái Active / InActive.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"chart-body\" id=\"sankey-chart-body\" style=\"min-height:380px;\">\n        <svg id=\"sankey-svg\" viewBox=\"0 0 1100 380\" style=\"width:100%;height:100%;\"><\/svg>\n      <\/div>\n    <\/div>\n\n  <\/div>\n<\/div>\n\n<div class=\"tooltip\" id=\"chart-tooltip\"><\/div>\n\n<script>\nconst CHANNELS = [\"App (M)\", \"Web (O)\", \"Loop (E)\", \"Teller (F)\", \"Bank (L)\"];\nconst MGMTS = [\"MG\", \"CTV\", \"NoID\"];\nconst REGIONS = [\"Miền Bắc\", \"Miền Trung\", \"Miền Nam\"];\nconst PRODUCTS = [\"Active\", \"InActive\"];\nconst ACTIVE_PRODUCTS = [\"Giao dịch\", \"Margin\", \"CCQ\", \"Bond\", \"IPO\"];\n\nconst MIN_DATE = \"2026-01-01\";\nconst MAX_DATE = \"2026-05-31\";\n\n// Updated colors matching the dark design system from TXT\nconst MGMT_COLORS = {\n  \"MG\":   \"#3fb950\",  // green\n  \"CTV\":  \"#58a6ff\",  // blue\n  \"NoID\": \"#8b949e\"   // gray\n};\n\nconst CHANNEL_COLORS = {\n  \"App (M)\":   \"#3fb950\",  // ch1 green\n  \"Web (O)\":   \"#58a6ff\",  // ch2 blue\n  \"Loop (E)\":  \"#bc8cff\",  // ch3 purple\n  \"Teller (F)\":\"#f0a800\",  // ch4 amber/brand\n  \"Bank (L)\":  \"#f85149\"   // ch5 red\n};\n\nconst PRODUCT_COLORS = {\n  \"Active\":   \"#3fb950\",\n  \"InActive\": \"#6e7681\"\n};\n\nlet rawData = [];\n\nfunction generateMockData() {\n  const data = [];\n  const startTimestamp = new Date(MIN_DATE + \"T00:00:00\").getTime();\n  const endTimestamp = new Date(MAX_DATE + \"T23:59:59\").getTime();\n\n  for (let i = 1; i <= 5000; i++) {\n    const timestamp = startTimestamp + Math.random() * (endTimestamp - startTimestamp);\n    const dateObj = new Date(timestamp);\n    const dateStr = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;\n    const monthStr = dateStr.substring(0, 7);\n\n    let channel = CHANNELS[0];\n    const randChan = Math.random();\n    if (randChan < 0.45) channel = CHANNELS[0];\n    else if (randChan < 0.70) channel = CHANNELS[1];\n    else if (randChan < 0.82) channel = CHANNELS[2];\n    else if (randChan < 0.92) channel = CHANNELS[3];\n    else channel = CHANNELS[4];\n\n    let mgmt = MGMTS[2];\n    const randMgmt = Math.random();\n    if (channel === CHANNELS[2]) {\n      mgmt = randMgmt < 0.75 ? MGMTS[0] : MGMTS[1];\n    } else if (channel === CHANNELS[3]) {\n      mgmt = randMgmt < 0.60 ? MGMTS[0] : MGMTS[2];\n    } else {\n      if (randMgmt < 0.25) mgmt = MGMTS[0];\n      else if (randMgmt < 0.50) mgmt = MGMTS[1];\n      else mgmt = MGMTS[2];\n    }\n\n    const region = REGIONS[Math.floor(Math.random() * REGIONS.length)];\n    const ekyc = Math.random() < 0.94;\n    let deposit = 0;\n    if (ekyc) {\n      const activeRand = Math.random();\n      if (activeRand < 0.65) {\n        if (mgmt === MGMTS[0]) deposit = Math.floor(20000000 + Math.random() * 180000000);\n        else if (mgmt === MGMTS[1]) deposit = Math.floor(5000000 + Math.random() * 60000000);\n        else deposit = Math.floor(500000 + Math.random() * 20000000);\n      }\n    }\n\n    let product = PRODUCTS[1];\n    if (deposit > 0) {\n      const randProd = Math.random();\n      if (mgmt === MGMTS[0]) { if (randProd < 0.93) product = PRODUCTS[0]; }\n      else if (mgmt === MGMTS[1]) { if (randProd < 0.84) product = PRODUCTS[0]; }\n      else { if (randProd < 0.57) product = PRODUCTS[0]; }\n    }\n\n    data.push({ id:\"KH\"+String(i).padStart(5,'0'), date:dateStr, month:monthStr, channel, mgmt, region, ekyc, deposit, product });\n  }\n  return data;\n}\n\nlet filteredData = [];\n\nconst fmtInt = (num) => new Intl.NumberFormat('vi-VN').format(Math.round(num));\nconst fmtPct = (val) => val.toFixed(1) + \"%\";\nconst pct = (part, total) => total > 0 ? (part / total) * 100 : 0;\nconst labelProduct = (p) => p === \"InActive\" ? \"Chưa kích hoạt giao dịch\" : \"Đã kích hoạt giao dịch (Active)\";\n\nfunction fmtMoney(num) {\n  if (num >= 1e12) return (num / 1e12).toFixed(2) + \"K tỷ\";\n  if (num >= 1e9) return (num / 1e9).toFixed(2) + \" tỷ\";\n  if (num >= 1e6) return (num / 1e6).toFixed(1) + \" triệu\";\n  return fmtInt(num) + \"đ\";\n}\n\nconst tooltip = document.getElementById(\"chart-tooltip\");\nfunction showTooltip(evt, html) {\n  tooltip.innerHTML = html;\n  tooltip.style.display = \"block\";\n  tooltip.style.left = (evt.clientX + 14) + \"px\";\n  tooltip.style.top = (evt.clientY - 10) + \"px\";\n}\nfunction moveTooltip(evt) {\n  tooltip.style.left = (evt.clientX + 14) + \"px\";\n  tooltip.style.top = (evt.clientY - 10) + \"px\";\n}\nfunction hideTooltip() { tooltip.style.display = \"none\"; }\n\ndocument.addEventListener(\"mouseover\", function(e) {\n  const t = e.target.closest(\"[data-tip]\");\n  if (t) showTooltip(e, t.getAttribute(\"data-tip\"));\n});\ndocument.addEventListener(\"mousemove\", function(e) {\n  const t = e.target.closest(\"[data-tip]\");\n  if (t) moveTooltip(e);\n});\ndocument.addEventListener(\"mouseout\", function(e) {\n  if (e.target.closest(\"[data-tip]\")) hideTooltip();\n});\n\nwindow.onload = function() {\n  rawData = generateMockData();\n  const fStart = document.getElementById(\"f-start-date\");\n  const fEnd = document.getElementById(\"f-end-date\");\n  fStart.min = MIN_DATE; fStart.max = MAX_DATE; fStart.value = MIN_DATE;\n  fEnd.min = MIN_DATE; fEnd.max = MAX_DATE; fEnd.value = MAX_DATE;\n  filteredData = [...rawData];\n  applyFilters();\n};\n\nfunction resetAllFilters() {\n  document.getElementById(\"f-start-date\").value = MIN_DATE;\n  document.getElementById(\"f-end-date\").value = MAX_DATE;\n  document.getElementById(\"f-channel\").value = \"all\";\n  document.getElementById(\"f-mgmt\").value = \"all\";\n  applyFilters();\n}\n\nfunction applyFilters() {\n  const startDate = document.getElementById(\"f-start-date\").value;\n  const endDate = document.getElementById(\"f-end-date\").value;\n  const fChannel = document.getElementById(\"f-channel\").value;\n  const fMgmt = document.getElementById(\"f-mgmt\").value;\n\n  filteredData = rawData.filter(d => {\n    if (startDate && d.date < startDate) return false;\n    if (endDate && d.date > endDate) return false;\n    if (fChannel !== \"all\" && d.channel !== fChannel) return false;\n    if (fMgmt !== \"all\" && d.mgmt !== fMgmt) return false;\n    return true;\n  });\n\n  updateKPIs();\n  renderAllTrendCharts();\n  renderSankeyChart();\n  renderChannelBarChart();\n  renderHeatmap();\n}\n\nfunction updateKPIs() {\n  const total = filteredData.length;\n  document.getElementById(\"kpi-total\").innerText = fmtInt(total);\n\n  const mgCount  = filteredData.filter(d => d.mgmt === \"MG\").length;\n  const ctvCount = filteredData.filter(d => d.mgmt === \"CTV\").length;\n  const noidCount= filteredData.filter(d => d.mgmt === \"NoID\").length;\n  const managedPct = pct(mgCount + ctvCount, total);\n  document.getElementById(\"kpi-managed\").innerText = fmtPct(managedPct);\n\n  const mgPct   = pct(mgCount, total);\n  const ctvPct  = pct(ctvCount, total);\n  const noidPct = pct(noidCount, total);\n  document.getElementById(\"kpi-seg-mg\").style.width   = mgPct.toFixed(1) + \"%\";\n  document.getElementById(\"kpi-seg-ctv\").style.width  = ctvPct.toFixed(1) + \"%\";\n  document.getElementById(\"kpi-seg-noid\").style.width = noidPct.toFixed(1) + \"%\";\n  document.getElementById(\"kpi-pct-mg\").innerText   = fmtPct(mgPct);\n  document.getElementById(\"kpi-pct-ctv\").innerText  = fmtPct(ctvPct);\n  document.getElementById(\"kpi-pct-noid\").innerText = fmtPct(noidPct);\n\n  const chanCounts = {};\n  CHANNELS.forEach(c => { chanCounts[c] = 0; });\n  filteredData.forEach(d => { if (chanCounts[d.channel] !== undefined) chanCounts[d.channel]++; });\n\n  let highChan = CHANNELS[0], lowChan = CHANNELS[0];\n  CHANNELS.forEach(c => {\n    if (chanCounts[c] > chanCounts[highChan]) highChan = c;\n    if (chanCounts[c] < chanCounts[lowChan]) lowChan = c;\n  });\n\n  document.getElementById(\"kpi-ch-high-name\").innerText = highChan;\n  document.getElementById(\"kpi-ch-high-val\").innerText  = fmtInt(chanCounts[highChan]) + \" TK\";\n  document.getElementById(\"kpi-ch-high-pct\").innerText  = fmtPct(pct(chanCounts[highChan], total));\n  document.getElementById(\"kpi-ch-low-name\").innerText  = lowChan;\n  document.getElementById(\"kpi-ch-low-val\").innerText   = fmtInt(chanCounts[lowChan]) + \" TK\";\n  document.getElementById(\"kpi-ch-low-pct\").innerText   = fmtPct(pct(chanCounts[lowChan], total));\n}\n\nfunction parseLocalDate(str) {\n  const [y, m, d] = str.split('-').map(Number);\n  return new Date(y, m - 1, d, 12, 0, 0);\n}\nfunction toDateStr(date) {\n  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;\n}\n\nfunction getTrendIntervals(startStr, endStr) {\n  const start = parseLocalDate(startStr);\n  const end   = parseLocalDate(endStr);\n  const diffDays = Math.round((end - start) / (1000*60*60*24)) + 1;\n  let intervals = [];\n\n  if (diffDays > 120) {\n    let y = start.getFullYear(), m = start.getMonth();\n    const endY = end.getFullYear(), endM = end.getMonth();\n    while (y < endY || (y === endY && m <= endM)) {\n      const mStr = `${y}-${String(m+1).padStart(2,'0')}`;\n      intervals.push({ type: 'month', key: mStr, label: `T${m+1}/${String(y).substring(2)}` });\n      m++; if (m > 11) { m = 0; y++; }\n    }\n  } else {\n    const step = diffDays <= 21 ? 1 : diffDays <= 60 ? 3 : 7;\n    let curr = new Date(start);\n    while (toDateStr(curr) <= endStr) {\n      const binStartStr = toDateStr(curr);\n      const binEndDate = new Date(curr);\n      binEndDate.setDate(binEndDate.getDate() + step - 1);\n      const binEndStr = toDateStr(binEndDate) > endStr ? endStr : toDateStr(binEndDate);\n      let label;\n      if (step === 1) { label = `${binStartStr.substring(8)}/${binStartStr.substring(5,7)}`; }\n      else { label = `${binStartStr.substring(8)}/${binStartStr.substring(5,7)}–${binEndStr.substring(8)}/${binEndStr.substring(5,7)}`; }\n      intervals.push({ type: 'date-range', startStr: binStartStr, endStr: binEndStr, label });\n      curr.setDate(curr.getDate() + step);\n    }\n  }\n  return intervals;\n}\n\nfunction renderAllTrendCharts() {\n  const startDateStr = document.getElementById(\"f-start-date\").value || MIN_DATE;\n  const endDateStr   = document.getElementById(\"f-end-date\").value   || MAX_DATE;\n  const intervals = getTrendIntervals(startDateStr, endDateStr);\n  renderChannelTrendChart(intervals);\n  renderMgmtTrendChart(intervals);\n}\n\nfunction renderTrendChart(svgId, legendId, groupKeys, groupColors, groupLabel, countFn) {\n  const svg = document.getElementById(svgId);\n  const legendContainer = document.getElementById(legendId);\n  svg.innerHTML = \"\"; legendContainer.innerHTML = \"\";\n\n  const intervals = window._currentIntervals;\n  if (!intervals || filteredData.length === 0 || intervals.length === 0) {\n    svg.innerHTML = `<text x=\"300\" y=\"140\" text-anchor=\"middle\" fill=\"var(--text2)\" style=\"font-family:'Be Vietnam Pro',sans-serif;font-size:12px\">Không có dữ liệu<\/text>`;\n    return;\n  }\n\n  const trendData = intervals.map(interval => {\n    const dataObj = { label: interval.label, counts: {} };\n    groupKeys.forEach(k => dataObj.counts[k] = 0);\n    return dataObj;\n  });\n\n  filteredData.forEach(d => {\n    intervals.forEach((interval, idx) => {\n      const key = countFn(d);\n      if (interval.type === \"month\") { if (d.month === interval.key) trendData[idx].counts[key]++; }\n      else { if (d.date >= interval.startStr && d.date <= interval.endStr) trendData[idx].counts[key]++; }\n    });\n  });\n\n  let maxVal = 10;\n  trendData.forEach(item => { groupKeys.forEach(k => { if (item.counts[k] > maxVal) maxVal = item.counts[k]; }); });\n  maxVal = maxVal * 1.15;\n\n  const margin = {top: 20, right: 30, bottom: 40, left: 48};\n  const width = 600; const height = 280;\n  const plotW = width - margin.left - margin.right;\n  const plotH = height - margin.top - margin.bottom;\n\n  const getX = (i) => intervals.length > 1 ? margin.left + (i * (plotW / (intervals.length - 1))) : margin.left + plotW / 2;\n  const getY = (val) => margin.top + plotH - (val / maxVal) * plotH;\n\n  let body = \"\";\n\n  // Grid lines\n  for (let i = 0; i <= 4; i++) {\n    const y = margin.top + (i * plotH / 4);\n    const val = maxVal - (i * maxVal / 4);\n    body += `<line x1=\"${margin.left}\" y1=\"${y}\" x2=\"${width - margin.right}\" y2=\"${y}\" stroke=\"#30363d\" stroke-dasharray=\"3,3\"/>`;\n    body += `<text x=\"${margin.left - 8}\" y=\"${y + 4}\" text-anchor=\"end\" fill=\"#6e7681\" style=\"font-size:9.5px;font-weight:600;font-family:'DM Mono',monospace\">${fmtInt(val)}<\/text>`;\n  }\n\n  // X labels\n  const skipRatio = Math.ceil(intervals.length / 6);\n  intervals.forEach((interval, i) => {\n    const x = getX(i);\n    if (i % skipRatio === 0 || i === intervals.length - 1) {\n      body += `<text x=\"${x}\" y=\"${margin.top + plotH + 22}\" text-anchor=\"middle\" fill=\"#8b949e\" style=\"font-size:9.5px;font-weight:600;font-family:'Be Vietnam Pro',sans-serif\">${interval.label}<\/text>`;\n    }\n  });\n\n  // Lines per group\n  groupKeys.forEach(k => {\n    const totalCount = trendData.reduce((sum, item) => sum + item.counts[k], 0);\n    if (totalCount === 0) return;\n\n    let lineD = \"\";\n    trendData.forEach((item, i) => {\n      const x = getX(i); const y = getY(item.counts[k]);\n      if (i === 0) { lineD += `M ${x} ${y} `; }\n      else {\n        const prevX = getX(i-1); const prevY = getY(trendData[i-1].counts[k]);\n        const cpX1 = prevX + (x - prevX) / 2;\n        lineD += `C ${cpX1} ${prevY}, ${cpX1} ${y}, ${x} ${y} `;\n      }\n    });\n\n    body += `<path class=\"line-path\" d=\"${lineD}\" fill=\"none\" stroke=\"${groupColors[k]}\" stroke-width=\"2.5\"/>`;\n\n    trendData.forEach((item, i) => {\n      const x = getX(i); const y = getY(item.counts[k]);\n      const nodeTip = `<b>${groupLabel}: ${k}<\/b><br>Phân đoạn: <b>${item.label}<\/b><br>Đăng ký mới: <b>${fmtInt(item.counts[k])} TK<\/b>`;\n      body += `<circle class=\"line-node\" cx=\"${x}\" cy=\"${y}\" r=\"3.5\" fill=\"${groupColors[k]}\" stroke=\"#0d1117\" stroke-width=\"2\" data-tip=\"${nodeTip}\"/>`;\n    });\n\n    legendContainer.innerHTML += `<div class=\"leg-item\"><div class=\"leg-dot\" style=\"background:${groupColors[k]};border-radius:50%\"><\/div><span>${k}<\/span><\/div>`;\n  });\n\n  svg.innerHTML = body;\n}\n\nfunction renderChannelTrendChart(intervals) {\n  window._currentIntervals = intervals;\n  renderTrendChart(\"channel-trend-svg\", \"channel-trend-legend\", CHANNELS, CHANNEL_COLORS, \"Kênh\", d => d.channel);\n}\n\nfunction renderMgmtTrendChart(intervals) {\n  window._currentIntervals = intervals;\n  renderTrendChart(\"mgmt-trend-svg\", \"mgmt-trend-legend\", MGMTS, MGMT_COLORS, \"Quản lý\", d => d.mgmt);\n}\n\nfunction renderSankeyChart() {\n  const svg = document.getElementById(\"sankey-svg\");\n  svg.innerHTML = \"\";\n\n  const total = filteredData.length;\n  if (total === 0) {\n    svg.innerHTML = `<text x=\"550\" y=\"190\" text-anchor=\"middle\" fill=\"#6e7681\" style=\"font-family:'Be Vietnam Pro',sans-serif\">Không có dữ liệu<\/text>`;\n    return;\n  }\n\n  const sources = CHANNELS; const intermediates = MGMTS; const targets = PRODUCTS;\n  const flowS2I = {}; const flowI2T = {};\n  sources.forEach(s => intermediates.forEach(i => flowS2I[`${s}→${i}`] = 0));\n  intermediates.forEach(i => targets.forEach(t => flowI2T[`${i}→${t}`] = 0));\n\n  const sTotals = {}; const iTotals = {}; const tTotals = {};\n  sources.forEach(s => sTotals[s] = 0);\n  intermediates.forEach(i => iTotals[i] = 0);\n  targets.forEach(t => tTotals[t] = 0);\n\n  filteredData.forEach(d => {\n    flowS2I[`${d.channel}→${d.mgmt}`]++;\n    flowI2T[`${d.mgmt}→${d.product}`]++;\n    sTotals[d.channel]++; iTotals[d.mgmt]++; tTotals[d.product]++;\n  });\n\n  const w = 1100, h = 380;\n  const paddingY = 16;\n  const sourceW = 12;\n\n  const activeSources = sources.filter(s => sTotals[s] > 0);\n  const activeInters = intermediates.filter(i => iTotals[i] > 0);\n  const activeTargets = targets.filter(t => tTotals[t] > 0);\n\n  const getPosList = (activeList, totalsMap, xPos) => {\n    const totalV = Object.values(totalsMap).reduce((a,b)=>a+b,0);\n    const availableH = h - (activeList.length - 1) * paddingY - 30;\n    let currentY = 20;\n    const pos = {};\n    activeList.forEach(node => {\n      const nodeH = totalV > 0 ? (totalsMap[node] / totalV) * availableH : 0;\n      pos[node] = { x: xPos, y: currentY, h: Math.max(nodeH, 4) };\n      currentY += Math.max(nodeH, 4) + paddingY;\n    });\n    return pos;\n  };\n\n  const sPos = getPosList(activeSources, sTotals, 30);\n  const iPos = getPosList(activeInters, iTotals, 520);\n  const tPos = getPosList(activeTargets, tTotals, 1010);\n\n  let body = \"\";\n\n  const sOff = {}; const iOff_S = {};\n  activeSources.forEach(s => sOff[s] = 0);\n  activeInters.forEach(i => iOff_S[i] = 0);\n\n  activeSources.forEach(s => {\n    activeInters.forEach(i => {\n      const val = flowS2I[`${s}→${i}`];\n      if (val === 0) return;\n      const sp = sPos[s]; const ip = iPos[i];\n      const sUnit = sTotals[s] > 0 ? sp.h / sTotals[s] : 0;\n      const iUnit = iTotals[i] > 0 ? ip.h / iTotals[i] : 0;\n      const sw = val * sUnit;\n      const sy = sp.y + sOff[s] + sw/2;\n      const ty = ip.y + iOff_S[i] + (val * iUnit)/2;\n      const x1 = sp.x + sourceW; const x2 = ip.x;\n      const c1 = x1 + (x2 - x1) * 0.45; const c2 = x1 + (x2 - x1) * 0.55;\n\n      body += `<path class=\"flow\" d=\"M ${x1} ${sy} C ${c1} ${sy}, ${c2} ${ty}, ${x2} ${ty}\" fill=\"none\" stroke=\"${CHANNEL_COLORS[s]}\" stroke-width=\"${sw}\" stroke-linecap=\"round\" opacity=\".2\" data-tip=\"<b>${s} &rarr; ${i}<\/b><br><span>${fmtInt(val)} TK · ${fmtPct(pct(val,total))}<\/span>\"/>`;\n      if (sw >= 15) {\n        body += `<text x=\"${(x1+x2)/2}\" y=\"${(sy+ty)/2+4}\" text-anchor=\"middle\" style=\"font-size:9.5px;font-weight:700;fill:#e6edf3;paint-order:stroke;stroke:#0d1117;stroke-width:3px;stroke-linejoin:round;font-family:'DM Mono',monospace\">${fmtInt(val)}<\/text>`;\n      }\n      sOff[s] += sw; iOff_S[i] += val * iUnit;\n    });\n  });\n\n  const iOff_T = {}; const tOff = {};\n  activeInters.forEach(i => iOff_T[i] = 0);\n  activeTargets.forEach(t => tOff[t] = 0);\n\n  activeInters.forEach(i => {\n    activeTargets.forEach(t => {\n      const val = flowI2T[`${i}→${t}`];\n      if (val === 0) return;\n      const ip = iPos[i]; const tp = tPos[t];\n      const iUnit = iTotals[i] > 0 ? ip.h / iTotals[i] : 0;\n      const tUnit = tTotals[t] > 0 ? tp.h / tTotals[t] : 0;\n      const sw = val * iUnit;\n      const sy = ip.y + iOff_T[i] + sw/2;\n      const ty = tp.y + tOff[t] + (val * tUnit)/2;\n      const x1 = ip.x + sourceW; const x2 = tp.x;\n      const c1 = x1 + (x2 - x1) * 0.45; const c2 = x1 + (x2 - x1) * 0.55;\n\n      body += `<path class=\"flow\" d=\"M ${x1} ${sy} C ${c1} ${sy}, ${c2} ${ty}, ${x2} ${ty}\" fill=\"none\" stroke=\"${PRODUCT_COLORS[t]||'#6e7681'}\" stroke-width=\"${sw}\" stroke-linecap=\"round\" opacity=\".55\" data-tip=\"<b>${i} &rarr; ${labelProduct(t)}<\/b><br><span>${fmtInt(val)} TK · ${fmtPct(pct(val,total))}<\/span>\"/>`;\n      if (sw >= 15) {\n        body += `<text x=\"${(x1+x2)/2}\" y=\"${(sy+ty)/2+4}\" text-anchor=\"middle\" style=\"font-size:9.5px;font-weight:700;fill:#e6edf3;paint-order:stroke;stroke:#0d1117;stroke-width:3px;stroke-linejoin:round;font-family:'DM Mono',monospace\">${fmtInt(val)}<\/text>`;\n      }\n      iOff_T[i] += sw; tOff[t] += val * tUnit;\n    });\n  });\n\n  const drawNodeText = (x, y, w, h, label, sub, color, textAnchor=\"start\", textOffset=18) => {\n    let output = `<rect class=\"sankey-node\" x=\"${x}\" y=\"${y}\" width=\"${w}\" height=\"${h}\" rx=\"4\" fill=\"${color}\" data-tip=\"<b>${label}<\/b><br>${sub}\"/>`;\n    const textX = textAnchor === \"start\" ? x + textOffset : x - textOffset;\n    output += `<text x=\"${textX}\" y=\"${y + h/2 + 3}\" text-anchor=\"${textAnchor}\" style=\"font-size:11px;font-weight:700;fill:#e6edf3;font-family:'Be Vietnam Pro',sans-serif\">${label} <tspan style=\"font-weight:400;fill:#8b949e\">(${sub.split(' · ')[0]})<\/tspan><\/text>`;\n    return output;\n  };\n\n  activeSources.forEach(s => {\n    const o = sPos[s];\n    body += drawNodeText(o.x, o.y, sourceW, o.h, s, `${fmtInt(sTotals[s])} TK · ${fmtPct(pct(sTotals[s],total))}`, CHANNEL_COLORS[s]);\n  });\n  activeInters.forEach(i => {\n    const o = iPos[i];\n    body += drawNodeText(o.x, o.y, sourceW, o.h, i, `${fmtInt(iTotals[i])} TK · ${fmtPct(pct(iTotals[i],total))}`, MGMT_COLORS[i]);\n  });\n  activeTargets.forEach(t => {\n    const o = tPos[t];\n    const color = t === \"Active\" ? \"#3fb950\" : \"#6e7681\";\n    body += drawNodeText(o.x, o.y, sourceW, o.h, t, `${fmtInt(tTotals[t])} TK · ${fmtPct(pct(tTotals[t],total))}`, color, 'end', 8);\n  });\n\n  svg.innerHTML = body;\n}\n\nfunction renderChannelBarChart() {\n  const svg = document.getElementById(\"channel-svg\");\n  svg.innerHTML = \"\";\n\n  const total = filteredData.length;\n  if (total === 0) {\n    svg.innerHTML = `<text x=\"250\" y=\"150\" text-anchor=\"middle\" fill=\"#6e7681\" style=\"font-family:'Be Vietnam Pro',sans-serif\">Không có dữ liệu<\/text>`;\n    return;\n  }\n\n  const counts = {};\n  CHANNELS.forEach(c => { counts[c] = 0; });\n  filteredData.forEach(d => { if (counts[d.channel] !== undefined) counts[d.channel]++; });\n\n  const maxVal = Math.max(...CHANNELS.map(c => counts[c]), 1);\n  const itemH = 34; const paddingY = 22;\n  const sortedChannels = [...CHANNELS].sort((a, b) => counts[b] - counts[a]);\n\n  let body = \"\";\n\n  sortedChannels.forEach((c, idx) => {\n    const count = counts[c];\n    const percentage = pct(count, total);\n    const barW = (count / maxVal) * 210;\n    const y = 30 + idx * (itemH + paddingY);\n    const rank = idx + 1;\n    const rankColor = rank === 1 ? '#f0a800' : rank === 2 ? '#8b949e' : rank === 3 ? '#bc8cff' : '#6e7681';\n    const chanColor = CHANNEL_COLORS[c];\n\n    // Background track\n    body += `<rect x=\"140\" y=\"${y + 3}\" width=\"210\" height=\"${itemH - 6}\" fill=\"#21262d\" rx=\"5\"/>`;\n    // Filled bar\n    body += `<rect class=\"bar-rect\" x=\"140\" y=\"${y + 3}\" width=\"${Math.max(barW, 4)}\" height=\"${itemH - 6}\" fill=\"${chanColor}\" rx=\"5\" opacity=\"0.9\" data-tip=\"<b>${c}<\/b><br>Xếp hạng: <b>#${rank}<\/b><br>Mở tài khoản: <b>${fmtInt(count)} TK<\/b> (${fmtPct(percentage)})\"/>`;\n    // Rank\n    body += `<text x=\"18\" y=\"${y + 23}\" fill=\"${rankColor}\" style=\"font-size:12.5px;font-weight:900;font-family:'DM Mono',monospace\">#${rank}<\/text>`;\n    // Channel name\n    body += `<text x=\"46\" y=\"${y + 23}\" fill=\"#e6edf3\" style=\"font-size:11px;font-weight:700;font-family:'Be Vietnam Pro',sans-serif\">${c}<\/text>`;\n    // Value label\n    body += `<text x=\"${140 + Math.max(barW, 4) + 8}\" y=\"${y + 23}\" fill=\"${chanColor}\" style=\"font-weight:800;font-size:11.5px;font-family:'DM Mono',monospace\">${fmtInt(count)}<tspan style=\"font-size:9px;fill:#8b949e;font-weight:500\"> (${fmtPct(percentage)})<\/tspan><\/text>`;\n  });\n\n  svg.innerHTML = body;\n}\n\nfunction renderHeatmap() {\n  const svg = document.getElementById(\"heatmap-svg\");\n  svg.innerHTML = \"\";\n\n  const cellCounts = {};\n  CHANNELS.forEach(c => { MGMTS.forEach(m => { cellCounts[`${c}_${m}`] = 0; }); });\n  filteredData.forEach(d => {\n    const key = `${d.channel}_${d.mgmt}`;\n    if (cellCounts[key] !== undefined) cellCounts[key]++;\n  });\n\n  const maxCount = Math.max(...Object.values(cellCounts), 1);\n  const cellW = 100; const cellH = 38;\n  const startX = 135; const startY = 55;\n\n  let body = \"\";\n\n  // Column headers\n  MGMTS.forEach((m, idx) => {\n    const color = MGMT_COLORS[m];\n    body += `<rect x=\"${startX + idx*cellW + 2}\" y=\"16\" width=\"${cellW - 6}\" height=\"22\" fill=\"rgba(255,255,255,0.04)\" rx=\"4\"/>`;\n    body += `<text x=\"${startX + idx*cellW + cellW/2}\" y=\"31\" text-anchor=\"middle\" fill=\"${color}\" style=\"font-size:11px;font-weight:700;font-family:'Be Vietnam Pro',sans-serif\">${m}<\/text>`;\n  });\n\n  CHANNELS.forEach((c, cIdx) => {\n    const y = startY + cIdx * cellH;\n    const chanColor = CHANNEL_COLORS[c];\n    body += `<text x=\"120\" y=\"${y + cellH/2 + 4}\" text-anchor=\"end\" fill=\"#e6edf3\" style=\"font-size:10.5px;font-weight:700;font-family:'Be Vietnam Pro',sans-serif\">${c}<\/text>`;\n\n    MGMTS.forEach((m, mIdx) => {\n      const x = startX + mIdx * cellW;\n      const count = cellCounts[`${c}_${m}`];\n      const pctVal = pct(count, filteredData.length);\n      const ratio = count / maxCount;\n      const alpha = Math.max(ratio * 0.85, 0.06);\n      const fillColor = `rgba(240,168,0,${alpha})`;\n      const textColor = ratio > 0.5 ? '#0d1117' : ratio > 0.15 ? '#f0a800' : '#8b949e';\n\n      body += `<rect class=\"heatmap-cell\" x=\"${x+1}\" y=\"${y+1}\" width=\"${cellW - 4}\" height=\"${cellH - 4}\" fill=\"${fillColor}\" rx=\"5\" stroke=\"rgba(240,168,0,0.12)\" stroke-width=\"1\" data-tip=\"<b>${c} &rarr; ${m}<\/b><br>Số lượng TK: <b>${fmtInt(count)} TK<\/b><br>Tỷ trọng: <b>${fmtPct(pctVal)}<\/b>\"/>`;\n      body += `<text x=\"${x + (cellW-4)/2 + 1}\" y=\"${y + (cellH-4)/2 + 5}\" text-anchor=\"middle\" fill=\"${textColor}\" style=\"font-size:11.5px;font-weight:700;font-family:'DM Mono',monospace\">${fmtInt(count)}<\/text>`;\n    });\n  });\n\n  svg.innerHTML = body;\n}\n<\/script>\n<\/body>\n<\/html>\n" },
  page2: { title: "Phân tích Hiệu quả Kênh Phát triển Khách hàng", html: "<!DOCTYPE html>\n<html lang=\"vi\">\n<head>\n<meta charset=\"utf-8\"/>\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"/>\n<title>Phân tích Hiệu quả Kênh Phát triển Khách hàng<\/title>\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap');\n:root{\n  --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--surface3:#21262d;\n  --border:#30363d;--border2:#21262d;\n  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;\n  --brand:#f0a800;--brand2:#ffc233;--brand-dim:rgba(240,168,0,0.15);--brand-glow:rgba(240,168,0,0.3);\n  --green:#3fb950;--green-dim:rgba(63,185,80,0.12);\n  --blue:#58a6ff;--blue-dim:rgba(88,166,255,0.12);\n  --red:#f85149;--red-dim:rgba(248,81,73,0.12);\n  --purple:#bc8cff;--purple-dim:rgba(188,140,255,0.12);\n  --teal:#39d353;--orange:#d29922;--pink:#f778ba;\n  --ch1:#3fb950;--ch2:#58a6ff;--ch3:#bc8cff;--ch4:#f0a800;--ch5:#f85149;\n  --shadow-sm:0 1px 3px rgba(0,0,0,0.4);\n  --shadow:0 8px 24px rgba(0,0,0,0.5);\n  --shadow-lg:0 16px 48px rgba(0,0,0,0.6);\n  --radius:12px;--radius-sm:8px;--radius-lg:16px;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{background:var(--bg);color:var(--text);font-family:'Be Vietnam Pro',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}\ncode,kbd,samp{font-family:'DM Mono','Courier New',monospace}\n\n/* ── Scrollbar ── */\n::-webkit-scrollbar{width:6px;height:6px}\n::-webkit-scrollbar-track{background:var(--surface)}\n::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}\n::-webkit-scrollbar-thumb:hover{background:var(--brand)}\n\n/* ── Layout ── */\n.page{max-width:1760px;margin:0 auto;padding:28px 32px 60px}\n\n/* ── Hero ── */\n.hero{\n  background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 50%,#1a1500 100%);\n  border:1px solid var(--border);border-radius:var(--radius-lg);\n  padding:32px 40px;margin-bottom:28px;position:relative;overflow:hidden;\n}\n.hero::before{\n  content:\"\";position:absolute;top:0;right:0;width:600px;height:100%;\n  background:radial-gradient(ellipse at 80% 50%,rgba(240,168,0,0.08) 0%,transparent 65%);\n  pointer-events:none\n}\n.hero::after{\n  content:\"\";position:absolute;bottom:-60px;right:-40px;\n  width:300px;height:300px;border-radius:50%;\n  background:radial-gradient(circle,rgba(240,168,0,0.05) 0%,transparent 70%);\n  pointer-events:none\n}\n.hero-row{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;position:relative;z-index:1}\n.hero-tag{display:inline-flex;align-items:center;gap:8px;background:var(--brand-dim);border:1px solid rgba(240,168,0,0.3);padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}\n.hero h1{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.5px;line-height:1.2}\n.hero h1 span{color:var(--brand)}\n.hero p{font-size:13px;color:var(--text2);margin-top:8px;max-width:580px;line-height:1.6}\n.hero-stats{display:flex;gap:16px;flex-wrap:wrap}\n.hero-stat{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 22px;text-align:center;min-width:120px}\n.hero-stat-val{font-size:24px;font-weight:800;color:var(--brand);display:block}\n.hero-stat-lbl{font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}\n\n/* ── Filters (sticky) ── */\n.filters{background:rgba(22,27,34,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius);padding:16px 24px;margin-bottom:28px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;position:sticky;top:8px;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,0.5)}\n\n/* ── Sticky indicator ── */\n.sticky-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(240,168,0,0.12);border:1px solid rgba(240,168,0,0.25);color:var(--brand);font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:0.5px;margin-left:8px;vertical-align:middle}\n.fg{display:flex;flex-direction:column;gap:7px;flex:1;min-width:140px}\n.fg-date{flex:0 0 148px}\n.fg label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px}\n.fc{height:40px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;font-size:12.5px;font-weight:600;color:var(--text);font-family:inherit;cursor:pointer;outline:none;transition:border-color 0.2s,box-shadow 0.2s;width:100%}\n.fc:focus,.fc:hover{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-dim)}\n.fc option{background:var(--surface2)}\n.btn-reset{height:40px;background:var(--brand);color:#000;border:none;border-radius:var(--radius-sm);font-size:12.5px;font-weight:800;cursor:pointer;padding:0 20px;white-space:nowrap;transition:background 0.2s,transform 0.1s;font-family:inherit}\n.btn-reset:hover{background:var(--brand2);transform:translateY(-1px)}\n.btn-reset:active{transform:translateY(0)}\n\n/* ── Section header ── */\n.section-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;margin-top:8px}\n.section-head h2{font-size:16px;font-weight:700;color:var(--text)}\n.section-tag{background:var(--brand-dim);color:var(--brand);font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;border:1px solid rgba(240,168,0,0.25);text-transform:uppercase;letter-spacing:0.5px}\n.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border) 0%,transparent 100%)}\n\n/* ── KPI Grid ── */\n.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px}\n@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}\n@media(max-width:700px){.kpi-grid{grid-template-columns:1fr 1fr}}\n@media(max-width:500px){.kpi-grid{grid-template-columns:1fr}}\n.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden;cursor:default;transition:border-color 0.25s,transform 0.25s,box-shadow 0.25s}\n.kpi-card:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:0 0 0 1px var(--brand),var(--shadow)}\n.kpi-card::after{content:\"\";position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(240,168,0,0.04),transparent 60%);pointer-events:none}\n.kpi-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:14px;flex-shrink:0}\n.kpi-label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}\n.kpi-value{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1;color:var(--text)}\n.kpi-delta{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:5px}\n.kpi-delta.up{color:var(--green);background:var(--green-dim)}\n.kpi-delta.down{color:var(--red);background:var(--red-dim)}\n.kpi-delta.neutral{color:var(--text2);background:rgba(255,255,255,0.04)}\n.kpi-sub{font-size:11px;color:var(--text3);margin-top:6px}\n\n/* ── Main grid ── */\n.charts-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:20px;margin-bottom:20px}\n.col-12{grid-column:span 12}\n.col-8{grid-column:span 8}\n.col-4{grid-column:span 4}\n.col-7{grid-column:span 7}\n.col-5{grid-column:span 5}\n.col-6{grid-column:span 6}\n@media(max-width:1200px){.col-8,.col-7{grid-column:span 12}.col-4,.col-5{grid-column:span 12}.col-6{grid-column:span 12}}\n@media(max-width:960px){.col-7,.col-5{grid-column:span 12}}\n\n/* ── Chart box ── */\n.cbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:relative;overflow:hidden;transition:border-color 0.25s,box-shadow 0.25s}\n.cbox:hover{border-color:rgba(240,168,0,0.3);box-shadow:0 0 20px rgba(240,168,0,0.05)}\n.cbox-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:12px;flex-wrap:wrap}\n.cbox-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}\n.cbox-sub{font-size:11.5px;color:var(--text3);line-height:1.5}\n.cbox-legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center}\n.leg{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;padding:3px 0;transition:color 0.2s}\n.leg:hover{color:var(--text)}\n.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}\n.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}\n.cbox-body{position:relative;width:100%;min-height:280px;display:flex;align-items:center;justify-content:center}\n.cbox-body svg{overflow:visible;width:100%;height:100%}\n\n/* ── Channel scorecard table ── */\n.sc-table{width:100%;border-collapse:collapse;font-size:12.5px}\n.sc-table thead th{padding:9px 14px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}\n.sc-table thead th:first-child{text-align:left}\n.sc-table tbody tr{border-bottom:1px solid var(--border2);transition:background 0.15s;cursor:default}\n.sc-table tbody tr:last-child{border-bottom:none}\n.sc-table tbody tr:hover{background:rgba(255,255,255,0.025)}\n.sc-table td{padding:10px 14px;text-align:right;color:var(--text);font-weight:600;vertical-align:middle}\n.sc-table td:first-child{text-align:left;font-weight:700}\n.sc-rank{width:22px;height:22px;border-radius:6px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}\n.badge-ch{display:inline-flex;align-items:center;gap:7px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;border:1px solid}\n.badge-good{background:var(--green-dim);color:var(--green);border-color:rgba(63,185,80,0.3)}\n.badge-warn{background:rgba(210,153,34,0.12);color:#d29922;border-color:rgba(210,153,34,0.3)}\n.badge-bad{background:var(--red-dim);color:var(--red);border-color:rgba(248,81,73,0.3)}\n.badge-avg{background:var(--blue-dim);color:var(--blue);border-color:rgba(88,166,255,0.3)}\n.bar-inline{display:inline-block;height:6px;border-radius:3px;vertical-align:middle;margin-left:6px;max-width:80px}\n.trend-pill{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:4px}\n.trend-up{background:var(--green-dim);color:var(--green)}\n.trend-dn{background:var(--red-dim);color:var(--red)}\n.trend-neu{background:rgba(255,255,255,0.04);color:var(--text3)}\n\n/* ── Gauge / Radial ── */\n.gauge-group{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;padding:8px 0}\n.gauge-item{text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:90px}\n.gauge-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px}\n.gauge-val{font-size:14px;font-weight:800;color:var(--text)}\n.gauge-sub{font-size:10px;color:var(--text3)}\n\n/* ── Tooltip ── */\n.tip{position:fixed;background:var(--surface3);backdrop-filter:blur(16px);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:12px;pointer-events:none;box-shadow:var(--shadow-lg);display:none;z-index:9999;line-height:1.6;max-width:240px}\n.tip b{display:block;margin-bottom:4px;color:var(--brand);font-size:12.5px}\n.tip .tip-row{display:flex;justify-content:space-between;gap:16px;font-size:11.5px}\n.tip .tip-row span:last-child{font-weight:700;color:var(--text)}\n\n/* ── Insight Panel ── */\n.insight-panel{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}\n@media(max-width:900px){.insight-panel{grid-template-columns:1fr 1fr}}\n@media(max-width:600px){.insight-panel{grid-template-columns:1fr}}\n.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;transition:border-color 0.25s,transform 0.25s}\n.insight-card:hover{border-color:rgba(240,168,0,0.35);transform:translateY(-2px)}\n.insight-card::before{content:\"\";position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}\n.insight-card.green::before{background:linear-gradient(90deg,var(--green),transparent)}\n.insight-card.blue::before{background:linear-gradient(90deg,var(--blue),transparent)}\n.insight-card.brand::before{background:linear-gradient(90deg,var(--brand),transparent)}\n.insight-icon{font-size:22px;margin-bottom:10px}\n.insight-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px}\n.insight-value{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.5px;line-height:1.1;margin-bottom:6px}\n.insight-value span{color:var(--brand)}\n.insight-desc{font-size:11.5px;color:var(--text2);line-height:1.5}\n\n/* ── Action Summary ── */\n.action-panel{background:linear-gradient(135deg,var(--surface) 0%,rgba(26,21,0,0.9) 100%);border:1px solid rgba(240,168,0,0.25);border-radius:var(--radius-lg);padding:28px 32px;margin-top:28px;position:relative;overflow:hidden}\n.action-panel::before{content:\"\";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--brand),transparent)}\n.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-top:20px}\n@media(max-width:900px){.action-grid{grid-template-columns:1fr 1fr}}\n@media(max-width:600px){.action-grid{grid-template-columns:1fr}}\n.action-item{background:rgba(255,255,255,0.03);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:16px 18px;display:flex;gap:12px;align-items:flex-start}\n.action-num{width:26px;height:26px;border-radius:7px;background:var(--brand-dim);border:1px solid rgba(240,168,0,0.3);color:var(--brand);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}\n.action-text strong{display:block;font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:4px}\n.action-text p{font-size:11.5px;color:var(--text2);line-height:1.5}\n.action-priority{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:6px}\n.priority-high{background:var(--red-dim);color:var(--red)}\n.priority-med{background:rgba(210,153,34,0.12);color:#d29922}\n.priority-low{background:var(--green-dim);color:var(--green)}\n\n/* ── Channel×Mgmt Analysis Panel ── */\n.cm-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;overflow:hidden;transition:border-color 0.25s,box-shadow 0.25s}\n.cm-panel:hover{border-color:rgba(240,168,0,0.3);box-shadow:0 0 20px rgba(240,168,0,0.05)}\n.cm-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}\n.cm-tab{height:32px;padding:0 16px;border-radius:var(--radius-sm);font-size:11.5px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:inherit;transition:all 0.2s}\n.cm-tab:hover{border-color:rgba(240,168,0,0.4);color:var(--text)}\n.cm-tab.active{background:var(--brand-dim);border-color:rgba(240,168,0,0.5);color:var(--brand)}\n.cm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}\n@media(max-width:1100px){.cm-grid{grid-template-columns:repeat(2,1fr)}}\n@media(max-width:700px){.cm-grid{grid-template-columns:1fr}}\n.cm-card{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:16px 18px;position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.2s}\n.cm-card:hover{border-color:var(--brand);transform:translateY(-1px)}\n.cm-card-head{display:flex;justify-content:space-between;align- 40px;margin-top:2px}\n\n/* ── Insight Summary Block ── */\n.insight-summary-block{background:linear-gradient(135deg,var(--surface) 0%,rgba(26,21,0,0.6) 100%);border:1px solid rgba(240,168,0,0.2);border-left:3px solid var(--brand);border-radius:var(--radius);padding:20px 26px;margin-bottom:18px;position:relative;overflow:hidden}\n.insight-summary-block::before{content:\"\";position:absolute;top:0;right:0;width:300px;height:100%;background:radial-gradient(ellipse at 90% 50%,rgba(240,168,0,0.05) 0%,transparent 65%);pointer-events:none}\n.insight-summary-text{font-size:13.5px;color:var(--text2);line-height:1.75;font-weight:400;position:relative;z-index:1}\n.insight-summary-text strong{color:var(--brand);font-weight:700}\n\n/* ── 5-card insight panel ── */\n.insight-panel-5{grid-template-columns:repeat(5,1fr)}\n@media(max-width:1300px){.insight-panel-5{grid-template-columns:repeat(3,1fr)}}\n@media(max-width:900px){.insight-panel-5{grid-template-columns:1fr 1fr}}\n@media(max-width:600px){.insight-panel-5{grid-template-columns:1fr}}\n\n\n@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}\n@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}\n.anim-in{animation:fadeUp 0.45s ease both}\n.bar-rect,.hm-cell{cursor:pointer;transition:filter 0.15s,opacity 0.15s}\n.bar-rect:hover{filter:brightness(1.25)}\n.hm-cell:hover{filter:brightness(1.4)}\n.line-dot{cursor:pointer;transition:r 0.15s}\n.line-dot:hover{r:5.5!important;filter:drop-shadow(0 0 5px var(--brand))}\n<\/style>\n<\/head>\n<body>\n<div class=\"page\">\n\n<!-- ── Hero ── -->\n<div class=\"hero anim-in\">\n  <div class=\"hero-row\">\n    <div>\n      <div class=\"hero-tag\">\n        <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><polyline points=\"23 6 13.5 15.5 8.5 10.5 1 18\"/><\/svg>\n        Phân tích Kênh Phát triển\n      <\/div>\n      <h1>Hiệu quả <span>Kênh Phát triển<\/span> Khách hàng<\/h1>\n      <p>Đánh giá toàn diện chất lượng đầu vào khách hàng theo kênh: AUM trung bình, Phí/KH, Tỷ lệ Active và hiệu suất sinh lời. Dữ liệu 01/2026 – 05/2026.<\/p>\n    <\/div>\n\n  <\/div>\n<\/div>\n\n<!-- ── Insight Summary Panel ── -->\n<div class=\"section-head\"><h2>Nhận định tự động từ dữ liệu<\/h2><span class=\"section-tag\">Insight<\/span><div class=\"section-line\"><\/div><\/div>\n\n<!-- Summary paragraph -->\n<div class=\"insight-summary-block anim-in\" id=\"insight-summary-block\">\n  <p class=\"insight-summary-text\" id=\"insight-summary-text\">—<\/p>\n<\/div>\n\n<!-- 5 Insight cards -->\n<div class=\"insight-panel insight-panel-5\" id=\"insight-panel\">\n  <div class=\"insight-card green anim-in\" style=\"animation-delay:0.04s\">\n    <div class=\"insight-icon\">🏆<\/div>\n    <div class=\"insight-label\">Insight 1 — Kênh dẫn đầu<\/div>\n    <div class=\"insight-value\" id=\"ins-1-val\">—<\/div>\n    <div class=\"insight-desc\" id=\"ins-1-desc\">—<\/div>\n  <\/div>\n  <div class=\"insight-card brand anim-in\" style=\"animation-delay:0.08s\">\n    <div class=\"insight-icon\">⚠️<\/div>\n    <div class=\"insight-label\">Insight 2 — Điểm yếu<\/div>\n    <div class=\"insight-value\" id=\"ins-2-val\">—<\/div>\n    <div class=\"insight-desc\" id=\"ins-2-desc\">—<\/div>\n  <\/div>\n  <div class=\"insight-card blue anim-in\" style=\"animation-delay:0.12s\">\n    <div class=\"insight-icon\">📈<\/div>\n    <div class=\"insight-label\">Insight 3 — Tăng trưởng<\/div>\n    <div class=\"insight-value\" id=\"ins-3-val\">—<\/div>\n    <div class=\"insight-desc\" id=\"ins-3-desc\">—<\/div>\n  <\/div>\n  <div class=\"insight-card green anim-in\" style=\"animation-delay:0.16s;border-top-color:var(--purple)\">\n    <div class=\"insight-icon\">💎<\/div>\n    <div class=\"insight-label\">Insight 4 — Chất lượng tài sản<\/div>\n    <div class=\"insight-value\" id=\"ins-4-val\">—<\/div>\n    <div class=\"insight-desc\" id=\"ins-4-desc\">—<\/div>\n  <\/div>\n  <div class=\"insight-card blue anim-in\" style=\"animation-delay:0.20s;border-top-color:var(--orange)\">\n    <div class=\"insight-icon\">🎯<\/div>\n    <div class=\"insight-label\">Insight 5 — ROI & Chi phí<\/div>\n    <div class=\"insight-value\" id=\"ins-5-val\">—<\/div>\n    <div class=\"insight-desc\" id=\"ins-5-desc\">—<\/div>\n  <\/div>\n<\/div>\n\n<!-- ── Filters ── -->\n<div class=\"filters\">\n  <div class=\"fg fg-date\">\n    <label>Từ ngày<\/label>\n    <input type=\"date\" id=\"f-start\" class=\"fc\" value=\"2026-01-01\">\n  <\/div>\n  <div class=\"fg fg-date\">\n    <label>Đến ngày<\/label>\n    <input type=\"date\" id=\"f-end\" class=\"fc\" value=\"2026-05-31\">\n  <\/div>\n  <div class=\"fg\">\n    <label>Kênh phát triển<\/label>\n    <select id=\"f-channel\" class=\"fc\">\n      <option value=\"all\">Tất cả kênh<\/option>\n      <option value=\"App (M)\">App (M)<\/option>\n      <option value=\"Web (O)\">Web (O)<\/option>\n      <option value=\"Loop (E)\">Loop (E)<\/option>\n      <option value=\"Teller (F)\">Teller (F)<\/option>\n      <option value=\"Bank (L)\">Bank (L)<\/option>\n    <\/select>\n  <\/div>\n  <div class=\"fg\">\n    <label>Hình thức quản lý<\/label>\n    <select id=\"f-mgmt\" class=\"fc\">\n      <option value=\"all\">Tất cả<\/option>\n      <option value=\"MG\">Môi giới (MG)<\/option>\n      <option value=\"CTV\">Cộng tác viên (CTV)<\/option>\n      <option value=\"NoID\">Không ID (NoID)<\/option>\n    <\/select>\n  <\/div>\n\n  <div style=\"display:flex;flex-direction:column;gap:7px;align-items:center\">\n    <span style=\"font-size:9px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:0.5px\">📌 Sticky<\/span>\n    <button class=\"btn-reset\" onclick=\"resetFilters()\">↺ Đặt lại<\/button>\n  <\/div>\n<\/div>\n\n<!-- ── KPIs ── -->\n<div class=\"section-head\"><h2>Chỉ số hiệu quả tổng quan<\/h2><span class=\"section-tag\">KPI<\/span><div class=\"section-line\"><\/div><\/div>\n<div class=\"kpi-grid\" id=\"kpi-grid\">\n  <!-- filled by JS -->\n<\/div>\n\n<!-- ── Row 1: Scorecard Table + Scatter ROI ── -->\n<div class=\"section-head\"><h2>Bảng xếp hạng & Hiệu quả chi phí<\/h2><span class=\"section-tag\">Scorecard<\/span><div class=\"section-line\"><\/div><\/div>\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-7 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Bảng so sánh chỉ số hiệu quả — Phân tích đa chiều<\/div>\n        <div class=\"cbox-sub\">AUM/KH, Phí/KH, Tỷ lệ Active và điểm Hiệu quả tổng hợp.<\/div>\n      <\/div>\n    <\/div>\n    <div id=\"scorecard-wrap\" style=\"overflow-x:auto\"><\/div>\n  <\/div>\n  <div class=\"cbox col-5 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Chi phí/KH vs Phí NET/KH theo Kênh<\/div>\n        <div class=\"cbox-sub\">So sánh chi phí vận hành trên mỗi KH với phí net thu được — bubble size = số KH.<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:280px\">\n      <svg id=\"scatter-svg\" viewBox=\"0 0 520 280\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- ── Row 2: AUM/KH grouped bar + Fee bar ── -->\n<div class=\"section-head\"><h2>AUM & Phí phân tích<\/h2><span class=\"section-tag\">Revenue Quality<\/span><div class=\"section-line\"><\/div><\/div>\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-6 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">AUM trung bình / Khách hàng theo Kênh<\/div>\n        <div class=\"cbox-sub\">So sánh tài sản trung bình mỗi khách hàng đưa vào, phân tách theo Hình thức quản lý.<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"aum-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:280px\">\n      <svg id=\"aum-svg\" viewBox=\"0 0 640 280\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n  <div class=\"cbox col-6 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Phí net / Khách hàng theo Kênh<\/div>\n        <div class=\"cbox-sub\">Phí giao dịch bình quân ước tính dựa trên AUM và tỷ lệ giao dịch theo kênh.<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"fee-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:280px\">\n      <svg id=\"fee-svg\" viewBox=\"0 -22 520 310\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n\n<!-- ── Row 3: Active Rate — merged 1 chart ── -->\n<div class=\"section-head\"><h2>Chất lượng chuyển đổi<\/h2><span class=\"section-tag\">Conversion<\/span><div class=\"section-line\"><\/div><span style=\"font-size:11px;color:var(--text3);margin-left:8px\">2 biểu đồ → 1 biểu đồ kết hợp<\/span><\/div>\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-12 anim-in\">\n    <div class=\"cbox-head\">\n      <div>\n        <div class=\"cbox-title\">Tỷ lệ Active theo Kênh & Hình thức quản lý — Biểu đồ kết hợp<\/div>\n        <div class=\"cbox-sub\">% KH kích hoạt giao dịch — phân tách đồng thời theo kênh phát triển và hình thức quản lý (MG / CTV / NoID).<\/div>\n      <\/div>\n      <div class=\"cbox-legend\" id=\"active-combined-legend\"><\/div>\n    <\/div>\n    <div class=\"cbox-body\" style=\"min-height:300px\">\n      <svg id=\"active-combined-svg\" viewBox=\"0 0 1100 300\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%\"><\/svg>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- ── Row 4: Monthly trend + Heatmap ── -->\n<div class=\"section-head\"><h2>Xu hướng & Ma trận phân bổ<\/h2><span class=\"section-tag\">Trend<\/span><div class=\"section-line\"><\/div><\/div>\n<div class=\"charts-grid\" style=\"margin-bottom:20px\">\n  <div class=\"cbox col-6 anim-in\">\n    <div cla
